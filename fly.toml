# fly.toml app configuration file generated for rules-for-spec-driven-agent on 2026-06-23T14:17:40+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rules-for-spec-driven-agent'
primary_region = 'sin'

[build]

[env]
  MCP_TRANSPORT = "streamable-http"
  MCP_PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
