name: Validate YAML and JSON

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml jsonschema

    - name: Validate YAML files
      run: |
        echo "Validating YAML files..."
        find specs -name "*.yaml" -exec python -c "
        import yaml
        import sys
        try:
            yaml.safe_load(open('{}', encoding='utf-8'))
            print(f'✅ Valid: {}')
        except Exception as e:
            print(f'❌ Invalid: {} - {e}')
            sys.exit(1)
        " \;
        echo "✅ All YAML files are valid"

    - name: Validate JSON files
      run: |
        echo "Validating JSON files..."
        find schemas -name "*.json" -exec python -c "
        import json
        import sys
        try:
            json.load(open('{}'))
            print(f'✅ Valid: {}')
        except Exception as e:
            print(f'❌ Invalid: {} - {e}')
            sys.exit(1)
        " \;
        echo "✅ All JSON files are valid"

    - name: Validate JSON Schema files
      run: |
        echo "Validating JSON Schema files..."
        python -c "
        import json
        import os
        from jsonschema import Draft7Validator

        schema_dir = 'schemas'
        for filename in os.listdir(schema_dir):
            if filename.endswith('.json'):
                filepath = os.path.join(schema_dir, filename)
                try:
                    schema = json.load(open(filepath))
                    Draft7Validator.check_schema(schema)
                    print(f'✅ Valid schema: {filename}')
                except Exception as e:
                    print(f'❌ Invalid schema: {filename} - {e}')
                    exit(1)
        print('✅ All JSON Schema files are valid')
        "

    - name: Check file structure
      run: |
        echo "Checking file structure..."
        required_files=(
          "specs/_meta.yaml"
          "specs/principles/organizational-boundary.yaml"
          "specs/principles/operational-boundary.yaml"
          "specs/principles/data-quality-hierarchy.yaml"
          "specs/principles/emission-attribution.yaml"
          "specs/methods/location-based.yaml"
          "specs/methods/market-based.yaml"
          "specs/methods/dual-reporting.yaml"
          "specs/reporting/disclosure-requirements.yaml"
          "specs/constraints/prohibitions.yaml"
          "specs/constraints/scope2-quality-criteria.yaml"
          "specs/constraints/certificate-management.yaml"
          "schemas/equity-share-input.json"
          "schemas/equity-share-output.json"
          "schemas/operational-control-input.json"
          "schemas/operational-control-output.json"
          "schemas/financial-control-input.json"
          "schemas/financial-control-output.json"
          "schemas/boundary-overlap-input.json"
          "schemas/boundary-overlap-output.json"
          "specs/scope1/principles/emission-categories.yaml"
          "specs/scope1/principles/operational-boundary.yaml"
          "specs/scope1/methods/stationary-combustion.yaml"
          "specs/scope1/methods/mobile-combustion.yaml"
          "specs/scope1/methods/process-emissions.yaml"
          "specs/scope1/methods/fugitive-emissions.yaml"
          "specs/scope1/reporting/disclosure-requirements.yaml"
          "specs/scope1/constraints/prohibitions.yaml"
          "specs/scope1/constraints/quality-criteria.yaml"
          "schemas/chp-emission-split-input.json"
          "schemas/chp-emission-split-output.json"
          "docs/README.md"
          "docs/methodology.md"
          "docs/schema-spec.md"
          "docs/agent-integration-guide.md"
          "examples/sample-usage.yaml"
          "LICENSE"
        )

        missing_files=()
        for file in "${required_files[@]}"; do
          if [ ! -f "$file" ]; then
            missing_files+=("$file")
          fi
        done

        if [ ${#missing_files[@]} -eq 0 ]; then
          echo "✅ All required files are present"
        else
          echo "❌ Missing files:"
          for file in "${missing_files[@]}"; do
            echo "  - $file"
          done
          exit 1
        fi

    - name: Validate spec consistency
      run: |
        echo "Validating spec consistency..."
        python -c "
        import yaml
        import os

        # Load meta file
        with open('specs/_meta.yaml', encoding='utf-8') as f:
            meta = yaml.safe_load(f)

        # Check load_order references exist
        load_order = meta.get('load_order', [])
        for path in load_order:
            filepath = f'specs/{path}.yaml'
            if not os.path.exists(filepath):
                print(f'❌ Missing file in load_order: {filepath}')
                exit(1)
            print(f'✅ Load order file exists: {filepath}')

        # Check external function schemas exist
        engines = meta.get('expression_engines', {})
        external_funcs = engines.get('external_functions', {}).get('registry', [])
        for func in external_funcs:
            input_schema = func.get('input_schema')
            output_schema = func.get('output_schema')
            if input_schema and not os.path.exists(input_schema):
                print(f'❌ Missing input schema: {input_schema}')
                exit(1)
            if output_schema and not os.path.exists(output_schema):
                print(f'❌ Missing output schema: {output_schema}')
                exit(1)
            print(f'✅ External function schemas exist: {func[\"id\"]}')

        print('✅ Spec consistency check passed')
        "
