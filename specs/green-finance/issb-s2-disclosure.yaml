    priority: "SHOULD"
    severity: "warning"
    lifecycle: "post_audit"
    condition:
      {"and": [
        {"!=": [{"var": "output.metrics.ghg.scope2_location_based_tco2e"}, null]},
        {"!=": [{"var": "input.entity.has_contractual_instruments"}, null]}
      ]}
    assertion:
      {"or": [
        {"!=": [{"var": "output.metrics.ghg.scope2_contractual_instruments_info"}, null]},
        {"==": [{"var": "input.entity.has_contractual_instruments"}, false]}
      ]}
    on_fail: "require_justification"
    on_fail_message: "IFRS S2 Appendix B, Para B30-B31: 若存在合同工具（如绿证、PPA），须提供相关信息以帮助用户理解Scope 2排放"
    citation: "cit-s2-096"

  # ================================================================
  # Appendix B — Scope 3 框架 (Scope 3 Framework)
  # ================================================================

  - id: "gf-s2-083"
    name: "Scope 3 全价值链覆盖"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "output.metrics.ghg.scope3_emissions_tco2e"}, null]}
    assertion:
      {"and": [
        {"!=": [{"var": "output.metrics.ghg.scope3_upstream_categories"}, null]},
        {"!=": [{"var": "output.metrics.ghg.scope3_downstream_categories"}, null]}
      ]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Appendix B, Para B32-B33: 须考虑整个价值链（上游和下游），并披露涵盖的15个Scope 3类别"
    citation: "cit-s2-098"

  - id: "gf-s2-084"
    name: "Scope 3 重大事件重新评估"
