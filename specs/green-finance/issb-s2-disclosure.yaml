    condition:
      {"!=": [{"var": "output.targets.emission_reduction_targets"}, null]}
    assertion:
      {"or": [
        {"!=": [{"var": "output.targets.metric_selection_cross_industry_reference"}, null]},
        {"!=": [{"var": "output.targets.metric_selection_industry_reference"}, null]}
      ]}
    on_fail: "require_justification"
    on_fail_message: "IFRS S2 Appendix B, Para B67: 选择目标指标时，须参考跨行业指标和行业指标"
    citation: "cit-s2-116"

