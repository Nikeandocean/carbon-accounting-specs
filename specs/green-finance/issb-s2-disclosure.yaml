meta:
  id: "green-finance/issb-s2-disclosure"
  version: "3.2.0"
  source: "IFRS S2 Climate-related Disclosures (ISSB 2026)"
  source_ref: "specs/green-finance/issb-2026-a-ifrs-s2-climate-related-disclosures.pdf"
  layer: "schema"
  description: >
    IFRS S2 气候相关披露规范，覆盖治理、战略、风险管理、指标和目标四大支柱，含Appendix B应用指南。
    重点量化指标：Scope 1/2/3 排放、转型/物理风险暴露、气候机遇、资本支出、
    内部碳价、高管薪酬、减排目标及碳信用。适用于所有行业，含金融机构融资排放要求。
    122条引用，99条规则，覆盖IFRS S2全部强制段落和December 2025修正案。

citations:
  # ===== 治理 =====
  - id: "cit-s2-001"
    text: "An entity shall disclose information about its governance body(s) or individual(s) responsible for oversight of climate-related risks and opportunities."
    section: "IFRS S2 Para 6(a)"
  - id: "cit-s2-002"
    text: "An entity shall disclose the role of management in the governance processes, controls and procedures used to monitor, manage and oversee climate-related risks and opportunities."
    section: "IFRS S2 Para 6(b)"
  - id: "cit-s2-003"
    text: "An entity shall disclose the amount of remuneration, in monetary or non-monetary form, linked to climate-related risks and opportunities for key management personnel."
    section: "IFRS S2 Para 6"

  # ===== 战略 =====
  - id: "cit-s2-004"
    text: "An entity shall disclose its current and anticipated financial effects of climate-related risks and opportunities, including effects on financial position, financial performance and cash flows for the short, medium and long term."
    section: "IFRS S2 Para 15(a)-(b)"
  - id: "cit-s2-005"
    text: "An entity shall disclose climate-related risks and opportunities that could reasonably be expected to affect the entity's cash flows, its access to finance or cost of capital over the short, medium and long term."
    section: "IFRS S2 Para 10"
  - id: "cit-s2-006"
    text: "An entity shall disclose its transition plan for managing climate-related risks and opportunities, including planned changes to business model, strategy and resource allocation."
    section: "IFRS S2 Para 14(a)"
  - id: "cit-s2-007"
    text: "An entity shall use climate-related scenario analysis to assess its climate resilience, including at least one scenario aligned with a 1.5°C or well-below 2°C warming pathway."
    section: "IFRS S2 Para 22"

  # ===== 风险管理 =====
  - id: "cit-s2-008"
    text: "An entity shall disclose how it identifies, assesses, prioritises and monitors climate-related risks and opportunities."
    section: "IFRS S2 Para 25(a)"
  - id: "cit-s2-009"
    text: "An entity shall disclose how climate-related risks and opportunities are managed as part of the entity's overall risk management process."
    section: "IFRS S2 Para 25(c)"

  # ===== 指标和目标 — 排放 =====
  - id: "cit-s2-010"
    text: "An entity shall disclose its absolute gross GHG emissions generated during the reporting period, measured in metric tonnes of CO2 equivalent (tCO2e), in accordance with the GHG Protocol Corporate Standards, separately for Scope 1, Scope 2 and Scope 3."
    section: "IFRS S2 Para 29(a)(i)"
  - id: "cit-s2-011"
    text: "An entity shall use GWP values from the most recent IPCC Assessment Report and disclose the source of the GWP values used."
    section: "IFRS S2 Para 29(a)(i)"
  - id: "cit-s2-012"
    text: "For Scope 2 greenhouse gas emissions, an entity shall disclose its location-based Scope 2 greenhouse gas emissions, and provide information about any contractual instruments that is necessary to inform users' understanding of the entity's Scope 2 greenhouse gas emissions."
    section: "IFRS S2 Para 29(a)(v)"
  - id: "cit-s2-013"
    text: "An entity shall disclose Scope 3 GHG emissions, including the categories included in the measurement, using the 15 categories described in the GHG Protocol Corporate Value Chain (Scope 3) Standard."
    section: "IFRS S2 Para 29(a)(vi)"
  - id: "cit-s2-014"
    text: "An entity shall disclose the measurement approach, inputs and assumptions used to calculate its GHG emissions, including the reporting boundary, consolidation approach and any changes from prior periods."
    section: "IFRS S2 Para 29(a)(iii)"
  - id: "cit-s2-015"
    text: "An entity shall disclose how it has applied the GHG Protocol Corporate Standard and the GHG Protocol Corporate Value Chain (Scope 3) Standard to measure its GHG emissions."
    section: "IFRS S2 Para 29(a)(ii)"
  - id: "cit-s2-016"
    text: "An entity shall disclose its planned use of carbon credits to offset greenhouse gas emissions to achieve any net greenhouse gas emissions target, including: the extent to which achieving the target relies on carbon credits; which third-party scheme(s) will verify or certify the carbon credits; the type of carbon credit (nature-based or technological, reduction or removal); and any other factors necessary for users to understand the credibility and integrity of the carbon credits."
    section: "IFRS S2 Para 36(e)"
  - id: "cit-s2-017"
    text: "In explaining its planned use of carbon credits, the entity shall disclose: the extent to which, and how, achieving any net greenhouse gas emissions target relies on the use of carbon credits; which third-party scheme(s) will verify or certify the carbon credits; the type of carbon credit, including whether the underlying offset will be nature-based or based on technological carbon removals, and whether achieved through carbon reduction or removal; and any other factors necessary for users to understand credibility and integrity (for example, assumptions regarding permanence)."
    section: "IFRS S2 Para 36(e)(i)-(iv)"

  # ===== 指标和目标 — 其他指标 =====
  - id: "cit-s2-018"
    text: "An entity shall disclose the amount and percentage of assets or business activities vulnerable to transition risks."
    section: "IFRS S2 Para 29(b)"
  - id: "cit-s2-019"
    text: "An entity shall disclose the amount and percentage of assets or business activities vulnerable to physical risks."
    section: "IFRS S2 Para 29(c)"
  - id: "cit-s2-020"
    text: "An entity shall disclose the amount and percentage of assets or business activities aligned with climate-related opportunities."
    section: "IFRS S2 Para 29(d)"
  - id: "cit-s2-021"
    text: "An entity shall disclose the amount of capital expenditure, financing or investment deployed toward climate-related risks and opportunities."
    section: "IFRS S2 Para 29(e)"
  - id: "cit-s2-022"
    text: "An entity shall disclose the internal carbon price(s) used by the entity and how those prices are applied in decision-making."
    section: "IFRS S2 Para 29(f)"

  # ===== 指标和目标 — 金融机构 =====
  - id: "cit-s2-023"
    text: "An entity that is a financial institution shall disclose its financed emissions, measured as the absolute gross GHG emissions associated with its lending and investment activities, in accordance with the GHG Protocol."
    section: "IFRS S2 Para 29(a)(iii), Appendix B"

  # ===== 目标 =====
  - id: "cit-s2-024"
    text: "An entity shall disclose any GHG emission reduction targets it has set, including the base period, the target period and any interim targets, and progress toward achieving those targets."
    section: "IFRS S2 Para 33"
  - id: "cit-s2-025"
    text: "For each target disclosed, an entity shall disclose the metric used to measure progress, the specific gases covered, whether the target is absolute or intensity-based, and whether it covers gross or net emissions."
    section: "IFRS S2 Para 33(a)-(h)"
  - id: "cit-s2-026"
    text: "An entity shall disclose its planned use of carbon credits to achieve any net emission reduction targets, including the type, source and volume of carbon credits expected."
    section: "IFRS S2 Para 36"
  - id: "cit-s2-027"
    text: "An entity shall disclose whether its targets have been validated or verified by a third party, and if so, by whom."
    section: "IFRS S2 Para 34(a)"

  # ===== 过渡性规定 =====
  - id: "cit-s2-028"
    text: "An entity is permitted to use the GHG Protocol Corporate Standard to measure Scope 3 emissions for the first annual reporting period in which it applies IFRS S2. An entity is not required to disclose Scope 3 emissions in the first annual reporting period."
    section: "IFRS S2 Appendix C"
  - id: "cit-s2-029"
    text: "An entity shall measure its GHG emissions in metric tonnes of CO2 equivalent (tCO2e)."
    section: "IFRS S2 Para 29(a)(i)"
  - id: "cit-s2-030"
    text: "An entity shall disclose its Scope 1 and Scope 2 GHG emissions separately from Scope 3 GHG emissions."
    section: "IFRS S2 Para 29(a)(i)"

  # ===== 治理 — 子段落 =====
  - id: "cit-s2-031"
    text: "An entity shall disclose how responsibilities for climate-related risks and opportunities are reflected in the terms of reference, mandates, role descriptions and other related policies applicable to the governance body(s) or individual(s)."
    section: "IFRS S2 Para 6(a)(i)"
  - id: "cit-s2-032"
    text: "An entity shall disclose how the governance body(s) or individual(s) determines whether appropriate skills and competencies are available or will be developed to oversee strategies designed to respond to climate-related risks and opportunities."
    section: "IFRS S2 Para 6(a)(ii)"
  - id: "cit-s2-033"
    text: "An entity shall disclose how and how often the governance body(s) or individual(s) is informed about climate-related risks and opportunities."
    section: "IFRS S2 Para 6(a)(iii)"
  - id: "cit-s2-034"
    text: "An entity shall disclose how the governance body(s) or individual(s) takes into account climate-related risks and opportunities when overseeing the entity's strategy, its decisions on major transactions and its risk management processes and related policies, including whether the body(s) or individual(s) has considered trade-offs associated with those risks and opportunities."
    section: "IFRS S2 Para 6(a)(iv)"
  - id: "cit-s2-035"
    text: "An entity shall disclose how the governance body(s) or individual(s) oversees the setting of targets related to climate-related risks and opportunities, and monitors progress towards those targets, including whether and how related performance metrics are included in remuneration policies."
    section: "IFRS S2 Para 6(a)(v)"
  - id: "cit-s2-036"
    text: "An entity shall disclose whether the management role is delegated to a specific management-level position or management-level committee and how oversight is exercised over that position or committee."
    section: "IFRS S2 Para 6(b)(i)"
  - id: "cit-s2-037"
    text: "An entity shall disclose whether management uses controls and procedures to support the oversight of climate-related risks and opportunities and, if so, how these controls and procedures are integrated with other internal functions."
    section: "IFRS S2 Para 6(b)(ii)"

  # ===== 战略 — 概述 =====
  - id: "cit-s2-038"
    text: "An entity shall disclose information to enable users to understand: the climate-related risks and opportunities that could reasonably be expected to affect the entity's prospects; the current and anticipated effects on business model and value chain; the effects on strategy and decision-making, including transition plan; the effects on financial position, performance and cash flows; and the climate resilience of the entity's strategy."
    section: "IFRS S2 Para 9(a)-(e)"

  # ===== 战略 — 风险机遇识别 =====
  - id: "cit-s2-039"
    text: "An entity shall: describe climate-related risks and opportunities that could reasonably be expected to affect the entity's prospects; explain whether each risk is a physical risk or transition risk; specify over which time horizons (short, medium or long term) the effects could reasonably be expected to occur; and explain how the entity defines 'short term', 'medium term' and 'long term' and how these definitions are linked to planning horizons."
    section: "IFRS S2 Para 10(a)-(d)"
  - id: "cit-s2-040"
    text: "In identifying climate-related risks and opportunities, the entity shall use all reasonable and supportable information that is available to the entity at the reporting date without undue cost or effort, including information about past events, current conditions and forecasts of future conditions."
    section: "IFRS S2 Para 11"
  - id: "cit-s2-041"
    text: "In identifying climate-related risks and opportunities, the entity shall refer to and consider the applicability of the industry-based disclosure topics defined in the Industry-based Guidance on Implementing IFRS S2."
    section: "IFRS S2 Para 12"

  # ===== 战略 — 商业模式和价值链 =====
  - id: "cit-s2-042"
    text: "An entity shall disclose: a description of the current and anticipated effects of climate-related risks and opportunities on the entity's business model and value chain; and a description of where in the entity's business model and value chain climate-related risks and opportunities are concentrated (for example, geographical areas, facilities and types of assets)."
    section: "IFRS S2 Para 13(a)-(b)"

  # ===== 战略 — 战略和决策 =====
  - id: "cit-s2-043"
    text: "An entity shall disclose information about how the entity has responded to, and plans to respond to, climate-related risks and opportunities in its strategy and decision-making, including: current and anticipated changes to the business model including resource allocation; current and anticipated direct mitigation and adaptation efforts; current and anticipated indirect mitigation and adaptation efforts; any climate-related transition plan including key assumptions and dependencies; and how the entity plans to achieve any climate-related targets."
    section: "IFRS S2 Para 14(a)(i)-(v)"
  - id: "cit-s2-044"
    text: "An entity shall disclose information about how the entity is resourcing, and plans to resource, the activities disclosed in accordance with paragraph 14(a)."
    section: "IFRS S2 Para 14(b)"
  - id: "cit-s2-045"
    text: "An entity shall disclose quantitative and qualitative information about the progress of plans disclosed in previous reporting periods in accordance with paragraph 14(a)."
    section: "IFRS S2 Para 14(c)"

  # ===== 战略 — 财务影响 =====
  - id: "cit-s2-046"
    text: "An entity shall disclose information that enables users to understand: the effects of climate-related risks and opportunities on the entity's financial position, financial performance and cash flows for the reporting period (current financial effects); and the anticipated effects over the short, medium and long term, taking into consideration how climate-related risks and opportunities are included in the entity's financial planning (anticipated financial effects)."
    section: "IFRS S2 Para 15(a)-(b)"
  - id: "cit-s2-047"
    text: "An entity shall disclose quantitative and qualitative information about: how climate-related risks and opportunities have affected its financial position, financial performance and cash flows for the reporting period; the climate-related risks and opportunities for which there is a significant risk of a material adjustment within the next annual reporting period to the carrying amounts of assets and liabilities; and how the entity expects its financial position to change over the short, medium and long term."
    section: "IFRS S2 Para 16(a)-(d)"
  - id: "cit-s2-048"
    text: "In providing quantitative information about anticipated financial effects, an entity may disclose a single amount or a range."
    section: "IFRS S2 Para 17"
  - id: "cit-s2-049"
    text: "In preparing disclosures about the anticipated financial effects of a climate-related risk or opportunity, an entity shall: use all reasonable and supportable information that is available to the entity at the reporting date without undue cost or effort; and use an approach that is commensurate with the skills, capabilities and resources available to the entity."
    section: "IFRS S2 Para 18(a)-(b)"
  - id: "cit-s2-050"
    text: "An entity need not provide quantitative information about the current or anticipated financial effects if: those effects are not separately identifiable; or the level of measurement uncertainty involved in estimating those effects is so high that the resulting quantitative information would not be useful."
    section: "IFRS S2 Para 19(a)-(b)"
  - id: "cit-s2-051"
    text: "If an entity determines that it need not provide quantitative information, the entity shall: explain why it has not provided quantitative information; provide qualitative information about those financial effects, including identifying line items likely to be affected; and provide quantitative information about the combined financial effects unless the entity determines that such information would not be useful."
    section: "IFRS S2 Para 21(a)-(c)"

  # ===== 战略 — 气候韧性 =====
  - id: "cit-s2-052"
    text: "An entity shall disclose its assessment of its climate resilience as at the reporting date, which shall enable users to understand: the implications for its strategy and business model; the significant areas of uncertainty considered; and the entity's capacity to adjust or adapt its strategy and business model to climate change over the short, medium and long term."
    section: "IFRS S2 Para 22(a)"
  - id: "cit-s2-053"
    text: "An entity shall disclose how and when the climate-related scenario analysis was carried out, including: information about the inputs used (scenarios, diversity, transition/physical risks, alignment with latest international agreement, relevance, time horizons, scope of operations); the key assumptions made (climate policies, macroeconomic trends, regional variables, energy usage/mix, technology developments); and the reporting period in which the analysis was carried out."
    section: "IFRS S2 Para 22(b)(i)-(iii)"

  # ===== 风险管理 — 详细 =====
  - id: "cit-s2-054"
    text: "An entity shall disclose the processes and related policies used to identify, assess, prioritise and monitor climate-related risks, including: inputs and parameters; whether and how climate-related scenario analysis is used; how the nature, likelihood and magnitude of effects are assessed; whether and how risks are prioritised relative to other types of risk; how risks are monitored; and whether and how the processes have changed compared with the previous reporting period."
    section: "IFRS S2 Para 25(a)(i)-(vi)"
  - id: "cit-s2-055"
    text: "An entity shall disclose the processes used to identify, assess, prioritise and monitor climate-related opportunities, including information about whether and how climate-related scenario analysis is used to inform the identification of climate-related opportunities."
    section: "IFRS S2 Para 25(b)"
  - id: "cit-s2-056"
    text: "An entity shall disclose the extent to which, and how, the processes for identifying, assessing, prioritising and monitoring climate-related risks and opportunities are integrated into and inform the entity's overall risk management process."
    section: "IFRS S2 Para 25(c)"

  # ===== 指标 — 详细 =====
  - id: "cit-s2-057"
    text: "An entity shall disclose its absolute gross greenhouse gas emissions generated during the reporting period, expressed as metric tonnes of CO2 equivalent, classified as: Scope 1 greenhouse gas emissions; Scope 2 greenhouse gas emissions; and Scope 3 greenhouse gas emissions."
    section: "IFRS S2 Para 29(a)(i)(1)-(3)"
  - id: "cit-s2-058"
    text: "An entity shall measure its greenhouse gas emissions in accordance with the Greenhouse Gas Protocol: A Corporate Accounting and Reporting Standard (2004) unless the entity is required, in whole or in part, by a jurisdictional authority or an exchange on which it is listed to use a different method."
    section: "IFRS S2 Para 29(a)(ii)"
  - id: "cit-s2-059"
    text: "An entity shall disclose the approach it uses to measure its greenhouse gas emissions, including: the measurement approach, inputs and assumptions; the reason why the entity has chosen the measurement approach, inputs and assumptions; and any changes made during the reporting period and the reasons for those changes."
    section: "IFRS S2 Para 29(a)(iii)(1)-(3)"
  - id: "cit-s2-060"
    text: "For Scope 1 and Scope 2 greenhouse gas emissions, an entity shall disaggregate emissions between: the consolidated accounting group; and other investees excluded from the consolidated group (for example, associates, joint ventures and unconsolidated subsidiaries)."
    section: "IFRS S2 Para 29(a)(iv)(1)-(2)"
  - id: "cit-s2-061"
    text: "For Scope 3 greenhouse gas emissions, an entity shall disclose: the categories included within the entity's measure of Scope 3 emissions, in accordance with the 15 categories in the GHG Protocol Corporate Value Chain (Scope 3) Standard; and additional information about the entity's financed emissions (Category 15), if its activities include asset management, commercial banking or insurance."
    section: "IFRS S2 Para 29(a)(vi)(1)-(2)"
  - id: "cit-s2-062"
    text: "An entity shall disclose climate-related transition risks—the amount and percentage of assets or business activities vulnerable to climate-related transition risks."
    section: "IFRS S2 Para 29(b)"
  - id: "cit-s2-063"
    text: "An entity shall disclose climate-related physical risks—the amount and percentage of assets or business activities vulnerable to climate-related physical risks."
    section: "IFRS S2 Para 29(c)"
  - id: "cit-s2-064"
    text: "An entity shall disclose climate-related opportunities—the amount and percentage of assets or business activities aligned with climate-related opportunities."
    section: "IFRS S2 Para 29(d)"
  - id: "cit-s2-065"
    text: "An entity shall disclose capital deployment—the amount of capital expenditure, financing or investment deployed towards climate-related risks and opportunities."
    section: "IFRS S2 Para 29(e)"
  - id: "cit-s2-066"
    text: "An entity shall disclose internal carbon prices: an explanation of whether and how the entity is applying a carbon price in decision-making (for example, investment decisions, transfer pricing and scenario analysis); and the price for each metric tonne of greenhouse gas emissions the entity uses to assess the costs of its greenhouse gas emissions."
    section: "IFRS S2 Para 29(f)(i)-(ii)"
  - id: "cit-s2-067"
    text: "An entity shall disclose remuneration: a description of whether and how climate-related considerations are factored into executive remuneration; and the percentage of executive management remuneration recognised in the current period that is linked to climate-related considerations."
    section: "IFRS S2 Para 29(g)(i)-(ii)"

  # ===== December 2025 修正案 =====
  - id: "cit-s2-068"
    text: "In preparing disclosures to meet the requirement in paragraph 29(a)(i)(3), an entity is permitted to limit what it includes in its measure of Scope 3 Category 15 greenhouse gas emissions to only its financed emissions—that is, emissions attributed to loans and investments made by the entity to investees or counterparties. 'Loans and investments' include loans, project finance, bonds, equity investments and undrawn loan commitments. For asset management, financed emissions include emissions attributed to assets under management. An entity is permitted to exclude greenhouse gas emissions attributable to derivatives."
    section: "IFRS S2 Para 29A (December 2025 Amendment)"
  - id: "cit-s2-069"
    text: "If an entity applies the limitation in paragraph 29A, the entity shall: explain what it has treated as a derivative to enable users to understand how it applied the limitation; and describe the financial activities it has excluded from its measure of Scope 3 Category 15 greenhouse gas emissions as a result of applying paragraph 29A, including activities associated with derivatives."
    section: "IFRS S2 Para 29B(a)-(b) (December 2025 Amendment)"
  - id: "cit-s2-070"
    text: "If an entity has included Category 15 greenhouse gas emissions in its measure of Scope 3 greenhouse gas emissions, the entity shall disclose the total Category 15 greenhouse gas emissions and the subtotal of financed emissions included in that total."
    section: "IFRS S2 Para 29C (December 2025 Amendment)"

  # ===== 目标 — 详细 =====
  - id: "cit-s2-071"
    text: "An entity shall disclose the quantitative and qualitative climate-related targets it has set to monitor progress towards achieving its strategic goals, and any targets it is required to meet by law or regulation, including any greenhouse gas emissions targets."
    section: "IFRS S2 Para 33"
  - id: "cit-s2-072"
    text: "For each target, the entity shall disclose: the metric used to set the target; the objective of the target (mitigation, adaptation or conformance); the part of the entity to which the target applies; the period over which the target applies; the base period from which progress is measured; any milestones and interim targets; if quantitative, whether absolute or intensity-based; and how the latest international agreement on climate change has informed the target."
    section: "IFRS S2 Para 33(a)-(h)"
  - id: "cit-s2-073"
    text: "An entity shall disclose information about its approach to setting and reviewing each target, and how it monitors progress against each target, including: whether the target and methodology has been validated by a third party; the entity's processes for reviewing the target; the metrics used to monitor progress; and any revisions to the target and an explanation for those revisions."
    section: "IFRS S2 Para 34(a)-(d)"
  - id: "cit-s2-074"
    text: "An entity shall disclose information about its performance against each climate-related target and an analysis of trends or changes in the entity's performance."
    section: "IFRS S2 Para 35"
  - id: "cit-s2-075"
    text: "For each greenhouse gas emissions target, an entity shall disclose: which greenhouse gases are covered by the target; whether Scope 1, Scope 2 or Scope 3 emissions are covered; whether the target is a gross or net emissions target (if net, also disclose associated gross target); whether the target was derived using a sectoral decarbonisation approach; and the entity's planned use of carbon credits to offset emissions to achieve any net target."
    section: "IFRS S2 Para 36(a)-(e)"
  - id: "cit-s2-076"
    text: "In identifying and disclosing the metrics used to set and monitor progress towards reaching a target, an entity shall refer to and consider the applicability of cross-industry metrics (paragraph 29) and industry-based metrics (paragraph 32), including those described in an applicable IFRS Sustainability Disclosure Standard, or metrics that otherwise satisfy the requirements in IFRS S1."
    section: "IFRS S2 Para 37"

  # ===== 跨行业指标使用 =====
  - id: "cit-s2-077"
    text: "In preparing disclosures to meet the requirements in paragraphs 29(b)–(d), an entity shall use all reasonable and supportable information that is available to the entity at the reporting date without undue cost or effort."
    section: "IFRS S2 Para 30"
  - id: "cit-s2-078"
    text: "In preparing disclosures to meet the requirements in paragraphs 29(b)–(g), an entity shall refer to paragraphs B64–B65."
    section: "IFRS S2 Para 31"

  # ===== 行业指标 =====
  - id: "cit-s2-079"
    text: "An entity shall disclose industry-based metrics that are associated with one or more particular business models, activities or other common features that characterise participation in an industry. In determining the industry-based metrics, the entity shall refer to and consider the applicability of the industry-based metrics associated with disclosure topics described in the Industry-based Guidance on Implementing IFRS S2."
    section: "IFRS S2 Para 32"

  # ===== 指标参考 =====
  - id: "cit-s2-080"
    text: "In preparing disclosures to meet the requirements in paragraphs 13–22, an entity shall refer to and consider the applicability of cross-industry metric categories, as described in paragraph 29, and industry-based metrics associated with disclosure topics defined in the Industry-based Guidance on Implementing IFRS S2 as described in paragraph 32."
    section: "IFRS S2 Para 23"

  # ===== Appendix B — 气候情景分析 (B1-B18) =====
  - id: "cit-s2-081"
    text: "An entity shall use an approach to climate-related scenario analysis that is commensurate with its circumstances. To assess its circumstances the entity shall consider: the entity's exposure to climate-related risks and opportunities; and the skills, capabilities and resources available to the entity for the climate-related scenario analysis."
    section: "IFRS S2 Appendix B, Para B2-B3"
  - id: "cit-s2-082"
    text: "An entity shall consider its exposure to climate-related risks and opportunities in its assessment of its circumstances and when determining the approach to use for its climate-related scenario analysis. The greater the entity's exposure to climate-related risks or opportunities, the more likely it is the entity would determine that a more technically sophisticated form of climate-related scenario analysis is required."
    section: "IFRS S2 Appendix B, Para B4-B5"
  - id: "cit-s2-083"
    text: "An entity shall consider the available skills, capabilities and resources when determining an appropriate approach to use for its climate-related scenario analysis. These skills, capabilities and resources might include both internal and external skills, capabilities and resources."
    section: "IFRS S2 Appendix B, Para B6-B7"
  - id: "cit-s2-084"
    text: "An entity shall determine an approach to climate-related scenario analysis that enables it to consider all reasonable and supportable information that is available to the entity at the reporting date without undue cost or effort. The determination involves: selecting inputs to the climate-related scenario analysis; and making analytical choices about how to carry out the analysis."
    section: "IFRS S2 Appendix B, Para B8-B9"
  - id: "cit-s2-085"
    text: "When selecting inputs to use in its climate-related scenario analysis, the entity shall consider all reasonable and supportable information—including scenarios, variables and other inputs—available to the entity at the reporting date without undue cost or effort. Publicly available climate-related scenarios from authoritative sources are considered available without undue cost or effort."
    section: "IFRS S2 Appendix B, Para B11-B12"
  - id: "cit-s2-086"
    text: "The entity shall prioritise the analytical choices that will enable it to consider all reasonable and supportable information available without undue cost or effort. Quantitative information will often enable a more robust assessment, but qualitative information (including scenario narratives), either alone or combined with quantitative data, can also provide a reasonable and supportable basis."
    section: "IFRS S2 Appendix B, Para B14-B15"
  - id: "cit-s2-087"
    text: "An entity might use a simpler approach to climate-related scenario analysis, such as qualitative scenario narratives, if appropriate to its circumstances. An entity with high exposure to climate-related risks and opportunities, and with access to necessary skills, capabilities or resources, is required to apply a more advanced quantitative approach."
    section: "IFRS S2 Appendix B, Para B17"
  - id: "cit-s2-088"
    text: "An entity might carry out its climate-related scenario analysis in line with its strategic planning cycle, including a multi-year cycle (for example, every three to five years). The entity shall—at a minimum—update its climate-related scenario analysis in line with its strategic planning cycle. However, an assessment of the entity's resilience is required to be carried out annually."
    section: "IFRS S2 Appendix B, Para B18"

  # ===== Appendix B — GHG 计量 (B19-B29) =====
  - id: "cit-s2-089"
    text: "An entity might have a different reporting period from some or all of the entities in its value chain. In such circumstances, the entity is permitted to measure its greenhouse gas emissions using information for reporting periods that are different from its own, on the condition that: the entity uses the most recent data available; the length of the reporting periods is the same; and the entity discloses the effects of significant events and changes."
    section: "IFRS S2 Appendix B, Para B19-B20"
  - id: "cit-s2-090"
    text: "If an entity uses direct measurement to measure its greenhouse gas emissions, the entity is required to convert the seven constituent greenhouse gases into a CO2 equivalent value using global warming potential values based on a 100-year time horizon, from the latest IPCC assessment available at the reporting date, unless required by a jurisdictional authority or exchange to use different values."
    section: "IFRS S2 Appendix B, Para B21"
  - id: "cit-s2-091"
    text: "If an entity uses emission factors to estimate its greenhouse gas emissions, the entity shall use—as its basis for measuring its greenhouse gas emissions—the emission factors that best represent the entity's activity. If these emission factors have already converted the constituent gases into CO2 equivalent values, the entity is not required to recalculate using GWP values."
    section: "IFRS S2 Appendix B, Para B22"
  - id: "cit-s2-092"
    text: "An entity shall apply the requirements in the Greenhouse Gas Protocol: A Corporate Accounting and Reporting Standard (2004) only to the extent that they do not conflict with the requirements in IFRS S2. An entity is required to use the GHG Protocol unless required by a jurisdictional authority or exchange to use a different method."
    section: "IFRS S2 Appendix B, Para B23-B25"
  - id: "cit-s2-093"
    text: "As part of the measurement approach disclosure, the entity shall include information about: the measurement approach used in accordance with the GHG Protocol (equity share or control approach); the applicable method if not using the GHG Protocol; and the emission factors used."
    section: "IFRS S2 Appendix B, Para B26"
  - id: "cit-s2-094"
    text: "When the entity discloses its greenhouse gas emissions measured in accordance with the GHG Protocol, the entity is required to use the equity share or control approach and shall disclose: the approach used; and the reason for the choice and how it relates to the disclosure objective."
    section: "IFRS S2 Appendix B, Para B27"
  - id: "cit-s2-095"
    text: "This Standard does not specify emission factors an entity is required to use. Instead, the entity is required to use emission factors that best represent the entity's activity as its basis for measuring its greenhouse gas emissions."
    section: "IFRS S2 Appendix B, Para B29"

  # ===== Appendix B — Scope 2 (B30-B31) =====
  - id: "cit-s2-096"
    text: "An entity is required to disclose its Scope 2 greenhouse gas emissions using a location-based approach and is required to provide information about contractual instruments only if such instruments exist and information about them informs users' understanding of an entity's Scope 2 greenhouse gas emissions."
    section: "IFRS S2 Appendix B, Para B30"
  - id: "cit-s2-097"
    text: "Contractual instruments are any type of contract between an entity and another party for the sale and purchase of energy bundled with attributes about the energy generation or for unbundled energy attribute claims. Various types of contractual instruments are available in different markets and the entity might disclose information about its market-based Scope 2 greenhouse gas emissions as part of its disclosure."
    section: "IFRS S2 Appendix B, Para B31"

  # ===== Appendix B — Scope 3 框架 (B32-B57) =====
  - id: "cit-s2-098"
    text: "An entity shall consider its entire value chain (upstream and downstream) and shall consider all 15 categories of Scope 3 greenhouse gas emissions. The entity shall disclose which of these categories are included in its Scope 3 greenhouse gas emissions disclosures."
    section: "IFRS S2 Appendix B, Para B32-B33"
  - id: "cit-s2-099"
    text: "On the occurrence of a significant event or a significant change in circumstances, an entity shall reassess the scope of all affected climate-related risks and opportunities throughout its value chain, including reassessing which Scope 3 categories and entities to include. Such events include: a significant change in the value chain; a significant change in business model or corporate structure; and a significant change in exposure to climate-related risks."
    section: "IFRS S2 Appendix B, Para B34-B35"
  - id: "cit-s2-100"
    text: "An entity's measurement of Scope 3 greenhouse gas emissions is likely to include the use of estimation. In measuring Scope 3 emissions the entity shall use a measurement approach, inputs and assumptions that result in a faithful representation. The entity shall prioritise inputs and assumptions using these characteristics: data based on direct measurement; data from specific activities within the value chain; timely data that faithfully represents jurisdiction and technology; and data that has been verified."
    section: "IFRS S2 Appendix B, Para B40-B42"
  - id: "cit-s2-101"
    text: "Of direct measurement and estimation methods—and with all else being equal—an entity shall prioritise direct measurement. 'Direct measurement' refers to the direct monitoring of greenhouse gas emissions and provides the most accurate evidence. However, Scope 3 data will likely include estimation due to challenges associated with direct measurement."
    section: "IFRS S2 Appendix B, Para B43-B45"
  - id: "cit-s2-102"
    text: "Primary data for Scope 3 includes data provided by suppliers or other entities in the value chain related to specific activities (for example, meter readings, utility bills, supplier-specific emission factors). Secondary data is not obtained directly from specific activities and includes industry-average data from published databases, government statistics, literature studies and industry associations."
    section: "IFRS S2 Appendix B, Para B46-B49"
  - id: "cit-s2-103"
    text: "If an entity uses secondary data, it shall prioritise: activity or emissions data based on or representing the technology used; data representing the jurisdiction in which the activity happened; and data that is timely and representative of the entity's value chain activity during the reporting period."
    section: "IFRS S2 Appendix B, Para B50-B52"
  - id: "cit-s2-104"
    text: "An entity shall prioritise Scope 3 greenhouse gas emissions data that is verified. Verification can provide users with confidence that the information is complete, neutral and accurate. Verified data might include data that has been internally or externally verified."
    section: "IFRS S2 Appendix B, Para B53-B54"
  - id: "cit-s2-105"
    text: "As part of the measurement approach disclosure, the entity shall disclose: the extent to which Scope 3 emissions are measured using inputs from specific activities within the value chain; and the extent to which Scope 3 emissions are measured using inputs that are verified."
    section: "IFRS S2 Appendix B, Para B55-B56"
  - id: "cit-s2-106"
    text: "This Standard includes the presumption that Scope 3 greenhouse gas emissions can be estimated reliably using secondary data and industry averages. In those rare cases when an entity determines it is impracticable to estimate its Scope 3 emissions, the entity shall disclose how it is managing its Scope 3 emissions."
    section: "IFRS S2 Appendix B, Para B57"

  # ===== Appendix B — 融资排放 (B58-B63A) =====
  - id: "cit-s2-107"
    text: "An entity that participates in one or more of the following financial activities is required to disclose additional and specific information about its financed emissions (part of Category 15): asset management; commercial banking; and insurance."
    section: "IFRS S2 Appendix B, Para B58-B60"
  - id: "cit-s2-108"
    text: "An entity that participates in asset management activities shall disclose: absolute gross financed emissions disaggregated by Scope 1, 2 and 3; total AUM included in the disclosure; percentage of total AUM included; and the methodology used including allocation method."
    section: "IFRS S2 Appendix B, Para B61(a)-(d)"
  - id: "cit-s2-109"
    text: "An entity that participates in commercial banking activities shall disclose: absolute gross financed emissions disaggregated by Scope 1, 2 and 3 for each industry by asset class; gross exposure to each industry by asset class; percentage of gross exposure included; and the methodology used including allocation method."
    section: "IFRS S2 Appendix B, Para B62(a)-(d)"
  - id: "cit-s2-110"
    text: "When disaggregating financed emissions by industry, an entity shall select an industry-classification system that enables it to classify investees or counterparties in a manner that results in information that enables users to understand the entity's exposure to climate-related transition risks. A commonly used system is more likely to support comparability."
    section: "IFRS S2 Appendix B, Para B62A(a)-(b)"
  - id: "cit-s2-111"
    text: "When disaggregating financed emissions by asset class, the disclosure shall include loans, project finance, bonds, equity investments and undrawn loan commitments. If the entity includes additional asset classes, it shall explain why inclusion provides relevant information."
    section: "IFRS S2 Appendix B, Para B62A(b)"
  - id: "cit-s2-112"
    text: "An entity that participates in insurance activities shall disclose: absolute gross financed emissions disaggregated by Scope 1, 2 and 3 for each industry by asset class; gross exposure; percentage included; and the methodology used including allocation method."
    section: "IFRS S2 Appendix B, Para B63(a)-(d)"
  - id: "cit-s2-113"
    text: "When disaggregating insurance financed emissions by asset class, the disclosure shall include loans, bonds, equity investments and undrawn loan commitments."
    section: "IFRS S2 Appendix B, Para B63A(b)"

  # ===== Appendix B — 跨行业指标 (B64-B65) =====
  - id: "cit-s2-114"
    text: "In preparing disclosures to fulfil the requirements in paragraph 29(b)–(g), an entity shall: consider time horizons; consider where risks and opportunities are concentrated; consider information about financial effects; consider whether industry-based metrics could satisfy requirements; and consider connections with related financial statements."
    section: "IFRS S2 Appendix B, Para B64-B65"

  # ===== Appendix B — 目标指南 (B66-B71) =====
  - id: "cit-s2-115"
    text: "If the climate-related target is quantitative, an entity is required to describe whether the target is an absolute target or an intensity target. An absolute target is defined as a total amount of a measure or a change in the total amount, whereas an intensity target is defined as a ratio of a measure, or a change in the ratio, to a business metric."
    section: "IFRS S2 Appendix B, Para B66"
  - id: "cit-s2-116"
    text: "In identifying and disclosing the metric used to set a climate-related target and measure progress, an entity shall consider the cross-industry metrics and industry-based metrics. If the metric has been developed by the entity, the entity shall disclose information about that metric in accordance with paragraph 50 of IFRS S1."
    section: "IFRS S2 Appendix B, Para B67"
  - id: "cit-s2-117"
    text: "Gross greenhouse gas emissions targets reflect the total changes in greenhouse gas emissions planned within the entity's value chain. Net greenhouse gas emissions targets are the entity's targeted gross emissions minus any planned offsetting efforts. If an entity has a net target it is required to also disclose a gross target. A net target cannot obscure information about gross targets."
    section: "IFRS S2 Appendix B, Para B68-B69"
  - id: "cit-s2-118"
    text: "Any information about the planned use of carbon credits shall clearly demonstrate the extent to which these carbon credits are relied on to achieve the net greenhouse gas emissions targets. An entity is required to disclose only its planned use of carbon credits, but might also include information about carbon credits already purchased that are planned to be used."
    section: "IFRS S2 Appendix B, Para B70-B71"

  # ===== Appendix C — 过渡规定 =====
  - id: "cit-s2-119"
    text: "An entity is not required to provide the disclosures specified in this Standard for any period before the date of initial application. An entity is not required to disclose comparative information in the first annual reporting period."
    section: "IFRS S2 Appendix C, Para C3"
  - id: "cit-s2-120"
    text: "In the first annual reporting period, the entity is permitted to use one or both of these reliefs: if the entity used a method other than the GHG Protocol in the preceding period, it is permitted to continue using that other method; and an entity is not required to disclose its Scope 3 emissions (including financed emissions)."
    section: "IFRS S2 Appendix C, Para C4(a)-(b)"
  - id: "cit-s2-121"
    text: "If an entity uses the reliefs, the entity is permitted to continue to use that relief for presenting comparative information in subsequent reporting periods."
    section: "IFRS S2 Appendix C, Para C5"
  - id: "cit-s2-122"
    text: "For the December 2025 amendments, in the first annual reporting period: if the entity changed how it measures GHG emissions, it shall adjust comparative information; if the entity disclosed Scope 3 Category 15 emissions, it shall adjust to provide total Category 15 and financed emissions subtotal; and if the entity disclosed disaggregated financed emissions by industry, it shall adjust to reflect the selected industry-classification system."
    section: "IFRS S2 Appendix C, Para C6(a)-(c)"

rules:
  # ================================================================
  # 治理支柱 (Governance Pillar)
  # ================================================================

  - id: "gf-s2-001"
    name: "气候治理机构披露"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "input.entity.reporting_year"}, null]}
    assertion:
      {"!=": [{"var": "output.governance.climate_governance_body"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 6(a): 须披露负责监督气候相关风险和机遇的治理机构或个人"
    citation: "cit-s2-001"

  - id: "gf-s2-002"
    name: "管理层角色披露"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "input.entity.reporting_year"}, null]}
    assertion:
      {"!=": [{"var": "output.governance.management_role"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 6(b): 须披露管理层在气候风险监控和管理中的角色"
    citation: "cit-s2-002"

  - id: "gf-s2-003"
    name: "高管薪酬气候挂钩比例"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "input.entity.reporting_year"}, null]}
    assertion:
      {"!=": [{"var": "output.governance.climate_linked_remuneration_pct"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 6: 须披露与气候相关风险和机遇挂钩的关键管理人员薪酬金额或比例"
    citation: "cit-s2-003"

  # ================================================================
  # 战略支柱 (Strategy Pillar)
  # ================================================================

  - id: "gf-s2-004"
    name: "气候风险和机遇识别"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "input.entity.reporting_year"}, null]}
    assertion:
      {"!=": [{"var": "output.strategy.climate_risks_opportunities"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 10: 须识别并披露可能影响现金流、融资渠道或资本成本的气候相关风险和机遇"
    citation: "cit-s2-005"

  - id: "gf-s2-005"
    name: "气候风险时间维度"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "output.strategy.climate_risks_opportunities"}, null]}
    assertion:
      "and": [
        {"!=": [{"var": "output.strategy.short_term_risks"}, null]},
        {"!=": [{"var": "output.strategy.medium_term_risks"}, null]},
        {"!=": [{"var": "output.strategy.long_term_risks"}, null]}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 10: 须按短期、中期和长期披露气候相关风险"
    citation: "cit-s2-005"

  - id: "gf-s2-006"
    name: "转型计划披露"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "input.entity.reporting_year"}, null]}
    assertion:
      {"or": [
        {"!=": [{"var": "output.strategy.transition_plan"}, null]},
        {"and": [
          {"!=": [{"var": "input.justifications.gf-s2-006"}, null]},
          {"==": [{"var": "input.entity.has_transition_plan"}, false]}
        ]}
      ]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 14(a): 须披露气候转型计划，包括商业模式、战略和资源配置的计划性变化"
    citation: "cit-s2-006"

  - id: "gf-s2-007"
    name: "财务影响披露"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "input.entity.reporting_year"}, null]}
    assertion:
      {"!=": [{"var": "output.strategy.financial_effects"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 15(a)-(b): 须披露气候风险和机遇对财务状况、财务绩效和现金流的当前及预期影响"
    citation: "cit-s2-004"

  - id: "gf-s2-008"
    name: "气候韧性情景分析"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "input.entity.reporting_year"}, null]}
    assertion:
      {"or": [
        {"!=": [{"var": "output.strategy.scenario_analysis"}, null]},
        {"!=": [{"var": "input.justifications.gf-s2-008"}, null]}
      ]}
    on_fail: "require_justification"
    on_fail_message: "IFRS S2 Para 22: 须使用气候情景分析评估实体气候韧性，至少包含1.5度或远低于2度升温路径"
    citation: "cit-s2-007"

  # ================================================================
  # 风险管理支柱 (Risk Management Pillar)
  # ================================================================

  - id: "gf-s2-009"
    name: "气候风险识别流程"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "input.entity.reporting_year"}, null]}
    assertion:
      {"!=": [{"var": "output.risk_management.risk_identification_process"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 25(a): 须披露气候风险的识别、评估、优先级排序和监控流程"
    citation: "cit-s2-008"

  - id: "gf-s2-010"
    name: "气候风险整体管理融合"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "input.entity.reporting_year"}, null]}
    assertion:
      {"!=": [{"var": "output.risk_management.overall_risk_integration"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 25(c): 须披露气候风险管理如何融入整体风险管理流程"
    citation: "cit-s2-009"

  # ================================================================
  # 指标和目标支柱 — GHG 排放 (Metrics & Targets — GHG Emissions)
  # ================================================================

  - id: "gf-s2-011"
    name: "Scope 1 绝对排放量披露"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "input.entity.reporting_year"}, null]}
    assertion:
      {"!=": [{"var": "output.metrics.ghg.scope1_emissions_tco2e"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 29(a)(i): 须披露Scope 1温室气体绝对排放总量（tCO2e）"
    citation: "cit-s2-010"

  - id: "gf-s2-012"
    name: "Scope 2 排放双方法披露"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "input.entity.reporting_year"}, null]}
    assertion:
      "and": [
        {"!=": [{"var": "output.metrics.ghg.scope2_location_based_tco2e"}, null]},
        {"!=": [{"var": "output.metrics.ghg.scope2_market_based_tco2e"}, null]}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 29(a)(v): 须分别用地域法(location-based)和市场法(market-based)披露Scope 2排放"
    citation: "cit-s2-012"

  - id: "gf-s2-013"
    name: "Scope 3 排放总量披露"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "input.entity.reporting_year"}, null]}
    assertion:
      {"or": [
        {"!=": [{"var": "output.metrics.ghg.scope3_emissions_tco2e"}, null]},
        {"!=": [{"var": "input.justifications.gf-s2-013"}, null]}
      ]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 29(a)(vi): 须披露Scope 3排放量（首年可豁免）"
    citation: "cit-s2-013"

  - id: "gf-s2-014"
    name: "Scope 3 类别覆盖披露"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition:
      {"!=": [{"var": "output.metrics.ghg.scope3_emissions_tco2e"}, null]}
    assertion:
      {"!=": [{"var": "output.metrics.ghg.scope3_categories_included"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 29(a)(vi): 须披露Scope 3排放所涵盖的15个类别"
    citation: "cit-s2-013"

  - id: "gf-s2-015"
    name: "GHG 排放计量单位校验"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "output.metrics.ghg.scope1_emissions_tco2e"}, null]}
    assertion:
      {"==": [{"var": "output.metrics.ghg.unit"}, "tCO2e"]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 29(a)(i): GHG排放量须以tCO2e为单位披露"
    citation: "cit-s2-029"

  - id: "gf-s2-016"
    name: "GWP 来源版本披露"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "output.metrics.ghg.scope1_emissions_tco2e"}, null]}
    assertion:
      {"in": [{"var": "output.metrics.ghg.gwp_source"}, ["IPCC_AR6", "IPCC_AR7"]]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 29(a)(i): 须使用最新IPCC评估报告的GWP值（IFRS S2发布时为AR6，AR7发布后应升级）"
    citation: "cit-s2-011"

  - id: "gf-s2-017"
    name: "Scope 1/2 与 Scope 3 分别披露"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "output.metrics.ghg.scope1_emissions_tco2e"}, null]}
    assertion:
      {"and": [
        {"!=": [{"var": "output.metrics.ghg.scope1_emissions_tco2e"}, null]},
        {"!=": [{"var": "output.metrics.ghg.scope2_location_based_tco2e"}, null]}
      ]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 29(a)(i): 须将Scope 1/2与Scope 3排放分别披露"
    citation: "cit-s2-030"

  - id: "gf-s2-018"
    name: "核算方法论和假设披露"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "output.metrics.ghg.scope1_emissions_tco2e"}, null]}
    assertion:
      "and": [
        {"!=": [{"var": "output.metrics.ghg.measurement_approach"}, null]},
        {"!=": [{"var": "output.metrics.ghg.reporting_boundary"}, null]},
        {"!=": [{"var": "output.metrics.ghg.consolidation_approach"}, null]}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Para 29(a)(iii): 须披露GHG排放的计量方法、输入假设、报告边界和合并方法"
    citation: "cit-s2-014"

  - id: "gf-s2-019"
    name: "GHG Protocol 标准应用声明"
    type: "requirement"
    priority: "MUST"
