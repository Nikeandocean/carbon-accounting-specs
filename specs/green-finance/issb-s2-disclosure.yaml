  - id: "gf-s2-094"
    name: "绝对目标与强度目标区分（附录B）"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition:
      {"and": [
        {"!=": [{"var": "output.targets.emission_reduction_targets"}, null]},
        {"==": [{"var": "output.targets.emission_reduction_targets.is_quantitative"}, true]}
