    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "output.metrics.ghg.scope1_emissions_tco2e"}, null]}
    assertion:
      {"!=": [{"var": "output.metrics.ghg.emission_factor_representativeness"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Appendix B, Para B22/B29: 须使用最能代表实体活动的排放因子"
    citation: "cit-s2-091"

  - id: "gf-s2-081"
    name: "GHG Protocol 方法选择声明"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "output.metrics.ghg.scope1_emissions_tco2e"}, null]}
    assertion:
      {"and": [
        {"!=": [{"var": "output.metrics.ghg.consolidation_approach"}, null]},
        {"!=": [{"var": "output.metrics.ghg.consolidation_approach_reason"}, null]}
      ]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Appendix B, Para B27: 须披露使用股权法还是控制法，以及选择原因"
    citation: "cit-s2-094"

  # ================================================================
  # Appendix B — Scope 2 (Contractual Instruments)
