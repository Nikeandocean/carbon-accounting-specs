    priority: "SHOULD"
    severity: "warning"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "output.metrics.ghg.scope3_emissions_tco2e"}, null]}
    assertion:
      {"or": [
        {"!=": [{"var": "output.metrics.ghg.scope3_reassessment_trigger"}, null]},
        {"==": [{"var": "output.metrics.ghg.scope3_significant_changes_count"}, 0]}
      ]}
    on_fail: "require_justification"
    on_fail_message: "IFRS S2 Appendix B, Para B34-B35: 发生重大事件或重大变化时，须重新评估Scope 3涵盖范围"
    citation: "cit-s2-099"

  - id: "gf-s2-085"
    name: "Scope 3 数据优先级框架"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "output.metrics.ghg.scope3_emissions_tco2e"}, null]}
    assertion:
      {"and": [
        {"!=": [{"var": "output.metrics.ghg.scope3_data_prioritisation"}, null]},
        {"!=": [{"var": "output.metrics.ghg.scope3_primary_data_pct"}, null]}
      ]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Appendix B, Para B40-B42: 须披露Scope 3数据优先级方法，包括一级数据（直接来自价值链）的使用比例"
    citation: "cit-s2-100"

  - id: "gf-s2-086"
    name: "Scope 3 数据验证程度"
    type: "requirement"
    priority: "SHOULD"
    severity: "warning"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "output.metrics.ghg.scope3_emissions_tco2e"}, null]}
    assertion:
      {"or": [
        {"!=": [{"var": "output.metrics.ghg.scope3_verified_data_pct"}, null]},
        {"!=": [{"var": "input.justifications.gf-s2-086"}, null]}
      ]}
    on_fail: "require_justification"
    on_fail_message: "IFRS S2 Appendix B, Para B53-B56: 须披露Scope 3数据中已验证数据的比例"
    citation: "cit-s2-104"

  - id: "gf-s2-087"
    name: "Scope 3 不可计量时的披露"
    type: "requirement"
    priority: "SHOULD"
    severity: "warning"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "output.metrics.ghg.scope3_emissions_tco2e"}, null]}
    assertion:
      {"or": [
        {"!=": [{"var": "output.metrics.ghg.scope3_estimation_reliable"}, null]},
        {"!=": [{"var": "output.metrics.ghg.scope3_management_approach"}, null]}
      ]}
    on_fail: "require_justification"
    on_fail_message: "IFRS S2 Appendix B, Para B57: 若确定Scope 3排放不可可靠计量，须披露如何管理Scope 3排放"
    citation: "cit-s2-106"

