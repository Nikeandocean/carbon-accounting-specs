    assertion:
      {"or": [
        {"!=": [{"var": "output.methodology.amendment_transition_adjustments"}, null]},
        {"!=": [{"var": "input.justifications.gf-s2-099"}, null]}
      ]}
    on_fail: "require_justification"
    on_fail_message: "IFRS S2 Appendix C, Para C6: 首次应用December 2025修正案时，须调整比较信息（排放计量方法、Category 15、行业分类）"
