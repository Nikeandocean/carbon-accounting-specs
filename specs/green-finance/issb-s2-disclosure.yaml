    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition:
      {"==": [{"var": "output.targets.emission_reduction_targets.gross_or_net"}, "net"]}
    assertion:
      {"and": [
        {"!=": [{"var": "output.targets.emission_reduction_targets.associated_gross_target"}, null]},
        {"!=": [{"var": "output.targets.emission_reduction_targets.gross_target_visible"}, null]}
      ]}
