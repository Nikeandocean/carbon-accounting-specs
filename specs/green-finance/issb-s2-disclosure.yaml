      ]}
    assertion:
      {"!=": [{"var": "output.targets.carbon_credit_reliance_extent"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Appendix B, Para B70-B71: 碳信用使用计划须清楚说明依赖碳信用实现净目标的程度"
    citation: "cit-s2-118"

