    name: "资产管理融资排放披露"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition:
      {"==": [{"var": "input.entity.asset_management_activities"}, true]}
    assertion:
      {"and": [
        {"!=": [{"var": "output.metrics.ghg.financed_emissions_scope1_tco2e"}, null]},
        {"!=": [{"var": "output.metrics.ghg.financed_emissions_scope2_tco2e"}, null]},
        {"!=": [{"var": "output.metrics.ghg.financed_emissions_scope3_tco2e"}, null]},
        {"!=": [{"var": "output.metrics.ghg.aum_included_amount"}, null]},
        {"!=": [{"var": "output.metrics.ghg.aum_included_pct"}, null]}
      ]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Appendix B, Para B61: 资产管理机构须披露融资排放（分Scope 1/2/3）、纳入的AUM金额和比例、计算方法"
    citation: "cit-s2-108"

  - id: "gf-s2-089"
    name: "商业银行融资排放披露"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition:
      {"==": [{"var": "input.entity.commercial_banking_activities"}, true]}
    assertion:
      {"and": [
        {"!=": [{"var": "output.metrics.ghg.financed_emissions_by_industry_asset_class"}, null]},
        {"!=": [{"var": "output.metrics.ghg.gross_exposure_by_industry_asset_class"}, null]},
        {"!=": [{"var": "output.metrics.ghg.gross_exposure_included_pct"}, null]}
      ]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Appendix B, Para B62: 商业银行须按行业和资产类别披露融资排放、风险敞口和纳入比例"
    citation: "cit-s2-109"

  - id: "gf-s2-090"
    name: "融资排放行业分类体系"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition:
      {"or": [
        {"==": [{"var": "input.entity.commercial_banking_activities"}, true]},
        {"==": [{"var": "input.entity.insurance_activities"}, true]}
      ]}
    assertion:
      {"and": [
        {"!=": [{"var": "output.metrics.ghg.industry_classification_system"}, null]},
        {"!=": [{"var": "output.metrics.ghg.industry_classification_system_rationale"}, null]}
      ]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Appendix B, Para B62A/B63A: 须选择并披露行业分类体系，优先使用通用体系以支持可比性"
    citation: "cit-s2-110"

  - id: "gf-s2-091"
    name: "融资排放资产类别覆盖"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    lifecycle: "post_audit"
    condition:
      {"or": [
        {"==": [{"var": "input.entity.commercial_banking_activities"}, true]},
        {"==": [{"var": "input.entity.insurance_activities"}, true]}
      ]}
    assertion:
      {"and": [
        {"!=": [{"var": "output.metrics.ghg.asset_classes_included"}, null]},
        {"in": [{"var": "output.metrics.ghg.asset_classes_included"}, ["loans,bonds,equity,undrawn_commitments,project_finance"]]}
      ]}
    on_fail: "raise_fatal"
    on_fail_message: "IFRS S2 Appendix B, Para B62A/B63A: 资产类别须包括贷款、项目融资、债券、股权投资和未提取承诺"
    citation: "cit-s2-111"

  - id: "gf-s2-092"
    name: "保险融资排放披露"
