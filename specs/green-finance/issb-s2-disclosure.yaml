        {"!=": [{"var": "input.justifications.gf-s2-093"}, null]}
      ]}
    on_fail: "require_justification"
    on_fail_message: "IFRS S2 Appendix B, Para B64-B65: 披露29(b)-(g)指标时，须考虑时间维度、风险集中度、财务影响、行业指标适用性和与财务报表的关联"
