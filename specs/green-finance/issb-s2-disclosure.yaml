    on_fail: "raise_warning"
    on_fail_message: "IFRS S2 Appendix C, Para C4: 首年应用IFRS S2时，须声明是否使用过渡豁免（其他方法继续使用、Scope 3豁免）"
    citation: "cit-s2-120"

