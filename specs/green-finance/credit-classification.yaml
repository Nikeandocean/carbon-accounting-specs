meta:
  id: "green-finance/credit-classification"
  version: "2.0.0"
  source: "银保监会《绿色信贷统计制度》"
  source_ref: "中国银行保险监督管理委员会 银监办发〔2013〕125号 绿色信贷统计制度"
  layer: "schema"
  description: |
    绿色信贷分类标准，基于银保监会《绿色信贷统计制度》12大类分类体系。
    用于判定贷款项目是否属于绿色信贷、关注类或不合格类别。
    分类逻辑：绿色信贷（项目属于12大类且排放达标）→ 关注类（用途不明确或部分涉及高碳）→ 不合格（用于"两高一剩"）。

# ============================================================
# Citations: 银保监会绿色信贷统计制度 12大类及管理要求
# ============================================================
citations:
  - id: "cit-gf-cc-001"
    text: |
      绿色信贷统计制度将绿色信贷支持范围划分为12大类：
      1. 绿色农业开发项目
      2. 绿色林业开发项目
      3. 工业节能节水环保项目
      4. 自然保护、生态修复及灾害防控项目
      5. 资源循环利用项目
      6. 垃圾处理及污染防治项目
      7. 可再生能源及清洁能源项目
      8. 农村及城市水项目
      9. 建筑节能及绿色建筑项目
      10. 绿色交通运输项目
      11. 节能环保服务项目
      12. 采用国际惯例或国际标准的境外项目
    section: "银监办发〔2013〕125号 附件1 绿色信贷统计报表 绿色贷款统计类别"

  - id: "cit-gf-cc-002"
    text: |
      支持节能环保、新能源、新能源汽车等三大战略性新兴产业生产制造端的贷款，
      纳入绿色信贷统计口径。具体包括：
      - 节能环保产业：高效节能设备制造、先进环保设备制造、资源循环利用设备制造
      - 新能源产业：太阳能设备制造、风力发电设备制造、生物质能设备制造
      - 新能源汽车产业：整车制造、动力电池制造、电机及控制系统制造
    section: "银监办发〔2013〕125号 附件1 战略性新兴产业生产制造端贷款"

  - id: "cit-gf-cc-003"
    text: |
      关注类贷款是指贷款用途不明确，或部分涉及高碳行业但尚未达到不合格标准的贷款。
      银行应加强贷后管理，跟踪资金实际用途，确保贷款资金未流入限制类行业。
    section: "银监办发〔2013〕125号 第二章 贷款分类管理"

  - id: "cit-gf-cc-004"
    text: |
      不合格贷款是指明确用于'两高一剩'（高污染、高耗能、产能过剩）行业的贷款，
      不得纳入绿色信贷统计口径。'两高一剩'行业包括但不限于：
      钢铁、水泥、电解铝、平板玻璃、煤化工、焦化、电石、铁合金等。
    section: "银监办发〔2013〕125号 第二章 贷款分类管理"

  - id: "cit-gf-cc-005"
    text: |
      绿色农业开发项目包括：有机农业、生态农业、节水灌溉、农业废弃物资源化利用、
      农村沼气工程、农业面源污染治理等项目。
    section: "银监办发〔2013〕125号 附件1 第1类 绿色农业开发项目"

  - id: "cit-gf-cc-006"
    text: |
      绿色林业开发项目包括：植树造林、森林抚育、湿地保护、防沙治沙、
      林业碳汇、林下经济等项目。
    section: "银监办发〔2013〕125号 附件1 第2类 绿色林业开发项目"

  - id: "cit-gf-cc-007"
    text: |
      工业节能节水环保项目包括：工业余热余压利用、工业节水改造、
      工业锅炉窑炉节能改造、电机系统节能改造、能量系统优化等项目。
    section: "银监办发〔2013〕125号 附件1 第3类 工业节能节水环保项目"

  - id: "cit-gf-cc-008"
    text: |
      自然保护、生态修复及灾害防控项目包括：自然保护区建设、矿山地质环境恢复治理、
      水土流失治理、荒漠化治理、地质灾害防治等项目。
    section: "银监办发〔2013〕125号 附件1 第4类 自然保护生态修复及灾害防控项目"

  - id: "cit-gf-cc-009"
    text: |
      资源循环利用项目包括：废旧物资回收利用、再生资源加工利用、
      机电产品再制造、秸秆综合利用、餐厨废弃物资源化利用等项目。
    section: "银监办发〔2013〕125号 附件1 第5类 资源循环利用项目"

  - id: "cit-gf-cc-010"
    text: |
      垃圾处理及污染防治项目包括：城镇生活垃圾处理、危险废物处置、
      污水处理、大气污染治理、土壤污染治理、固体废物处理等项目。
    section: "银监办发〔2013〕125号 附件1 第6类 垃圾处理及污染防治项目"

  - id: "cit-gf-cc-011"
    text: |
      可再生能源及清洁能源项目包括：风力发电、太阳能发电、生物质能发电、
      水力发电、地热能利用、潮汐能利用、垃圾焚烧发电等项目。
    section: "银监办发〔2013〕125号 附件1 第7类 可再生能源及清洁能源项目"

  - id: "cit-gf-cc-012"
    text: |
      农村及城市水项目包括：农村饮水安全工程、城市供水管网改造、
      城市排水防涝设施、海绵城市建设、水生态修复等项目。
    section: "银监办发〔2013〕125号 附件1 第8类 农村及城市水项目"

  - id: "cit-gf-cc-013"
    text: |
      建筑节能及绿色建筑项目包括：新建绿色建筑、既有建筑节能改造、
      绿色建材生产、建筑可再生能源应用等项目。
      绿色建筑应达到国家绿色建筑评价标准二星级及以上。
    section: "银监办发〔2013〕125号 附件1 第9类 建筑节能及绿色建筑项目"

  - id: "cit-gf-cc-014"
    text: |
      绿色交通运输项目包括：城市轨道交通、新能源汽车推广、电动物流车、
      清洁能源船舶、港口岸电、充电桩/换电站建设、铁路电气化改造等项目。
      传统燃油车产能扩张项目不属于绿色信贷。
    section: "银监办发〔2013〕125号 附件1 第10类 绿色交通运输项目"

  - id: "cit-gf-cc-015"
    text: |
      节能环保服务项目包括：合同能源管理、节能咨询、环境监测、
      碳排放权交易服务、清洁生产审核、环境影响评价等项目。
    section: "银监办发〔2013〕125号 附件1 第11类 节能环保服务项目"

  - id: "cit-gf-cc-016"
    text: |
      采用国际惯例或国际标准的境外项目包括：符合赤道原则、
      国际金融公司（IFC）绩效标准、联合国环境规划署金融倡议（UNEP FI）等
      国际惯例或国际标准的境外项目融资。
    section: "银监办发〔2013〕125号 附件1 第12类 采用国际惯例或国际标准的境外项目"

  - id: "cit-gf-cc-017"
    text: |
      贷款项目的碳排放强度应低于行业基准值。若项目排放强度超过行业平均水平的120%，
      应归入关注类；超过150%的，应归入不合格类别。
    section: "银监办发〔2013〕125号 第三章 排放强度评估"

  - id: "cit-gf-cc-018"
    text: |
      借款人在贷款申请日前两年内存在环境违法行为（行政处罚、责令停产整顿、
      按日连续处罚等），该笔贷款不得归入绿色信贷类别。
    section: "银监办发〔2013〕125号 第四章 环境合规审查"

  - id: "cit-gf-cc-019"
    text: |
      银行应建立绿色信贷分类的内部管理制度，明确分类标准、审批流程和
      贷后监管要求，并按季度向监管部门报送绿色信贷统计数据。
    section: "银监办发〔2013〕125号 第五章 管理要求"

  - id: "cit-gf-cc-020"
    text: |
      贷款用途涉及多种产业时，应按实际资金投向比例拆分。
      绿色用途占比超过70%的，可整体归入绿色信贷；
      占比低于30%的，不得归入绿色信贷；
      30%-70%之间的，应按比例拆分统计。
    section: "银监办发〔2013〕125号 第二章 贷款分类管理"

  - id: "cit-gf-cc-021"
    text: |
      银行应对绿色信贷项目的环境效益进行量化评估，包括节能量、碳减排量、
      污染物削减量、资源循环利用量等指标，并建立台账记录。
    section: "银监办发〔2013〕125号 第五章 管理要求"

