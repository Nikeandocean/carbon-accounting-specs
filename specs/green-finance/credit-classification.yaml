# ============================================================
# Rules: 绿色信贷分类规则 (18 rules)
# ============================================================
rules:
  # ========== 一、12大类行业准入判定 ==========

  - id: "gf-cc-001"
    name: "绿色产业12大类匹配检查"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition: {"!=": [{"var": "input.loan.project_category"}, null]}
    assertion:
      {"in": [
        {"var": "input.loan.project_category"},
        ["GC01", "GC02", "GC03", "GC04", "GC05", "GC06",
         "GC07", "GC08", "GC09", "GC10", "GC11", "GC12",
         "SE01", "SE02", "SE03"]
      ]}
    on_fail: "raise_warning"
    on_fail_message: "贷款项目不属于绿色信贷12大类或三大战略性新兴产业，需进一步评估是否归入关注类"
    citation: "cit-gf-cc-001"

  - id: "gf-cc-002"
    name: "两高一剩行业排除检查"
    type: "prohibition"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition: {"!=": [{"var": "input.loan.project_industry"}, null]}
    assertion:
      {"!": [{"in": [
        {"var": "input.loan.project_industry"},
        ["钢铁", "水泥", "电解铝", "平板玻璃", "煤化工", "焦化", "电石", "铁合金"]
      ]}]}
    on_fail: "raise_fatal"
    on_fail_message: "贷款项目属于'两高一剩'行业，应归入不合格类别，不得纳入绿色信贷统计"
    citation: "cit-gf-cc-004"

  - id: "gf-cc-003"
    name: "高耗能行业新增产能排除"
    type: "prohibition"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition:
      "and": [
        {"in": [{"var": "input.loan.project_industry"},
          ["钢铁", "水泥", "电解铝", "平板玻璃", "煤化工", "焦化", "电石", "铁合金"]]},
        {"==": [{"var": "input.loan.project_type"}, "新增产能"]}
      ]
    assertion: false
    on_fail: "raise_fatal"
    on_fail_message: "高耗能行业的新增产能贷款不得归入绿色信贷类别"
    citation: "cit-gf-cc-004"

  - id: "gf-cc-004"
    name: "高耗能行业节能改造例外"
    type: "requirement"
    priority: "MUST"
    severity: "warning"
    layer: "schema"
    lifecycle: "runtime_inference"
    condition:
      "and": [
        {"in": [{"var": "input.loan.project_industry"},
          ["钢铁", "水泥", "电解铝", "平板玻璃", "煤化工"]]},
        {"in": [{"var": "input.loan.project_type"},
          ["节能改造", "环保升级", "超低排放改造", "节水改造"]]}
      ]
    assertion:
      {"!=": [{"var": "input.loan.energy_saving_report"}, null]}
    on_fail: "raise_warning"
    on_fail_message: "高耗能行业节能改造项目需提供节能评估报告方可归入绿色信贷"
    citation: "cit-gf-cc-003"

  # ========== 二、排放强度阈值 ==========

  - id: "gf-cc-005"
    name: "排放强度行业基准比较（关注类阈值）"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "runtime_inference"
    condition:
      "and": [
        {"!=": [{"var": "input.loan.project_industry"}, null]},
        {"!=": [{"var": "input.loan.emission_intensity"}, null]},
        {"!=": [{"var": "context.industry_benchmark_emission_intensity"}, null]}
      ]
    assertion:
      {"<=": [
        {"var": "input.loan.emission_intensity"},
        {"*": [{"var": "context.industry_benchmark_emission_intensity"}, 1.2]}
      ]}
    on_fail: "raise_warning"
    on_fail_message: "项目排放强度超过行业基准值120%，应归入关注类"
    citation: "cit-gf-cc-017"

  - id: "gf-cc-006"
    name: "排放强度严重超标不合格判定"
    type: "prohibition"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "runtime_inference"
    condition:
      "and": [
        {"!=": [{"var": "input.loan.project_industry"}, null]},
        {"!=": [{"var": "input.loan.emission_intensity"}, null]},
        {"!=": [{"var": "context.industry_benchmark_emission_intensity"}, null]}
      ]
    assertion:
      {"<=": [
        {"var": "input.loan.emission_intensity"},
        {"*": [{"var": "context.industry_benchmark_emission_intensity"}, 1.5]}
      ]}
    on_fail: "raise_fatal"
    on_fail_message: "项目排放强度超过行业基准值150%，应归入不合格类别"
    citation: "cit-gf-cc-017"

  # ========== 三、环境合规审查 ==========

  - id: "gf-cc-007"
    name: "环境违法记录排除检查"
    type: "prohibition"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition: {"!=": [{"var": "input.borrower.environmental_violations"}, null]}
    assertion:
      "not": [
        {"some": [
          {"var": "input.borrower.environmental_violations"},
          {"<=": [
            {"var": "violation_date"},
            {"+": [{"var": "context.current_date"}, -730]}
          ]}
        ]}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "借款人在贷款申请日前两年内存在环境违法行为，不得归入绿色信贷类别"
    citation: "cit-gf-cc-018"

  - id: "gf-cc-008"
    name: "污染防治项目环评和排污许可检查"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition:
      {"in": [{"var": "input.loan.project_category"}, ["GC06", "GC03"]]}
    assertion:
      "and": [
        {"!=": [{"var": "input.borrower.eia_report"}, null]},
        {"!=": [{"var": "input.borrower.pollution_permit"}, null]}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "污染防治类和工业节能节水类项目需提供环境影响评价报告和排污许可证"
    citation: "cit-gf-cc-010"

  # ========== 四、资金用途拆分 ==========

  - id: "gf-cc-009"
    name: "混合用途绿色比例阈值判定"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "runtime_inference"
    condition:
      {"!=": [{"var": "input.loan.green_usage_ratio"}, null]}
    assertion:
      {"or": [
        {">=": [{"var": "input.loan.green_usage_ratio"}, 0.7]},
        {"<": [{"var": "input.loan.green_usage_ratio"}, 0.3]}
      ]}
    on_fail: "raise_warning"
    on_fail_message: "绿色用途占比在30%-70%之间，需按实际比例拆分统计"
    citation: "cit-gf-cc-020"

  - id: "gf-cc-010"
    name: "绿色信贷整体归类70%门槛"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "runtime_inference"
    condition:
      {"!=": [{"var": "input.loan.green_usage_ratio"}, null]}
    assertion:
      {">=": [{"var": "input.loan.green_usage_ratio"}, 0.7]}
    on_fail: "raise_fatal"
    on_fail_message: "绿色用途占比低于70%，不得整体归入绿色信贷类别"
    citation: "cit-gf-cc-020"

  # ========== 五、绿色交通项目专项 ==========

  - id: "gf-cc-011"
    name: "清洁交通项目资格判定"
    type: "requirement"
    priority: "MUST"
    severity: "warning"
    layer: "schema"
    lifecycle: "runtime_inference"
    condition:
      {"==": [{"var": "input.loan.project_category"}, "GC10"]}
    assertion:
      {"in": [{"var": "input.loan.project_subtype"},
        ["城市轨道交通", "新能源汽车推广", "电动物流车", "清洁能源船舶",
         "港口岸电", "充电桩建设", "换电站建设", "铁路电气化改造"]]}
    on_fail: "raise_warning"
    on_fail_message: "绿色交通类项目需确认具体子类别，传统燃油车产能扩张不属于绿色信贷"
    citation: "cit-gf-cc-014"

  # ========== 六、可再生能源项目专项 ==========

  - id: "gf-cc-012"
    name: "可再生能源项目类型验证"
    type: "requirement"
    priority: "MUST"
    severity: "warning"
    layer: "schema"
    lifecycle: "runtime_inference"
    condition:
      {"==": [{"var": "input.loan.project_category"}, "GC07"]}
    assertion:
      {"in": [{"var": "input.loan.energy_type"},
        ["风力", "太阳能", "生物质能", "水力", "地热能", "潮汐能", "垃圾焚烧"]]}
    on_fail: "raise_warning"
    on_fail_message: "可再生能源类项目需确认能源类型，化石能源发电项目不属于绿色信贷"
    citation: "cit-gf-cc-011"

  # ========== 七、绿色建筑项目专项 ==========

  - id: "gf-cc-013"
    name: "绿色建筑星级要求"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "runtime_inference"
    condition:
      {"and": [
        {"==": [{"var": "input.loan.project_category"}, "GC09"]},
        {"==": [{"var": "input.loan.project_subtype"}, "新建绿色建筑"]}
      ]}
    assertion:
      {"or": [
        {">=": [{"var": "input.loan.green_building_star"}, 2]},
        {"!=": [{"var": "input.loan.international_green_cert"}, null]}
      ]}
    on_fail: "raise_fatal"
    on_fail_message: "新建绿色建筑项目应达到国家绿色建筑评价标准二星级及以上或取得国际认证"
    citation: "cit-gf-cc-013"

  # ========== 八、境外项目专项 ==========

  - id: "gf-cc-014"
    name: "境外项目国际标准符合性"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition:
      {"==": [{"var": "input.loan.project_category"}, "GC12"]}
    assertion:
      {"in": [{"var": "input.loan.international_standard"},
        ["equator_principles", "ifc_performance_standards", "unep_fi"]]}
    on_fail: "raise_fatal"
    on_fail_message: "境外项目应采用赤道原则、IFC绩效标准或UNEP FI等国际惯例或标准"
    citation: "cit-gf-cc-016"

  # ========== 九、战略性新兴产业 ==========

  - id: "gf-cc-015"
    name: "战略性新兴产业制造端确认"
    type: "requirement"
    priority: "MUST"
    severity: "warning"
    layer: "schema"
    lifecycle: "runtime_inference"
    condition:
      {"in": [{"var": "input.loan.project_category"}, ["SE01", "SE02", "SE03"]]}
    assertion:
      {"==": [{"var": "input.loan.is_manufacturing_end"}, true]}
    on_fail: "raise_warning"
    on_fail_message: "战略性新兴产业贷款须为生产制造端，非制造端贷款不纳入此分类"
    citation: "cit-gf-cc-002"

  # ========== 十、管理制度和报送 ==========

  - id: "gf-cc-016"
    name: "银行内部分类管理制度检查"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "input.bank.green_credit_policy"}, null]}
    assertion:
      "and": [
        {"!=": [{"var": "input.bank.green_credit_policy.classification_criteria"}, null]},
        {"!=": [{"var": "input.bank.green_credit_policy.approval_process"}, null]},
        {"!=": [{"var": "input.bank.green_credit_policy.post_loan_monitoring"}, null]}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "银行应建立绿色信贷分类管理制度，包含分类标准、审批流程和贷后监管要求"
    citation: "cit-gf-cc-019"

  # ========== 十一、环境效益量化 ==========

  - id: "gf-cc-017"
    name: "绿色信贷环境效益量化评估"
    type: "requirement"
    priority: "SHOULD"
    severity: "warning"
    layer: "schema"
    lifecycle: "post_audit"
    condition:
      "and": [
        {"!=": [{"var": "input.loan.classification"}, null]},
        {"==": [{"var": "input.loan.classification"}, "green"]}
      ]
    assertion:
      {"or": [
        {"!=": [{"var": "input.loan.environmental_benefits"}, null]},
        {"!=": [{"var": "input.justifications.gf-cc-017"}, null]}
      ]}
    on_fail: "require_justification"
    on_fail_message: "绿色信贷项目应量化环境效益（节能量、碳减排量、污染物削减量等）"
    citation: "cit-gf-cc-021"

  # ========== 十二、综合分类结果 ==========

  - id: "gf-cc-018"
    name: "贷款三分类结果一致性校验"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "post_audit"
    condition: {"!=": [{"var": "input.loan.classification"}, null]}
    assertion:
      {"in": [{"var": "input.loan.classification"}, ["green", "watchlist", "unqualified"]]}
    on_fail: "raise_fatal"
    on_fail_message: "贷款分类结果必须为green（绿色信贷）、watchlist（关注类）或unqualified（不合格）"
    citation: "cit-gf-cc-003"

