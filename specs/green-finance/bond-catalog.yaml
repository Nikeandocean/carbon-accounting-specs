citations:
- id: cit-gb-003
  text: 高效节能：装备制造
  section: 绿色债券目录 1.1.1
- id: cit-gb-004
  text: '节能锅炉制造：高炉煤气、生物质成型燃料、固体可燃废弃物等燃料电站锅炉、工业锅炉、船用锅炉等装备制造及贸易活动。其中，工业锅炉能效达到或优于《工业锅炉能效限定值及能效等级》（GB 24500）能效标准2 级及以上能效等级，其他锅炉能效达到或优于相关设备技术规范热效率指标目标值要求，所有锅炉设备都需要符合《锅炉大气污染排放标准》（GB
    13271）以及地方对锅炉排放的要求。 [技术标准: GB 24500, GB 13271]'
  section: 绿色债券目录 1.1.1.1
- id: cit-gb-005
  text: '余热余压余：气利用设备制造低温烟气余热深度回收装置、窑炉余热利用装置、基于热泵技术的循环水及乏汽余热回收集中供热装置、高效换热器、高效蓄能器、高效冷凝器等余热余压余气利用设备制造及贸易活动。其中，热交换器能效等级达到相关规范目标值的要求。余能利用应依据《工业余能资源评价方法》（GB/T
    1028）等国家标准要求开展。 [技术标准: GB/T 1028]'
  section: 绿色债券目录 1.1.1.10
- id: cit-gb-006
  text: '高效节能家：用电器制造节能型空调器、空调机组、电冰箱、电动洗衣机、平板电视机、电风扇等家用电器产品制造、贸易及消费活动。节能型产品能效达到或优于《房间空气调节器能效限定值及能效等级》（GB 21455）、《家用电冰箱耗电量限定值及能源效率等级》（GB12021.2）、《电动洗衣机能效水效限定值及等级》（GB
    12021.4）、《平板电视与机顶盒能效限定值及能效等级》（GB 24850）、《交流电风扇能效限定值及能效等级》（GB 12021.9）等国家标准一级能效。 [技术标准: GB 21455, GB 24850]'
  section: 绿色债券目录 1.1.1.11
- id: cit-gb-007
  text: 高效节能商：用设备制造节能型复印机、打印机、传真机、微型计算机、投影机、商用制冷器具、冷水机组、热泵机组、单元式空调等商用设备制造、贸易及消费活动。相关节能设备能效达到或优于相关能效标准一级能效。
  section: 绿色债券目录 1.1.1.12
- id: cit-gb-008
  text: '高效照明产：品及系统制造半导体照明产业链中衬底、外延片、光源、照明产品（发光二极管LED）及其生产装备、电子镇流器产品制造及贸易活动。相关产品应符合《室内照明用LED 产品能效限定值及能效等级》（GB 30255）、《道路和隧道照明用LED
    灯具能效限定值及能效等级》（GB 37478）、《普通照明用LED 平板灯能效限定值及能效等级》（GB38450）、《管形荧光灯镇流器能效限定值及能效等级》（GB 17896）、《高压钠灯镇流器能效限定值及节能评价值》（GB 19574）、《金属卤化物灯镇流器能效限定值及能效等级》（GB
    20053）、《单端无极荧光灯用交流电子镇流器能效限定值及能效等级》（GB 29 [技术标准: GB 30255, GB 37478, GB38450, GB 17896, GB 19574, GB 20053, GB 29143]'
  section: 绿色债券目录 1.1.1.13
- id: cit-gb-009
  text: '能源计量、监：测、控制设备制造节能检测设备、在线能源计量设备、在线能源检测设备、热工检测设备、节能自控设备、温度计量设备、流量计量设备、电力计量设备、热力计量设备等能源计量、监测、监控设备制造及贸易活动。能源计量器具应符合《用能单位能源计量器具配备和管理通则》（GB
    17167）的要求。 [技术标准: GB 17167]'
  section: 绿色债券目录 1.1.1.14
- id: cit-gb-010
  text: 节能窑炉制造：采用高温空气燃烧、富氧燃烧、余热利用等节能技术的冶金加热炉、非电热金属处理用炉、工业电炉、工业窑炉等节能型窑炉装备制造及贸易活动，以及节能型炉用燃烧器等设备制造及贸易活动。
  section: 绿色债券目录 1.1.1.2
- id: cit-gb-011
  text: 节能型泵及真：空设备制造节能泵、节能型真空干燥设备、节能型真空炉等设备制造及贸易活动。其中，节能泵设备能效指标达到或优于相关能效标准节能评价值或一级能效。
  section: 绿色债券目录 1.1.1.3
- id: cit-gb-012
  text: '节能型气体压：缩设备制造节能型空气压缩机、空气调节器用压缩机等设备制造及贸易活动。节能设备能效等级达到或优于《容积式空气压缩机能效限定值及节能评价值》（GB 19153）、《空气调节器用全封闭型电动机-压缩机能效限定值及能效等级》（GB
    35971）等国家能效标准一级能效，其他节能气体压缩设备，需要满足对应能效要求。 [技术标准: GB 19153, GB 35971]'
  section: 绿色债券目录 1.1.1.4
- id: cit-gb-013
  text: 节能型液压气：压元件制造节能型液压和气压动力机械及元件制造及贸易活动。
  section: 绿色债券目录 1.1.1.5
- id: cit-gb-014
  text: '节能风机风扇：制造节能型通风机、鼓风机、工业风扇、通风罩、循环气罩等设备制造及贸易活动。节能设备能效达到或优于《通风机能效限定值及节能评价值》（GB 19761）及《离心鼓风机能效限定值及节能评价值》（GB 28381）国家标准一级能效。其他节能气体压缩设备需要满足对应能效要求。
    [技术标准: GB 19761, GB 28381]'
  section: 绿色债券目录 1.1.1.6
- id: cit-gb-015
  text: 高效发电机及：发电机组制造节能型发电机、发电机组及其专用零件的制造及贸易活动。
  section: 绿色债券目录 1.1.1.7
- id: cit-gb-016
  text: '节能电机制造：节能型交流、直流、交直流两用电机设备制造及贸易活动。节能型电机设备能效达到或优于《电动机能效限定值及能效等级》（GB 18613）、《永磁同步电动机能效限定值及能效等级》（GB 30253）、《高压三相笼型异步电动机能效限定值及能效等级》（GB
    30254）国家标准一级能效，其他节能电机设备，需要满足对应能效要求。 [技术标准: GB 18613, GB 30253, GB 30254]'
  section: 绿色债券目录 1.1.1.8
- id: cit-gb-017
  text: '节能型变压：器、整流器、电感器和电焊机制造节能型变压器、互感器、静止式变流器、电抗器、电感器、变频器、电焊机等设备制造及贸易活动。节能型电力变压器设备能效达到或优于《电力变压器能效限定值及能效等级》（GB 20052）国家标准一级能效，其他节能型变压器、电抗器等设备，需要满足对应能效要求。
    [技术标准: GB 20052]'
  section: 绿色债券目录 1.1.1.9
- id: cit-gb-018
  text: 工业节能：改造
  section: 绿色债券目录 1.1.2
- id: cit-gb-019
  text: 锅炉（窑炉）节能改造和能效提升：以实现锅炉（窑炉）能效提升为目的，采用设备、装备替代更新、技术改造、燃料优化、燃烧调整优化等技术手段，对锅炉（窑炉）实施的节能技术改造，以及使用天然气、可再生能源等清洁能源和工厂余热、电厂乏汽、循环水余热等热力资源替代煤、石油焦、渣油、重油等燃料锅炉（窑炉）供热的节能技术改造活动。
  section: 绿色债券目录 1.1.2.1
- id: cit-gb-020
  text: 电机系统能效：提升以实现电机系统能效提升为目的，采用设备更新、技术改造、控制系统优化等技术手段，对电机系统（含系统内风机、水泵、压缩机、变压器等设备）实施的设备或综合性系统节能改造。
  section: 绿色债券目录 1.1.2.2
- id: cit-gb-021
  text: 余热余压利用：采用饱和蒸汽发电技术、烟气余热回收利用等技术，回收工业生产过程低品位余热余压等能源资源用于发电、工业供热、居民供暖或生产工艺再利用的设施建设或技术改造活动。
  section: 绿色债券目录 1.1.2.3
- id: cit-gb-022
  text: '能量系统优化：通过工艺流程优化、系统技术集成应用、能量系统设计与控制优化等技术手段，对工业生产过程能源流、物质流、信息流实施协同优化，提高能源梯级利用成效，使生产系统整体能效提升的节能技术改造活动，并符合《工业园区物质流分析技术导则》（GB/T
    38903）等国家标准要求。 [技术标准: GB/T 38903]'
  section: 绿色债券目录 1.1.2.4
- id: cit-gb-023
  text: 汽轮发电机组：系统能效提升以提升汽轮发电机组能效为目的，对汽轮机通流部分、冷端系统、锅炉受热面及烟风系统，运行控制系统，热力及疏水系统，辅助电机等设备或系统实施的节能技术改造。
  section: 绿色债券目录 1.1.2.5
- id: cit-gb-024
  text: 用电设施：节能
  section: 绿色债券目录 1.1.3
- id: cit-gb-025
  text: '绿色照明改造：采用LED、高/低压钠灯、金属卤化物灯、三基色双端直管荧光灯(T8、T5 型)等高能效照明产品，以及利用自然光光源，在室内外各类场所进行的照明设施节能技术改造。相关照明产品应符合《室内照明用LED 产品能效限定值及能效等级》（GB
    30255）、《道路和隧道照明用LED 灯具能效限定值及能效等级》（GB 37478）、《普通照明用LED 平板灯能效限定值及能效等级》（GB 38450）、《普通照明用双端荧光灯能效限定值及能效等级》（GB 19043）、《单端荧光灯能效限定值及节能评价值》（GB19415）、《普通照明用自镇流荧光灯能效限定值及能效等级》（GB
    19044）、《单端无极荧光灯能效 [技术标准: GB 30255, GB 37478, GB 38450, GB 19043, GB19415, GB 19044, GB 29142, GB 29144, GB 19573, GB 20054,
    GB 31276]'
  section: 绿色债券目录 1.1.3.1
- id: cit-gb-027
  text: 绿色建筑：材料
  section: 绿色债券目录 1.2.1
- id: cit-gb-028
  text: 绿色建筑材料：制造节能墙体材料、外墙保温材料、节能玻璃、装配式建筑部品部件、预拌混凝土、预拌砂浆等绿色建材产品制造及消费。产品相关性能和技术指标应符合国家、行业相应绿色建材产品评价技术要求。玻璃外墙制品应减少光污染，并降低城市热岛效应。
  section: 绿色债券目录 1.2.1.1
- id: cit-gb-030
  text: 先进环保：装备制造
  section: 绿色债券目录 1.3.1
- id: cit-gb-031
  text: '水污染防治装：备制造城镇、农村生活污水、工业废水处理与再生利用、回用装备，地表水、地下水污染防控治理与修复装备，清淤机械、排水管网维护检测装备、海绵城市建设配套装备、城镇雨水收集与处理装备，饮用水安全保障及漏损控制装备等装备制造及贸易活动。装备技术水平鼓励达到《环境保护综合名录（2017
    年版）》《国家鼓励发展的重大环保装备技术目录（2017 年版）》等相关政策和规范要求，并符合《污水处理用旋转曝气机能效限定值及能效等级》（GB 37483）、《污水处理用潜水推流式搅拌机能效限定值及能效等级》（GB 37485）、《高效能水污染物控制装备评价技术要求旋转曝气机》（GB/T
    38220）等国家标准要求。 [技术标准: GB 37483, GB 37485, GB/T 38220]'
  section: 绿色债券目录 1.3.1.1
- id: cit-gb-032
  text: '大气污染防治：装备制造烟气除尘、脱硫脱硝、挥发性有机污染物（VOCs）处理、机动车尾气后处理、食品业油烟净化等装备制造及贸易活动，以及电力开关设备六氟化硫（SF6）气体替代等温室气体减排技术装备制造及贸易活动。装备技术水平鼓励达到《环境保护综合名录（2017
    年版）》《国家鼓励发展的重大环保装备技术目录（2017 年版）》等相关政策和规范要求，并符合《除尘器能效限定值及能效等级》（GB 37484）、《高效能大气污染物控制装备评价技术要求》（GB/T 33017）等国家标准要求。 [技术标准:
    GB 37484, GB/T 33017]'
  section: 绿色债券目录 1.3.1.2
- id: cit-gb-033
  text: 土壤污染治理：与修复装备制造矿山复垦与生态修复、农用地土壤污染修复、污染地块治理与修复等装备制造及贸易活动。装备技术水平鼓励达到《土壤污染防治先进技术装备目录》（2017 年公布）、《国家鼓励发展的重大环保装备技术目录（2017
    年版）》等相关政策和规范要求。
  section: 绿色债券目录 1.3.1.3
- id: cit-gb-034
  text: 固体废物处理：处置装备制造污泥处理装备（含黑臭水体清淤、底泥存储和处理装备）、固体废物处理、生活垃圾无害化资源化处理、危险废弃物处理等装备制造及贸易活动。装备技术水平鼓励达到《环境保护综合名录（2017 年版）》《国家鼓励发展的重大环保装备技术目录（2017
    年版）》等相关政策和规范要求。
  section: 绿色债券目录 1.3.1.4
- id: cit-gb-035
  text: 减振降噪设备：制造声屏障、消声器、动力设备隔振装置、管道隔振用软连接设备、轨道振动与噪声控制装置、阻尼抑振材料和设备、有源噪声与振动控制设备等装备制造及贸易活动。装备技术水平鼓励达到《环境保护综合名录（2017 年版）》《国家鼓励发展的重大环保装备技术目录（2017
    年版）》等相关政策和规范要求。
  section: 绿色债券目录 1.3.1.5
- id: cit-gb-036
  text: 放射性污染防：治和处理设备制造放射性废物处理和处置装置、放射源污染土壤的治理与修复装备等设备制造及贸易活动。
  section: 绿色债券目录 1.3.1.6
- id: cit-gb-037
  text: 环境污染处理：药剂、材料制造除磷药剂、杀菌灭藻剂、絮凝剂等环保药剂和袋式除尘滤料及纤维、袋除尘用大口径脉冲阀、无膜片高压低能耗脉冲阀、膜材料和膜组件等设备、零部件制造及贸易活动，以及列入《国家鼓励发展的重大环保装备技术目录（2017
    年版）》的环境污染治理材料和药剂制造及贸易活动。
  section: 绿色债券目录 1.3.1.7
- id: cit-gb-038
  text: '环境监测仪器：与应急处理设备制造大气、水、土壤、生物、噪声与振动、固体废物、机动车排放（含遥感监测和PEMS检测）、核与辐射等生态环境监测及检测仪器仪表、环境应急检测仪器仪表、环境应急装备等设备制造及贸易活动，以及列入《环境保护综合名录（2017
    年版）》《国家鼓励发展的重大环保装备技术目录（2017 年版）》，并符合《烟气集成净化专用碳基产品》（GB/T 35254）、《烟气脱硝催化剂检测技术规范》（GB/T 38219）等国家标准的设备制造及贸易活动。 [技术标准: GB/T
    35254, GB/T 38219]'
  section: 绿色债券目录 1.3.1.8
- id: cit-gb-039
  text: 水污染治：理
  section: 绿色债券目录 1.3.2
- id: cit-gb-040
  text: 良好水体保护：及地下水环境防治通过统筹使用截污治污、植被恢复、生物缓冲带建设等工程措施，报废矿井、钻井、取水井封井回填等污染防治工程措施，开展的江河源头和Ⅲ类及以上水质江河湖库、饮用水水源地达标建设、备用水源建设、水源涵养和生态修复建设工程，以及石油化工、矿山开采、农田等区域地下水污染风险评估和污染治理、地下水保护活动。
  section: 绿色债券目录 1.3.2.1
- id: cit-gb-041
  text: 重点流域海域：水环境治理统筹使用截污治污、垃圾清理、河道清淤疏浚、湿地保护修复、植被恢复等手段，开展的改善水环境质量、恢复水域生态功能的治理活动。包括七大流域及近岸海域、重点湖泊的水环境保护与综合治理，如近海区域塑料垃圾的监测与整治。
  section: 绿色债券目录 1.3.2.2
- id: cit-gb-042
  text: 城市黑臭水体：整治城市黑臭水体综合整治活动，如污水处理、再生利用、污水管渠建设和技术改造，排污口整治、截污系统建设和改造，内源治理、人工湿地建设、垃圾清理、智慧水务等治理活动。治理后水体水质需符合《城市黑臭水体整治工作指南》（2015
    年公布）、《城市黑臭水体整治——排水口、管道及检查井治理技术指南》（2016 年公布）等技术规范和管理文件要求。
  section: 绿色债券目录 1.3.2.3
- id: cit-gb-043
  text: 船舶港口污染：防治以防治船舶港口污染为目的实施的港口油气回收系统建设，船舶改造加装尾气污染治理装备，矿石码头堆场防风抑尘设施建设，港口船舶污染物接收设施建设，岸电设施建设等污染防治设施建设和技术改造，以及避免船舶压舱水带来外来物种入侵危害的设施建设。
  section: 绿色债券目录 1.3.2.4
- id: cit-gb-044
  text: 大气污染：治理
  section: 绿色债券目录 1.3.3
- id: cit-gb-045
  text: 交通车辆污染：治理通过符合新的能效和污染物排放标准的车辆更新淘汰老旧高能耗、高排放运营车辆，机动车和非道路移动机械污染排放实时监控系统建设，道路遥感监测和定位系统建设，以及汽车维修废油、废水和废气治理等活动，开展的交通车辆污染治理。
  section: 绿色债券目录 1.3.3.1
- id: cit-gb-046
  text: 城市扬尘综合：治理采用建设工程施工现场设置全封闭围挡墙、物料堆放覆盖、土方开挖湿法作业、进出道路地面硬化、出入车辆清洗，渣土运输车辆采取密闭措施，道路机械化清扫，城市及周边建设绿化和防风防沙林等手段，开展的城市扬尘综合治理活动。
  section: 绿色债券目录 1.3.3.2
- id: cit-gb-047
  text: 餐饮油烟污染：治理餐饮服务经营场所安装高效油烟净化设施等餐饮油烟污染治理活动。
  section: 绿色债券目录 1.3.3.3
- id: cit-gb-048
  text: 土壤污染：治理及其他污染治理
  section: 绿色债券目录 1.3.4
- id: cit-gb-049
  text: 建设用地污染：治理建设用地土壤污染状况详查与监测、风险评估，以及采用转移、吸收、降解等物理、化学、生物工程技术措施，降低土壤污染物含量水平，使建设用地土壤质量符合相关规划用地土壤环境质量要求，提升建设用地土壤利用价值的治理活动。
  section: 绿色债券目录 1.3.4.1
- id: cit-gb-050
  text: 沙漠污染治理：采用清洗、淋洗、玻璃化、热处理以及气相抽吸等物理措施，焚烧、电动修复、化学稳定等化学措施，植物修复、动物修复和微生物修复等生物措施开展的沙漠污染治理活动。
  section: 绿色债券目录 1.3.4.2
- id: cit-gb-051
  text: 农用地污染治：理农用地土壤污染状况详查与监测、风险评估，农用地土壤环境质量类别划分、安全利用、风险管控、治理与修复，以及治理与修复效果评估等活动。
  section: 绿色债券目录 1.3.4.3
- id: cit-gb-052
  text: 噪声污染治理工业企业噪声污染治：理、交通噪声污染治理、建筑施工噪声污染治理，以及社会生活噪声污染治理等噪声污染治理活动。
  section: 绿色债券目录 1.3.4.4
- id: cit-gb-053
  text: 恶臭污染治理通过在生产经营活动：中产生恶臭气体的企业和其他单位安装净化装置或采取其他工程技术措施，开展的恶臭污染治理活动。
  section: 绿色债券目录 1.3.4.5
- id: cit-gb-054
  text: 农业农村：环境综合治理
  section: 绿色债券目录 1.3.5
- id: cit-gb-055
  text: 农林草业面源：污染防治通过源头控制、过程阻断、末端强化等综合防治措施，减少农田污染和农业废弃物污染以及抗生素污染等新型污染的活动；测土配方施肥，农田氮磷拦截与再利用等农业清洁生产技术应用活动；农作物病虫害专业化统防统治及绿色防控专业化服务；粪污集中处理和资源化利用，畜禽规模化养殖和粪污资源化利用、病死畜禽无害化处理设施，生态沟渠、污水净化塘等设施建设和运营；农业地膜污染防治。
  section: 绿色债券目录 1.3.5.1
- id: cit-gb-056
  text: 农村人居环境：整治为改善农村生产生活环境而进行的综合治理工程，如农村生活垃圾和污水处理设施建设和运营、农村河道综合治理、厕所粪污治理、村容村貌提升工程、农村饮水安全工程建设和运营等。农村污水处理设施应符合农村生活污水处理设施运行效果评价技术要求相关国家标准。
  section: 绿色债券目录 1.3.5.2
- id: cit-gb-058
  text: 非常规水：资源利用
  section: 绿色债券目录 1.4.1
- id: cit-gb-059
  text: 海水、苦咸水：淡化处理海水、苦咸水淡化处理设施建设和运营。
  section: 绿色债券目录 1.4.1.1
- id: cit-gb-060
  text: 雨水的收集、：处理、利用雨水的收集、处理、利用设施建设和运营。
  section: 绿色债券目录 1.4.1.2
- id: cit-gb-062
  text: 资源循环：利用装备制造
  section: 绿色债券目录 1.5.1
- id: cit-gb-063
  text: 矿产资源综合：利用装备制造能源矿产、黑色金属矿产、有色金属（含稀有金属）矿产、非金属矿产资源综合利用等装备制造及贸易活动。
  section: 绿色债券目录 1.5.1.1
- id: cit-gb-064
  text: 工业固体废物：综合利用装备制造脱硫石膏、磷石膏、化工废渣、冶炼废渣、尾矿、赤泥等固体废物的二次利用或综合利用等装备制造及贸易活动，冶金烟灰粉尘回收与稀贵金属高效低成本回收等装备制造及贸易活动。
  section: 绿色债券目录 1.5.1.2
- id: cit-gb-065
  text: 建筑废弃物、：道路废弃物资源化无害化利用装备制造利用建筑、道路拆除、维修废弃物混杂料、废旧沥青、砂灰粉等材料生产道路、市政设施原材料，再生利用建筑、道路废弃物的移动式、固定式，以及移动式和固定式相结合的废弃物综合利用成套设备制造及贸易活动。
  section: 绿色债券目录 1.5.1.3
- id: cit-gb-066
  text: 餐厨废弃物资：源化无害化利用装备制造利用餐厨废弃物生产生物柴油、有机肥、沼气、工业乙醇等产品的餐厨废弃物减量化、无害化处理和资源化利用等装备制造及贸易活动，包括分类回收、运输、分拣、预处理、资源化、能源化产品生产等装备制造及贸易活动等。
  section: 绿色债券目录 1.5.1.4
- id: cit-gb-067
  text: 汽车零部件及：机电产品再制造装备制造利用废旧汽车零部件、废旧机电产品材料，再生生产汽车零部件、机电产品的生产装备制造及贸易活动。如废旧汽车零部件、大型动力旋转机电产品、废旧机电产品的拆解清洗装备，电镀、熔覆、成型一体化等装备制造及贸易活动。
  section: 绿色债券目录 1.5.1.5
- id: cit-gb-068
  text: '资源再生利用：装备制造废旧动力蓄电池、轮胎、机电产品等废旧金属、橡胶、玻璃、生物质材料无害化再生利用装备制造及贸易活动，并符合《废润滑油回收与再生利用技术导则》（GB/T17145）、《产品及零部件可回收利用标识》（GB/T
    23384）、《再生利用品和再制造品通用要求及标识》（GB/T 27611）、《氮氧化物材料抗氧化性试验方法变温氧化法》（GB/T 32329）等国家标准的要求。 [技术标准: GB/T17145, GB/T 23384, GB/T 27611,
    GB/T 32329]'
  section: 绿色债券目录 1.5.1.6
- id: cit-gb-069
  text: 非常规水源利：用装备制造工业废水、城镇生活污水处理再生利用装备，矿井水、苦咸水、雨水收集、处理利用装备，海水淡化处理利用装备等非常规水源利用装备制造及贸易活动。
  section: 绿色债券目录 1.5.1.7
- id: cit-gb-070
  text: 农林废物资源：化无害化利用装备制造利用秸秆、畜禽粪污、农村厕所粪污等农林废弃物生产发酵饲料、沼气、生物天然气、固体燃料、有机肥料等产品的农林废物资源化无害化利用装备制造及贸易活动。
  section: 绿色债券目录 1.5.1.8
- id: cit-gb-071
  text: 固体废弃：物综合利用
  section: 绿色债券目录 1.5.2
- id: cit-gb-072
  text: 矿产资源综合：利用伴生天然气、低浓度瓦斯等能源伴生矿产资源、低品位伴生资源的开发或回收综合利用；铁、锰、铬等黑金属中低品位矿、尾矿再开发利用、伴生矿综合开发利用；铜、铅、镍、锡、铝、镁、金、银等有色金属矿产资源高效开发利用、尾矿再开发利用和伴生矿综合开发利用，以及高岭土、铝矾土、石灰石、石膏、磷矿等非金属矿产资源尾矿再开发利用和伴生矿综合开发利用。
  section: 绿色债券目录 1.5.2.1
- id: cit-gb-073
  text: '废旧资源再生：利用废旧金属、废橡胶、废塑料、废玻璃、废旧电器电子产品、废旧太阳能设备、废旧纺织品、废矿物油、废弃生物质、废纸（废旧印刷制品等）、废旧脱硝催化剂、除尘用废旧布袋等废旧资源的再生利用。如废旧资源的回收、分拣、加工等设施的建设和运营，并符合《产品可回收利用率计算方法导则》（GB/T
    20862）、《废弃产品处理企业技术规范》（GB/T 27873）、《废弃产品回收处理企业统计指标体系》（GB/T 28744）、《废塑料再生利用技术规范》（GB/T 37821）、《废旧纺织品回收技术规范》（GB/T 38926）等国家标准的要求。
    [技术标准: GB/T 20862, GB/T 27873, GB/T 28744, GB/T 37821, GB/T 38926]'
  section: 绿色债券目录 1.5.2.2
- id: cit-gb-074
  text: 汽车零部件及：机电产品再制造废旧汽车零部件及废旧大型动力旋转机电设备等机电产品的回收、分拣、拆解、再加工等设施建设和运营。
  section: 绿色债券目录 1.5.2.3
- id: cit-gb-075
  text: 生物质资：源综合利用
  section: 绿色债券目录 1.5.3
- id: cit-gb-076
  text: 城乡生活垃圾：综合利用生活垃圾、餐厨废弃物、城市污泥、建筑和交通道路、桥梁拆除废物等资源的无害化处理和资源化利用设施建设和运营。如生活垃圾分拣处理设施建设运营、符合环保要求的垃圾焚烧电站建设运营，餐厨废弃物加工生产有机肥、生物柴油设施建设和运营等。
  section: 绿色债券目录 1.5.3.1
- id: cit-gb-077
  text: 农业废弃物资：源化利用农作物秸秆、畜禽粪污、尾菜、农产品初加工剩余物等农业废弃物的资源化利用设施建设和运营。如农作物秸秆生产生物质成型燃料设施、畜禽粪污生产沼气设施等设施的建设和运营。
  section: 绿色债券目录 1.5.3.2
- id: cit-gb-078
  text: 城镇污水处理：厂污泥综合利用城镇污水处理厂污泥处理处置及综合利用设施建设运营。如污泥土地利用（土地改良、园林绿化、林用、农用等）活动，以及焚烧发电（供热、热电联产）、建材加工设施建设运营等其他各类污泥资源化利用设施建设和运营。
  section: 绿色债券目录 1.5.3.3
- id: cit-gb-080
  text: 新能源汽：车和绿色船舶制造
  section: 绿色债券目录 1.6.1
- id: cit-gb-081
  text: 新能源汽车关：键零部件制造和产业化新能源汽车电池、电机及其控制系统、电附件、插电式混合动力专用发动机、机电耦合系统及能量回收系统等新能源汽车关键核心零部件装备制造和产业化设施建设运营，及新能源汽车和清洁能源汽车的贸易活动和购置消费。相关项目需符合《新能源汽车生产企业及产品准入管理规定》（中华人民共和国工业和信息化部令第54号修订）的要求。
  section: 绿色债券目录 1.6.1.1
- id: cit-gb-082
  text: '充电、换电及：加氢设施制造分布式交流充电桩、集中式快速充电站、换电设施、站用加氢及储氢等设备制造、设施建设和运营。加氢站设计、施工、建设应符合《氢气站设计规范》（GB 50177）、《加氢站技术规范》（GB 50516）、《加氢站安全技术规范》（GB/T
    34584）等国家标准的要求。 [技术标准: GB 50177, GB 50516, GB/T 34584]'
  section: 绿色债券目录 1.6.1.2
- id: cit-gb-083
  text: 绿色船舶制造天然气动力船舶：，电力船舶，太阳能、风能等新能源船舶，节能和新能源施工船舶等绿色船舶制造、购置及贸易活动。
  section: 绿色债券目录 1.6.1.3
- id: cit-gb-086
  text: 生产过程：大气污染治理
  section: 绿色债券目录 2.1.1
- id: cit-gb-087
  text: '工业脱硫脱硝：除尘改造工业锅炉脱硫脱硝除尘技术改造、钢铁行业烧结机脱硫技术改造、水泥行业脱硝技术改造、废气重金属治理升级改造等，并符合《产业园区废气综合利用原则和要求》（GB/T 36574）、《燃煤烟气脱硝装备运行效果评价技术要求》（GB/T
    34340）、《燃煤烟气脱硫装备运行效果评价技术要求》（GB/T 34605）、《钢铁烧结烟气脱硫除尘装备运行效果评价技术要求》（GB/T 34607）等国家标准的要求。 [技术标准: GB/T 36574, GB/T 34340, GB/T
    34605, GB/T 34607]'
  section: 绿色债券目录 2.1.1.1
- id: cit-gb-088
  text: 挥发性有机物：综合整治石化、有机化工、医药、工业涂装和包装等产业挥发性有机物治理设施（含工业园区内企业及园区综合整治）及油气运输储备系统（如加油站、油罐车、储油库）油气回收设施等挥发性有机物综合治理设施建设运营，以及以挥发性有机物整治为目的的企业生产工艺、生产装备技术改造。
  section: 绿色债券目录 2.1.1.2
- id: cit-gb-089
  text: '钢铁企业超低：排放改造钢铁企业生产工艺脱硫脱硝设施升级改造，如生产线相关设备加装低氮燃烧器、高效除尘设施等；生产车间和出渣处理设备实施封闭改造、酚氰废水处理设施升级改造，设备和管线排放泄漏检测与修复等，并符合《高炉干法除尘灰回收利用技术规范》（GB/T
    33759）等国家标准的要求。 [技术标准: GB/T 33759]'
  section: 绿色债券目录 2.1.1.3
- id: cit-gb-090
  text: 生产过程：水污染治理
  section: 绿色债券目录 2.1.2
- id: cit-gb-091
  text: '重点行业水污：染治理造纸、焦化、氮肥、有色金属、印染、农副食品加工、原料药制造、制革、农药、电镀等水污染物产生重点行业的清洁化技术改造，以及工业污水处理设施等水污染治理设施建设运营。例如，磷矿、磷化工、磷石膏库整治及磷石膏综合利用及产品贸易，含磷农药等行业生产废水设施建设、运营等，并符合《工业废水处理与回用技术评价导则》（GB/T
    32327）等国家标准的要求。 [技术标准: GB/T 32327]'
  section: 绿色债券目录 2.1.2.1
- id: cit-gb-092
  text: '工业集聚区水：污染集中治理经济技术开发区、高新技术产业开发区、出口加工区等工业集聚区污水预处理系统建设、污水收集系统和污水集中处理与再生利用设施建设和运营，并符合《产业园区水的分类使用及循环利用原则和要求》（GB/T 36575）等国家标准的要求。
    [技术标准: GB/T 36575]'
  section: 绿色债券目录 2.1.2.2
- id: cit-gb-093
  text: 工业园区：污染治理
  section: 绿色债券目录 2.1.3
- id: cit-gb-094
  text: '园区污染治理：集中化改造工业园区、企业集群集中污染治理设施、集中喷涂设施建设和运营及升级改造，废弃可再生资源（如废钢铁、废有色金属、废塑料、废橡胶等）集中拆解处理和集中污染治理设施建设运营，以及工业园区、企业集群公共基础设施（如供水、供电、供热、道路、通信等）建设和技术改造，并符合《产业园区基础设施绿色化指标体系及评价方法》（GB/T
    38538）、《焦炉煤气制取甲醇技术规范》（GB/T 38927）等国家标准的要求。 [技术标准: GB/T 38538, GB/T 38927]'
  section: 绿色债券目录 2.1.3.1
- id: cit-gb-095
  text: 园区重点行业：清洁生产改造工业园区钢铁、化工、石油石化、有色金属等高污染重点行业企业及园区清洁生产改造，实现环境改善、降低温室气体排放和资源节约高效利用。采用列入《石化绿色工艺名录（2019 版）》内工艺的化工、石油石化新建、改扩建项目。
  section: 绿色债券目录 2.1.3.2
- id: cit-gb-096
  text: 无毒无害：原料替代与危险废物治理
  section: 绿色债券目录 2.1.4
- id: cit-gb-097
  text: 无毒无害原料：生产与替代使用在电器电子、汽车、涂料、家具、儿童玩具、教育场所硬件设备、印刷、汽车制造涂装、橡胶制品、皮革、制鞋等重点行业使用无毒无害或低毒低害原料，对含重金属或有机污染物、消耗臭氧层物质等有毒有害物质原料进行替代的技术改造或新工艺生产设施建设。如《国家鼓励的有毒有害原料（产品）替代品目录（2016
    年版）》所列替代品的生产设施建设或替代使用技术改造，以及《关于消耗臭氧层物质的蒙特利尔议定书》及其各修正案受控物质进行替代的技术改造或新工艺生产设施建设。
  section: 绿色债券目录 2.1.4.1
- id: cit-gb-098
  text: 危险废物处理：处置列入《国家危险废物名录》（2016 年公布）的危险废物、医疗废物的减量化、无害化处理处置设施建设和运营。
  section: 绿色债券目录 2.1.4.2
- id: cit-gb-099
  text: 危险废物运输列入：《国家危险废物名录》（2016 年公布）的危险废物、医疗废物的运输运营活动。
  section: 绿色债券目录 2.1.4.3
- id: cit-gb-101
  text: 农业农村：环境综合治理
  section: 绿色债券目录 2.2.1
- id: cit-gb-102
  text: 高效低毒低残：留农药生产与替代通过农药生产设备、生产工艺系统改造升级、环境友好型农药研发生产等措施，生产及在农业生产中使用符合《种植业生产使用低毒低残留农药主要品种名录（2016）》等国家和行业政策优先支持的高效低毒低残留品种农药的活动。
  section: 绿色债券目录 2.2.1.1
- id: cit-gb-103
  text: 畜禽养殖废弃：物污染治理通过畜禽养殖场清洁化养殖改造、养殖废水、粪污收集和无害化处理和综合利用设施建设、空气污染防治设施改造和建设等手段，治理畜禽养殖废弃物污染的活动。
  section: 绿色债券目录 2.2.1.2
- id: cit-gb-104
  text: 废弃农膜回收：利用废弃农膜机动和固定回收站点建设、运输和储存系统建设，以及利用废弃农膜生产再生颗粒、防水防漏材料、塑料编织袋、裂解油等生产设备制造和生产设施建设和运营。
  section: 绿色债券目录 2.2.1.3
- id: cit-gb-106
  text: 固体废弃：物综合利用
  section: 绿色债券目录 2.3.1
- id: cit-gb-107
  text: '工业固体废弃：物无害化处理处置及综合利用冶炼渣、工业副产石膏、赤泥、化工废渣、粉煤灰等工业固体废弃物的回收、无害化处理和再利用设施建设和运营，以及危险废物焚烧、高温熔融等无害化处理设施建设和运营，符合污染控制技术相关标准或政策，利用危险废物作为原料制备其他工业产品、进行资源化利用的再利用设施建设和运营，并符合《工业固体废物综合利用产品环境与质量安全评价技术导则》（GB/T
    32328）、《工业固体废物综合利用技术评价导则》（GB/T 32326）、《工业固体废物综合利用术语》（GB/T 34911）等国家标准的要求。 [技术标准: GB/T 32328, GB/T 32326, GB/T 34911]'
  section: 绿色债券目录 2.3.1.1
- id: cit-gb-108
  text: 历史遗留尾矿：库整治尾矿库堆存系统改造、排洪系统改造、回水系统改造，重金属污染地块河道废渣污染治理修复等历史遗留尾矿库及其影响地块污染治理和环境修复活动。
  section: 绿色债券目录 2.3.1.2
- id: cit-gb-109
  text: '包装废弃物回：收处理纸包装容器及材料、塑料包装容器及材料、金属包装容器及材料、玻璃包装容器及材料、木包装容器及材料、混合包装等包装废弃物的回收和处理设施建设和运营，并符合《废复合包装分选质量要求》（GB/T 38925）等国家标准的要求。
    [技术标准: GB/T 38925]'
  section: 绿色债券目录 2.3.1.3
- id: cit-gb-110
  text: 工业园区：资源综合利用
  section: 绿色债券目录 2.3.2
- id: cit-gb-111
  text: 园区产业链接：循环化改造在工业园区内，电力、钢铁、有色金属、石油石化、化学工业、建材、造纸、纺织、农牧业等行业企业，以企业为基础建立跨行业产业链接，实现最大化的废弃物资源接续利用，实现废弃物循环利用，或能源梯级利用的技术改造活动。
  section: 绿色债券目录 2.3.2.1
- id: cit-gb-112
  text: '园区资源利用：高效化改造园区内废弃物资源，尾矿、伴生矿等资源利用项目引进和建设，以及为提升园区整体资源利用效率和园区企业资源利用效率而进行的园区专项或系统化改造，包括园区产业链补链企业引进、改造和建设，既有企业资源高效利用改造等，并符合《废弃资源综合利用业环境管理体系实施指南》（GB/T
    29750）等国家标准的要求。 [技术标准: GB/T 29750]'
  section: 绿色债券目录 2.3.2.2
- id: cit-gb-114
  text: '工业节水2.4.1.1 生产过程节水：和水资源高效利用工业冷却用水节水改造、热力和工艺用水节水改造、洗涤用水节水改造、蒸汽冷凝水回收再利用、外排废水回收处理再利用、非常规水资源利用设施建设等工业节水设施建设和技术改造，并符合《重金属废水处理与回用技术评价》（GB/T
    38224）等国家标准的要求。 [技术标准: GB/T 38224]'
  section: 绿色债券目录 2.4.1
- id: cit-gb-117
  text: 电力设施：节能
  section: 绿色债券目录 3.1.1
- id: cit-gb-118
  text: 智能电网产品：和装备制造智能变压器、整流器和电感器，先进电力电子装置，智能输配电及控制设备，特高压输电装备，抽水蓄能装备，新能源储能装备，充电设施生产制造，以及与智能电网和新能源相关控制类产品生产制造。
  section: 绿色债券目录 3.1.1.1
- id: cit-gb-119
  text: 智能电网建设：和运营集成信息、控制、储能等技术以及智能化电力设备，减少弃风弃光，提升清洁能源的消纳效率，实现电力发输配用储过程中的数字化管理、智能化决策、互动化交易的电网设施建设和运营。
  section: 绿色债券目录 3.1.1.2
- id: cit-gb-121
  text: 新能源与：清洁能源装备制造
  section: 绿色债券目录 3.2.1
- id: cit-gb-122
  text: 风力发电装备：制造陆上、海上风力发电机组，3 兆瓦及以上高原型、低温型、低风速风力发电机组配套的发电机、风轮叶片、轴承、电缆、变速箱、塔筒等关键零部件，以及风电场相关系统与装备的制造及贸易活动。
  section: 绿色债券目录 3.2.1.1
- id: cit-gb-123
  text: 太阳能发电装：备制造光伏发电设备和光热发电设备制造及贸易活动。其中，光伏发电设备制造企业和项目需符合《光伏制造行业规范条件（2018 年本）》（中华人民共和国工业和信息化部公告〔2018〕第2 号公布）要求，光伏电池生产需达到《光伏电池行业清洁生产评价指标体系》（国家发展和改革委员会环境保护部工业和信息化部公告〔2016〕第21
    号公布）Ⅰ级水平。
  section: 绿色债券目录 3.2.1.2
- id: cit-gb-124
  text: 生物质能利用：装备制造秸秆、稻壳等农业生产副产生物质资源收集、粉碎、运输和储存设备，生物质发电、供热装备，沼气、生物质燃气生产装备，生物质固液体燃料生产装备，生物质能利用中的环保装备等装备制造及贸易活动。
  section: 绿色债券目录 3.2.1.3
- id: cit-gb-125
  text: 水力发电和抽：水蓄能装备制造高性能大容量水电机组、高水头大容量抽水蓄能机组成套设备、百万千瓦级大型水轮发电机组、变速抽水蓄能机组、超高水头大型冲击式水轮发电机组、海水抽水蓄能机组等水力发电和抽水蓄能机组装备制造及贸易活动。
  section: 绿色债券目录 3.2.1.4
- id: cit-gb-126
  text: 核电装备制造：第三代先进压水堆核电站成套设备，快中子堆和高温气冷堆核电站设备，模块化小型核能装置，核应急装置及核级泵、阀设备等核电站辅助设备，防辐射材料、安全与监测装置的生产制造；铀矿开采、铀纯化转化、铀浓缩、燃料元件的生产和生产设备制造，以及核设施退役、放射性废物处理和处置装置制造，铀矿伴生矿综合利用设备制造。
  section: 绿色债券目录 3.2.1.5
- id: cit-gb-127
  text: 燃气轮机装备：制造重型燃气轮机、微型燃气轮机等燃气轮机装备制造；以及复杂结构陶瓷型芯、高强抗热冲击陶瓷模壳、大尺寸定向结晶或单晶叶片、大型涡轮盘、高精度转子、高耐用性轴承和密封设备、高强钢拉杆、高温高压燃烧器等燃气轮机核心部件制造。
  section: 绿色债券目录 3.2.1.6
- id: cit-gb-128
  text: 燃料电池装备：制造质子交换膜、直接甲醇、碱性燃料、熔融碳酸燃料、磷酸燃料、固体氧化物等类别燃料电池生产制造及贸易活动。
  section: 绿色债券目录 3.2.1.7
- id: cit-gb-129
  text: 地热能开发利：用装备制造地源热泵、高温地热热泵，以及地热吸收式制冷系统、中低温地热发电系统、地热干燥及热水供应系统、地热防腐防垢关键设备制造及贸易活动。
  section: 绿色债券目录 3.2.1.8
- id: cit-gb-130
  text: 海洋能开发利：用装备制造利用海洋潮汐能、潮流能、波浪能、温差能、盐差能等资源发电的海洋能开发利用装备制造及贸易活动。
  section: 绿色债券目录 3.2.1.9
- id: cit-gb-131
  text: 可再生能：源设施建设与运营
  section: 绿色债券目录 3.2.2
- id: cit-gb-132
  text: 风力发电设施：建设和运营利用风能发电的设施建设和运营。
  section: 绿色债券目录 3.2.2.1
- id: cit-gb-133
  text: 太阳能利用设：施建设和运营利用太阳能发电的设施建设和运营。包括太阳能光伏发电、太阳能热发电和太阳能热利用设施。其中，太阳能光伏发电设施选用的部件产品需满足如下限定条件：（1）多晶硅电池和单晶硅电池的最低光电转换效率分别不低于19%和21%；（2）多晶硅电池组件和单晶硅电池组件的最低光电转换效率分别不低于17%和17.8%；（3）硅基、CIGS、CdTe
    及其他薄膜电池组件的最低光电转换效率分别不低于12%、14%、14%、12%；（4）多晶硅电池组件和单晶硅电池组件衰减率首年分别不高于2.5%和3%，后续每年不高于0.7%，25 年内不高于20%；薄膜电池组件衰减率首年不高于5%，后续每年不高于0.4%，25 年内不高于15%。
  section: 绿色债券目录 3.2.2.2
- id: cit-gb-134
  text: 生物质能源利：用设施建设和运营以农林废弃物、城市生活垃圾等生物质原料发电、供热，生产燃料乙醇等生物质液体燃料，以及以地沟油等餐厨废物为主要原料生产生物柴油等产品的设施建设和运营。
  section: 绿色债券目录 3.2.2.3
- id: cit-gb-135
  text: 大型水力发电：设施建设和运营对生态环境无重大影响前提下，利用水体势能发电的设施建设和运营。仅含列入国家可再生能源规划等规划的重点大型水电项目。
  section: 绿色债券目录 3.2.2.4
- id: cit-gb-136
  text: 核电站建设和：运营在保障环境安全前提下，利用可控核裂变释放热能，采用第三代和第四代核电技术发电的设施建设和运营。
  section: 绿色债券目录 3.2.2.5
- id: cit-gb-137
  text: 地热能利用设：施建设和运营采用热泵等技术提取浅层地热能（包括岩土体热源、地下水热源、地表水热源等）的建筑供暖、供冷设施建设和运营；利用中高温地热、中低温地热、干热岩等地热资源发电的设施建设和运营。
  section: 绿色债券目录 3.2.2.6
- id: cit-gb-138
  text: 海洋能利用设：施建设和运营对海洋生态和生物多样性不造成严重损害的前提下，利用海洋潮汐能、波浪能、潮流能、温差能、盐差能等资源发电的设施建设和运营。
  section: 绿色债券目录 3.2.2.7
- id: cit-gb-139
  text: '氢能利用设施：建设和运营清洁制氢、氢气安全高效储存、加氢站、氢燃料电池汽车、氢燃料电池发电、掺氢天然气等技术设置和氢能应用。氢安全应符合《氢气使用安全技术规程》（GB 4962）和《氢系统安全的基本要求》（GB/T 29729）等国家标准要求。水电解制氢应符合《水电解制氢系统技术要求》（GB/T
    19774）和《压力型水电解制氢系统安全要求》（GB/T37563）等国家标准要求。变压吸附提纯制氢应符合《变压吸附提纯氢用吸附器》（GB/T29412）和《变压吸附提纯氢系统技术要求》（GB/T 19773）等国家标准要求。氢储运应符合《固定式高压储氢用钢带错绕式容器》（GB/T
    26466）和《氢气储存输送系统 [技术标准: GB 4962, GB/T 29729, GB/T 19774, GB/T37563, GB/T29412, GB/T 19773, GB/T 26466, GB/T 34542, GB/T
    34583, GB 50177, GB 50516, GB/T 34584, GB/T 29124, GB/T 31139, GB/Z 34541, GB/T 34537, GB/T 37244, GB/T 29123, GB/T 24549,
    GB/T 27748]'
  section: 绿色债券目录 3.2.2.8
- id: cit-gb-140
  text: 热泵设施建设：和运营空气源热泵、地下水源热泵、地表水源热泵、污水源热泵、土壤源热泵、高温空气能热泵等热泵供热（冷）系统设施的建设和运营。
  section: 绿色债券目录 3.2.2.9
- id: cit-gb-141
  text: 清洁能源：高效运行
  section: 绿色债券目录 3.2.3
- id: cit-gb-142
  text: 多能互补工程：建设和运营针对终端用户电、热、冷等多能消费需求，以提升供能系统综合能效、增加可再生能源利用、减少碳排放为目标，采用天然气热电冷三联供、分布式可再生能源和能源智能微网等技术建设运营的终端一体化供能系统设施，设施综合能效应大于等于70%；以及为增加区域电网对风电、光伏发电等间歇性可再生能源的消纳能力，解决区域电网风电、水电、光伏发电弃风、弃光、弃水问题，利用大型综合能源基地风能、太阳能、水能、天然气等资源发挥组合优势，以火电、水电、储能设施等承担调节功能提高电力系统运行稳定性进行的多能互补系统建设和运营。系统弃风率控制应在5%以内，弃光率应控制在3%以内。
  section: 绿色债券目录 3.2.3.1
- id: cit-gb-143
  text: 高效储能设施：建设和运营采用物理储能、电磁储能、电化学储能和相变储能等技术，为提升可再生能源发电、分布式能源、新能源微电网等系统运行灵活性、稳定性和可靠性进行的高效储能、调峰设施建设和运营。
  section: 绿色债券目录 3.2.3.2
- id: cit-gb-144
  text: 天然气输送储：运调峰设施建设和运营天然气长输管道、储气库、支线管道、区域管网，以及液化天然气（LNG）接收站等天然气输送、储运、调峰设施建设和运营，以及甲烷泄漏检测与修复装置配备。
  section: 绿色债券目录 3.2.3.3
- id: cit-gb-145
  text: 分布式能源工：程建设和运营天然气热电冷三联供、分布式可再生能源发电、地热能供暖制冷等分布式能源工程建设和运营。天然气或其他化石能源驱动的分布式冷热电三联供能源系统和工程项目的节能率要求应符合《分布式冷热电能源系统的节能率第1 部分：化石能源驱动系统》（GB/T
    33757.1）要求，相关系统和工程项目的制冷、供热单元和动力单元应符合《分布式冷热电能源系统技术条件第1 部分：制冷和供热单元》（GB/T 36160.1）和《分布式冷热电能源系统技术条件第2 部分：动力单元》（GB/T 36160.2）等国家标准要求。
  section: 绿色债券目录 3.2.3.4
- id: cit-gb-146
  text: 抽水蓄能电站：建设和运营为提高电网对风电、光伏发电等间歇性可再生能源电力消纳能力，提升电网运行灵活性、稳定性和可靠性，在电网中主要承担电力“削峰填谷”功能的抽水蓄能电站建设和运营。
  section: 绿色债券目录 3.2.3.5
- id: cit-gb-147
  text: 二氧化碳捕：集、利用与封存工程建设和运营对化石能源燃烧和工业过程排放二氧化碳进行捕集、利用或封存的减排项目建设和运营。
  section: 绿色债券目录 3.2.3.6
- id: cit-gb-150
  text: 农业资源：保护
  section: 绿色债券目录 4.1.1
- id: cit-gb-151
  text: 现代农业种业：及动植物种质资源保护以推进农业可持续发展为目标的农作物种业育繁推产业化工程，良种示范区，研发平台、服务平台等建设，以及动植物种质资源收集、保存、保护及管理工程。
  section: 绿色债券目录 4.1.1.1
- id: cit-gb-152
  text: 农作物种植保：护地、保护区建设和运营在划定的永久基本农田区域因地制宜开展的零星分散耕地整合归并、土地复垦及耕地提质改造工程；在永久基本农田开展的退化耕地综合治理、中低产田改造、高标准农田建设等耕地质量提升工程；耕地占补平衡项目中被占用耕地表土剥离用于新增耕地、劣质地或基本农田整备区耕地土壤改良工程，以及农田水利设施建设、耕地保水保肥、污控修复等活动。其中，禁止开垦、复垦严重沙化土地，禁止在25
    度以上陡坡开垦、复垦耕地，禁止违规毁林开垦耕地。
  section: 绿色债券目录 4.1.1.2
- id: cit-gb-153
  text: 林业基因资源：保护林业基因（遗传）资源调查、监测与信息化平台建设，林业基因（遗传）资源收集与保存工程（原地或异地保护、保存设施、保护区建设等），乡土树种、经济树种、速生树种的育种、驯化和生物勘探工程，良种利用工程，侵入物种防控等符合国家、行业相关政策、规范、标准的林业基因（遗传）资源保护工程。
  section: 绿色债券目录 4.1.1.3
- id: cit-gb-154
  text: 增殖放流与海：洋牧场建设和运营为改善水域环境、保护生物多样性向海洋、滩涂、江河、湖泊、水库等天然水域投放渔业生物卵子、幼体或成体，恢复或增加种群数量、改善和优化水域生物群落结构的增殖放流与海洋牧场建设和运营。
  section: 绿色债券目录 4.1.1.4
- id: cit-gb-155
  text: 有害生物灾害：防治为保护生物多样性进行的外来物种入侵防控，农业、林业病虫害有害生物灾害防治活动，以及以资源化利用为手段，治理外来入侵物种的活动。
  section: 绿色债券目录 4.1.1.5
- id: cit-gb-156
  text: 农村土地综合：整治为推进美丽宜居乡村建设，优化生产生活生态空间，开展的农村山水路林村综合整治活动。如低效闲散建设用地整治、工矿废弃地复垦和空心村整治，以及为提高耕地质量而进行的改良土壤、培肥地力、保水保肥、污控修复等活动。
  section: 绿色债券目录 4.1.1.6
- id: cit-gb-157
  text: 农业农村：环境综合治理
  section: 绿色债券目录 4.1.2
- id: cit-gb-158
  text: 农作物病虫害：绿色防控通过推广抗病虫作物品种，使用“以虫治虫”“稻鸭共育”“生物生化制剂”等生物防治技术，使用“杀虫灯”“防虫网阻隔”等理化诱控技术，使用高效、低毒、低残留、环境友好型农药，开展的农作物病虫害绿色防控活动，以及化学农药减量增效、使用量零增长活动等。
  section: 绿色债券目录 4.1.2.1
- id: cit-gb-159
  text: 绿色农产：品供给
  section: 绿色债券目录 4.1.3
- id: cit-gb-160
  text: 绿色有机农业：有机农产品和绿色食品生产、消费及大宗绿色农产品贸易活动；有机农产品和绿色食品生产相关设施建设。产品及其生产环境需符合有效期内《有机产品》（GB/T19630.1- GB/T 19630.4）国家标准，原农业部环境质量标准和农药、肥料、兽药、饲料及饲料添加剂、食品添加剂、动物卫生等7
    项通用准则性标准，以及45 项产品质量标准；产品标注需符合原农业部《绿色食品标志管理办法》（中华人民共和国农业部令〔2012〕第6 号发布）。大宗绿色农产品贸易活动主要适用于获得国际相关认证体系可持续证书的农产品。
  section: 绿色债券目录 4.1.3.1
- id: cit-gb-161
  text: 绿色畜牧业：为推进畜牧业资源高效利用、生态环境保护而进行的绿色畜牧业工程，如病死畜禽无害化处理体系、畜禽养殖废弃物贮存处理利用设施建设、高架床等环保型养殖设施建设、构建“养殖+沼气+种植+加工”的循环农业产业园区建设等。
  section: 绿色债券目录 4.1.3.2
- id: cit-gb-162
  text: 绿色渔业：碳汇渔业及净水渔业、稻渔及盐碱水鱼农综合利用、循环水养殖、深水抗风浪及不投饵网箱养殖、生态健康养殖，水产品加工副产物综合利用等环境友好型渔业生产；水产养殖污水处理设施建设和运营，以及渔业资源养护设施建设和运营，如养护型海洋牧场建设和运营等。
  section: 绿色债券目录 4.1.3.3
- id: cit-gb-164
  text: 自然生态：系统保护和修复
  section: 绿色债券目录 4.2.1
- id: cit-gb-165
  text: 天然林资源保：护为维护天然林生态系统的原真性、完整性开展的森林病虫害等有害生物防治、森林防火、森林管护装备和基础设施建设；天然林抚育保育基础设施建设（如天然林场内林场管护用房、供电、供水、通信、道路等基础设施建设）；天然林退化修复工程（如采用乡土树种的坡耕地还林、人工造林、封山育林、抚育性采伐等）；全面禁止商业性采伐前提下国有林区转产项目建设（如不破坏地表植被、不影响生物多样性保护前提下的生态旅游、休闲康养、特色种养殖等）。
  section: 绿色债券目录 4.2.1.1
- id: cit-gb-166
  text: 荒漠化、石漠：化和水土流失综合治理因地制宜采用退耕还林还草、退牧还草、封沙育林育草、人工种草造林等植物治沙措施，建设机械沙障和植物沙障等物理治沙措施，在水资源匮乏植物难以生长地区使用土壤凝结剂固结流沙表层等化学治沙措施开展的土地荒漠化治理活动，以及在石漠化地区开展的退耕还林还草，造林整地，生态经济林营造建设，水源涵养林、水土保持林营造建设，封山育林等石漠化综合治理活动，以及通过治坡（梯田、台地、鱼鳞坑建设等）、治沟（淤地坝、拦沙坝等）和小型水利工程等工程措施，种草造林等生物措施，蓄水保土农业生产和建设项目开发方式开展的水土流失综合治理活动。
  section: 绿色债券目录 4.2.1.10
- id: cit-gb-167
  text: 水生态系统：旱涝灾害防控及应对自然水系连通恢复、水利设施建设、湿地恢复、灾害预警信息平台建设等水生态系统灾害防控及应对设施建设和运营。
  section: 绿色债券目录 4.2.1.11
- id: cit-gb-168
  text: 地下水超采：区治理与修复华北、东北等地下水超采区开展的灌区节水改造、田间高效节水灌溉工程、以节水为目的的农作物种植品种结构调整、工业节水改造、城镇供水管网改造建设、再生水利用工程、调水水利工程、地下水水源置换工程、生态补水等地下水超采区治理与修复活动。
  section: 绿色债券目录 4.2.1.12
- id: cit-gb-169
  text: 采煤沉陷区：综合治理采煤沉陷区开展的土地整治、生态修复与环境整治等生态恢复活动，以及采煤沉陷区影响范围内居民避险搬迁、基础设施和和公共服务设施修复提升、非煤接续替代产业平台建设等活动。
  section: 绿色债券目录 4.2.1.13
- id: cit-gb-170
  text: 海域、海岸带：和海岛综合整治为保护近岸海域、海岸、海岛自然资源、生态环境和生物多样性而实施的海域综合治理、自然岸线修复、海湾整治等活动。
  section: 绿色债券目录 4.2.1.14
- id: cit-gb-171
  text: 动植物资源保：护濒危野生动植物抢救性保护、生物多样性保护、渔业资源保护、古树名木保护等活动。
  section: 绿色债券目录 4.2.1.2
- id: cit-gb-172
  text: 自然保护区建：设和运营为保护有代表性的自然生态系统、珍稀濒危野生动植物物种，在其天然集中分布区、自然遗迹所在地依法划定一定面积保护区域（含核心区、缓冲区和外围区）予以特殊保护和管理的活动，包括出于保护目的的居民迁出安置、保护区管控设施建设和运营，科学研究基础设施建设和运营（核心区内禁止），科学实验、教学实习、参观考察、旅游、珍稀濒危动植物繁殖、驯化等教学科研旅游基础设施建设和运营（仅限于外围区）。4.2.1.4.
    生态功能区建设维护和运营对生态功能区和生态功能退化的区域进行的治理、修复和保护工程建设，如水土流失综合治理、荒漠化石漠化治理、矿山地质环境保护和生态恢复、自然保护区建设等。
  section: 绿色债券目录 4.2.1.3
- id: cit-gb-173
  text: 退耕还林还草：和退牧还草工程建设为保护生态环境，在水土流失严重、沙化、盐碱化、石漠化严重耕地实施的有计划、有步骤停止耕种，因地制宜种草造林，恢复植被，抑制生态环境恶化的活动；以及为抑制草场退化，开展的禁牧封育、草原围栏、舍饲棚圈、人工饲草地建设等草原生态保护设施建设活动。
  section: 绿色债券目录 4.2.1.5
- id: cit-gb-174
  text: 河湖与湿地保：护恢复因地制宜采取治理、修复、保护等措施，促使河湖、湿地原生生态系统保护和生物多样性恢复，增强其生态完整性和可持续性的活动。如污染物控源减污设施建设、河滨湖滨生态缓冲带建设、乡土物种植被恢复、河湖有序连通、生态调度工程建设，防洪、防岸线蚀退设施建设等。
  section: 绿色债券目录 4.2.1.6
- id: cit-gb-175
  text: 国家生态安全：屏障保护修复为筑牢国家生态安全屏障，在西部高原生态脆弱区、北方风沙源区、东部沿海地区、长江、黄河、珠江流域等高强度国土开发区等关系生态安全核心地区，基于各自经济、生态功能定位和重点生态安全风险，开展的山水林田湖生态保护和修复工程，如矿山环境治理恢复、土地整治与污染修复、生物多样性保护、流域水环境保护治理，以及通过土地整治、植被恢复、河湖水系连通、岸线环境整治、野生动植物栖息地恢复、外来入侵物种防治等手段开展的系统性综合治理修复活动。
  section: 绿色债券目录 4.2.1.7
- id: cit-gb-176
  text: 重点生态区域：综合治理京津风沙源综合治理、岩溶石漠化地区综合治理、青海三江源等重点生态区域的生态保护与建设，重点流域水生生物多样性保护，如防风林建设、退耕还草还林、湿地恢复和保护、自然保护区建设等。
  section: 绿色债券目录 4.2.1.8
- id: cit-gb-177
  text: 矿山生态环境：恢复对矿产资源勘探和采选过程中的各类生态破坏和环境污染采取人工促进措施，依靠生态系统的自我调节能力与自组织能力，逐步恢复与重建其生态功能的活动。如矿山废弃地土地整治、植被恢复，河、湖、海防堤等重要设施或重要建筑附近矿井、钻孔、废弃矿井回填封闭，矿山土地复垦，沉陷区恢复治理，矿山大气、水、土壤污染防治和治理，尾矿等废弃物综合利用，减少土地占用等。
  section: 绿色债券目录 4.2.1.9
- id: cit-gb-178
  text: 生态产品：供给
  section: 绿色债券目录 4.2.2
- id: cit-gb-179
  text: '森林资源培育：产业林业良种生产、苗木培育，以及森林营造、抚育、森林主伐更新等森林资源培育活动，以及符合《中国森林认证森林经营》（GB/T 28951）、《中国森林认证产销监管链》（GB/T 28952）等相关标准要求的可持续经营活动。
    [技术标准: GB/T 28951, GB/T 28952]'
  section: 绿色债券目录 4.2.2.1
- id: cit-gb-180
  text: '林下种植和林：下养殖产业在保持林地生态系统功能和稳定性前提下，在林下或林间空地种植粮食作物、油料作物、药材、食用菌、饲草、蔬菜，以及林下养殖家禽、放牧或舍饲饲养家畜等活动，以及符合《中国森林认证森林经营》（GB/T 28951）、《中国森林认证非木质林产品经营》（LY/T
    2273）等相关标准要求的绿色产品溯源体系建设、绿色产品生产与贸易及相关的平台建设。 [技术标准: GB/T 28951]'
  section: 绿色债券目录 4.2.2.2
- id: cit-gb-181
  text: 碳汇林、植树：种草及林木种苗花卉具有显著碳汇效应或具有显著改善环境、净化空气作用的林木草植培育、种植活动。支持保护生物多样性的林木种植活动。
  section: 绿色债券目录 4.2.2.3
- id: cit-gb-182
  text: '森林游憩和康：养产业在不破坏地表植被、生物多样性和生态系统的前提下，依托森林、草地、湿地、荒漠、高山、湖泊、河流、海岸带和野生动物植物等自然景观资源开展的游览观光、休闲体验、文化体育、健康养生等设施建设，以及符合《中国森林认证森林经营》（GB/T
    28951）及相关标准要求的可持续经营活动。 [技术标准: GB/T 28951]'
  section: 绿色债券目录 4.2.2.4
- id: cit-gb-183
  text: '国家公园、世：界遗产、国家级风景名胜区、国家森林公园、国家地质公园、国家湿地公园等保护性运营依托森林、草地、沙漠、湿地、海洋等自然生态系统进行的以保护为目的的开发建设，如国家公园、世界自然遗产地、森林公园、湿地公园和荒漠公园等建设和运营，以及在允许的区域内符合《中国森林认证森林经营》（GB/T
    28951）、《中国森林认证森林生态环境服务自然保护区》（LY/T 2239）、《中国森林认证森林公园生态环境服务》（LY/T 2277）、《中国森林认证野生动物饲养管理》（LY/T 2279）等相关标准要求的可持续经营活动。 [技术标准:
    GB/T 28951]'
  section: 绿色债券目录 4.2.2.5
- id: cit-gb-186
  text: 城镇电力：设施和用能设施节能
  section: 绿色债券目录 5.1.1
- id: cit-gb-187
  text: 城镇集中供热：系统清洁化建设运营和改造采用低品位工业余热热源、热电联产热源或采用电、天然气等清洁能源热源替代散煤、分散燃煤锅炉，从而达到清洁取暖要求的城镇集中供热设施建设，以及城镇集中供热锅炉、供热管网等集中供热设施节能、环保技术改造活动。
  section: 绿色债券目录 5.1.1.1
- id: cit-gb-188
  text: 城镇电力设施：智能化建设运营和改造城镇电力需求侧管理平台开发建设，城镇配电网技术改造，用电设备智能化改造，以及高污染、低效用能设备的电能替代改造等。
  section: 绿色债券目录 5.1.1.2
- id: cit-gb-189
  text: 城镇一体化集：成供能设施建设和运营多能互补利用设施、分布式供能设施或系统、智能微网等城镇一体化集成供能设施建设和运营。
  section: 绿色债券目录 5.1.1.3
- id: cit-gb-191
  text: 建筑节能：与绿色建筑
  section: 绿色债券目录 5.2.1
- id: cit-gb-192
  text: '超低能耗建筑：建设适应气候特征和场地条件，通过被动式建筑设计降低建筑供暖、空调、照明需求，通过主动技术措施提高建筑能源设备和系统效率的公共和居住建筑建设，以及购置消费。建筑技术指标需符合《近零能耗建筑技术标准》（GB/T 51350）要求。
    [技术标准: GB/T 51350]'
  section: 绿色债券目录 5.2.1.1
- id: cit-gb-193
  text: '绿色建筑：依据国家绿色建筑相关规范、标准设计建设，建筑施工图预评价达到有效期内绿色建筑星级标准，以及按照绿色建筑星级标准建设，达到有效期内国家相关绿色建筑运营评价标识星级标准的各类民用、工业建筑建设和购置消费。例如建筑相关技术指标符合《绿色建筑评价标准》（GB/T
    50378）、《绿色工业建筑评价标准》（GB/T50878）、《绿色生态区域评价标准》（GB/T 51255）、《绿色办公建筑评价标准》（GB/T 50903）、《绿色商店建筑评价标准》（GB/T 51100）、《绿色医院建筑评价标准》（GB/T
    51153）等技术标准要求。 [技术标准: GB/T 50378, GB/T50878, GB/T 51255, GB/T 50903, GB/T 51100, GB/T 51153]'
  section: 绿色债券目录 5.2.1.2
- id: cit-gb-194
  text: 建筑可再生能：源应用利用建筑屋顶、墙面安装太阳能光伏发电装置向建筑提供电力，以及利用热泵等设施向建筑供冷、供热的建筑可再生能源应用系统的设计、建设及可再生能源建筑应用改造活动。
  section: 绿色债券目录 5.2.1.3
- id: cit-gb-195
  text: '装配式建筑：采用预制部件在建设工地通过装配施工方法的建筑建设。建筑相关技术指标达到有效期内《装配式建筑评价标准》（GB/T 51129）中A 级及以上标准要求。 [技术标准: GB/T 51129]'
  section: 绿色债券目录 5.2.1.4
- id: cit-gb-196
  text: '既有建筑节能：及绿色化改造改造后建筑相关技术指标符合国家或地方相关建筑节能标准的既有建筑物节能改造活动、建筑用能系统节能改造活动有关要求；获得有效期内国家相关绿色建筑星级标识的既有建筑改造和运营及购置消费，以及改造后达到有效期内国家相关绿色建筑星级标识的既有建筑改造和运营及购置消费。例如建筑技术符合《民用建筑设计统一标准》（GB
    50352）、《公共建筑节能设计标准》（GB 50189）、《既有建筑绿色改造评价标准》（GB/T 51141）等技术标准。 [技术标准: GB 50352, GB 50189, GB/T 51141]'
  section: 绿色债券目录 5.2.1.5
- id: cit-gb-197
  text: 物流绿色仓储：按照国家绿色建筑相关规范、标准设计建设或改造，并达到国家相关绿色建筑评价标识水平标准的物流仓储场所的建筑建设、运营及改造活动。例如建筑技术指标符合《绿色仓储要求与评价》（SB/T 11164）对绿色物流仓储建筑的有关要求。
  section: 绿色债券目录 5.2.1.6
- id: cit-gb-199
  text: 城镇环境：基础设施
  section: 绿色债券目录 5.3.1
- id: cit-gb-200
  text: 污水处理、再：生利用及污泥处理处置设施建设运营城镇和农村污水处理设施及再生利用设施建设运营和改造，污泥处置设施建设运营和改造，以及按照污染治理、生态保护、循环利用相结合的理念构建的区域再生水循环利用体系建设和运行，包括城镇污水处理厂达标排放出水的人工湿地等生态处理设施建设和运营，区域再生水循环利用体系的再生水调度管理系统的开放运维。
  section: 绿色债券目录 5.3.1.1
- id: cit-gb-201
  text: 生活垃圾处理：设施建设和运营生活垃圾减量化、无害化处理处置和资源化利用设施建设和运营，如生活垃圾收集、转运、焚烧发电、供热等设施建设和运营。
  section: 绿色债券目录 5.3.1.2
- id: cit-gb-202
  text: 城镇污水收集：系统排查改造建设修复城镇污水管网排查、疏浚、维修修复及改造，污（雨）水调蓄设施建设及改造，污水管网地理信息系统（GIS）建设和运营等。
  section: 绿色债券目录 5.3.1.3
- id: cit-gb-203
  text: 环境监测系统：建设和运营大气、地表水（含水功能区和农田灌溉水）、地下水、饮用水源、土壤、温室气体、噪声、辐射等环境监测系统的建设和运营，包括系统采样分析设备、监测仪器、计算机、监测车辆、监测无人机、监测气球等硬件设备购置、安装建设及软件系统开发等。例如工业园区环境风险固定式监测预警设备、移动监测预警设备、预警平台、服务器以及预警体系长期运营维护等。
  section: 绿色债券目录 5.3.1.4
- id: cit-gb-204
  text: 入河排污口排：查整治及规范化建设和运营采用各种技术手段开展的排污管线及其入河排污口的巡查、巡检、排查及测绘活动，以及排污管线、入河排污口的清理整治、规范化改造、修复、维护及其监测系统的建设和运营。
  section: 绿色债券目录 5.3.1.5
- id: cit-gb-206
  text: 水资源节：约
  section: 绿色债券目录 5.4.1
- id: cit-gb-207
  text: 城镇供水管网：分区计量漏损控制建设和运营城镇公共供水设施建设运营及改造，以及供水管网流量计量、水质监测、压力调控、数据采集与远传等供水管网漏损监控系统设施的建设和改造。
  section: 绿色债券目录 5.4.1.1
- id: cit-gb-209
  text: 海绵型建筑与：小区建设和运营在公共建筑及居住小区因地制宜采取屋顶绿化、可渗透地面铺装、微地形、雨水花园建设，雨落管断接、雨水调蓄与收集利用设施建设等工程技术手段开展的海绵型建筑与小区建设和运营。
  section: 绿色债券目录 5.4.2.1
- id: cit-gb-210
  text: 海绵型道路与：广场建设和运营在非机动车道、人行道、停车场、广场等场所采用透水铺装，以及道路与广场雨水收集、净化和利用设施建设，生物滞留带、环保雨水口、旋流沉砂等道路雨水径流污染防治治理设施建设等技术措施开展的海绵型道路与广场建设和运营。
  section: 绿色债券目录 5.4.2.2
- id: cit-gb-211
  text: 海绵型公园和：绿地建设和运营在城镇公园和公共绿地等场所通过雨水花园、下凹式绿地、人工湿地、雨水塘设施建设等技术措施开展的海绵型公园和绿地建设和运营。
  section: 绿色债券目录 5.4.2.3
- id: cit-gb-212
  text: 城市排水设施：达标建设运营和改造城市排水防涝设施达标建设、运营和改造。如城市易涝点排水改造，雨污分流管网建设和改造、雨水岸线净化设施建设和改造，沿岸流干管建设和改造，沉淀过滤、人工湿地等溢流污废水净化设施建设和改造，雨水调蓄设施建设和改造等。
  section: 绿色债券目录 5.4.2.4
- id: cit-gb-213
  text: 城市水体自然：生态修复为保护和修复城市水体自然生态系统开展的河湖水系自然连通恢复和保护工程，河道系统整治、生态修复活动。如渠化河道改造，因势利导恢复自然弯曲河岸线，自然深潭浅滩和泛洪漫滩等。
  section: 绿色债券目录 5.4.2.5
- id: cit-gb-215
  text: 城乡公共：客运和货运
  section: 绿色债券目录 5.5.1
- id: cit-gb-216
  text: 不停车收费系：统建设和运营高速公路自动扣费系统、市区过桥自动扣费系统、隧道自动扣费系统、停车场车交费系统等不停车收费系统设施建设和运营。
  section: 绿色债券目录 5.5.1.1
- id: cit-gb-217
  text: 集装箱多式联：运系统建设和运营普通集装箱、大宗物资、危险品、汽车整车、快递包裹等物资多式联运系统建设和运营。
  section: 绿色债券目录 5.5.1.2
- id: cit-gb-218
  text: 智能交通体系：建设和运营交通领域智能化信息系统设施、智慧物流设施的建设和运营，包括交通信息采集与发布系统、交通指挥中心系统、路网综合管理系统、智能公交系统、综合客运枢纽信息化系统等。
  section: 绿色债券目录 5.5.1.3
- id: cit-gb-219
  text: 城市慢行系统：建设和运营城市步行、自行车交通系统建设，包括公共自行车租赁点、非机动车辆停车设施、路段过街设施等城市慢性系统建设等。
  section: 绿色债券目录 5.5.1.4
- id: cit-gb-220
  text: 城乡公共交通：系统建设和运营城市地铁、轻轨、有轨电车等城市轨道交通设施建设和运营；大容量公共交通设施建设和运营，如BRT 公交场站、线路等设施建设和运营；公交车辆购置等。
  section: 绿色债券目录 5.5.1.5
- id: cit-gb-221
  text: 共享交通设施：建设和运营公共租赁自行车、互联网租赁自行车、互联网租赁电动自行车、互联网租赁汽车、汽车分时租赁系统、立体停车设施设备、自行车停车设施等共享交通设施建设和运营。
  section: 绿色债券目录 5.5.1.6
- id: cit-gb-222
  text: 公路甩挂运输：系统建设和运营公路甩挂作业场站、甩挂运输管理信息系统等改造、建设和运营。
  section: 绿色债券目录 5.5.1.7
- id: cit-gb-224
  text: 货物运输铁路：建设运营和铁路节能环保改造货物运输铁路线路、场站、专用供电变电站等货运铁路设施建设和运营；既有铁路电气化改造、场站及铁路相关设备节能环保改造工程建设和运营。其中，铁路场站需达到《绿色铁路客站评价标准》（TB/T 10429）相关标准要求。
  section: 绿色债券目录 5.5.2.1
- id: cit-gb-225
  text: 水路和航：空运输
  section: 绿色债券目录 5.5.3
- id: cit-gb-226
  text: 港口、码头岸：电设施及机场廊桥供电设施建设为靠港、靠岸船舶提供电力供应的供电设施建设和运营；机场廊桥供电设施建设。
  section: 绿色债券目录 5.5.3.1
- id: cit-gb-227
  text: 清洁能源：汽车配套设施
  section: 绿色债券目录 5.5.4
- id: cit-gb-228
  text: 充电、换电、：加氢和加气设施建设和运营电动汽车电池充电、充换服务设施，新能源汽车加氢、加气设施等清洁能源汽车相关基础设施建设和运营。
  section: 绿色债券目录 5.5.4.1
- id: cit-gb-230
  text: 城市生态：保护与建设
  section: 绿色债券目录 5.6.1
- id: cit-gb-231
  text: 公园绿地建：设、养护和运营城市综合公园、专类公园、社区公园、游园等公园、绿地公共设施的建设、养护和运营。
  section: 绿色债券目录 5.6.1.1
- id: cit-gb-232
  text: 绿道系统建：设、养护管理和运营城市绿道及其配套的驿站、标识系统和其他附属设施的建设、养护管理和运营。
  section: 绿色债券目录 5.6.1.2
- id: cit-gb-233
  text: 附属绿地建：设、养护和运营公共管理与公共服务设施用地、商业服务业设施用地、工业用地、物流仓储用地、广场用地、公用设施用地等用地附属绿地的建设、养护和运营。
  section: 绿色债券目录 5.6.1.3
- id: cit-gb-234
  text: 道路绿化建：设、养护管理各级各类城市道路的分隔绿带、路侧绿带、绿化环岛等绿地的建设、养护管理。
  section: 绿色债券目录 5.6.1.4
- id: cit-gb-235
  text: 区域绿地建：设、养护管理和运营城市郊野公园、湿地公园，以及区域设施防护绿地等区域绿地的建设、养护管理和运营。
  section: 绿色债券目录 5.6.1.5
- id: cit-gb-236
  text: 立体绿化建：设、养护管理城市建筑屋顶绿化、墙面绿化、桥隧绿化等立体空间绿化工程及其养护管理。
  section: 绿色债券目录 5.6.1.6
- id: cit-gb-239
  text: 绿色咨询：技术服务
  section: 绿色债券目录 6.1.1
- id: cit-gb-240
  text: 绿色产业项目：勘察服务风能、太阳能、生物质能、地热能等可再生能源资源及其他绿色资源勘察服务，可再生能源等绿色资源经济利用潜力及绿色产业项目建设规模潜力评估等技术咨询服务。
  section: 绿色债券目录 6.1.1.1
- id: cit-gb-241
  text: 绿色产业项目：方案设计服务可再生能源、能效、污染防治、资源综合利用、温室气体减排等绿色产业项目设计技术咨询服务，建设、运营管理，维护方案设计技术服务、绿色供应链管理、技术改造方案设计等技术咨询服务。
  section: 绿色债券目录 6.1.1.2
- id: cit-gb-242
  text: 绿色产业项目：技术咨询服务可再生能源、能效、污染防治、资源综合利用、温室气体减排等绿色产业项目的尽职调查、规划研究和编制、可行性研究和可行性研究报告编制、风险评估、后评价、绿色金融融资、人才培训等技术咨询服务。
  section: 绿色债券目录 6.1.1.3
- id: cit-gb-243
  text: 清洁生产审核：服务对企业生产过程及其生产管理开展全面系统的调查和诊断，发现其原料使用、工艺流程、产品生产、污染物排放等方面薄弱环节，并制定针对性清洁生产改造方案的技术咨询服务。
  section: 绿色债券目录 6.1.1.4
- id: cit-gb-245
  text: 绿色运营：管理服务
  section: 绿色债券目录 6.2.1
- id: cit-gb-246
  text: '能源管理体系：建设企事业单位能源管理体系管理咨询服务、能源管理体系工具软件开发、信息化平台建设、能源管理体系认证服务等管理咨询服务。能源管理体系建设应符合《能源管理体系要求》（GB/T 23331）、《能源管理体系实施指南》（GB/T
    29456）等国家标准的要求。 [技术标准: GB/T 23331, GB/T 29456]'
  section: 绿色债券目录 6.2.1.1
- id: cit-gb-247
  text: '合同能源管理：服务采用节能效益分享、能源费用托管、节能量保证、融资租赁等形式开展的节能技术改造服务，以及合同能源管理商业模式咨询、融资咨询等咨询服务，并符合《合同能源管理技术通则》（GB/T 24915）等国家标准的要求。 [技术标准:
    GB/T 24915]'
  section: 绿色债券目录 6.2.1.2
- id: cit-gb-248
  text: 电力需求侧管：理服务为防止电能浪费，降低电耗、提高绿色电力生产与消费协同互动水平，促进电网对可再生能源电力消纳能力及电力用户可再生能源电力消费水平，以及通过电能替代实施大气环境治理和保护，向电力用户、电网企业提供的节约用电技术改造服务，移峰填谷、需求侧响应等有序用电管理咨询服务，电能替代技术改造，电力需求侧管理服务等。
  section: 绿色债券目录 6.2.1.3
- id: cit-gb-249
  text: 环境权益：交易服务
  section: 绿色债券目录 6.2.2
- id: cit-gb-250
  text: 用能权交易服：务用能权统计核算、用能权第三方审核、用能权交易法律咨询、节能方案咨询、用能权交易平台建设、用能权资产管理和运营、用能权金融质押等用能权交易相关服务。
  section: 绿色债券目录 6.2.2.1
- id: cit-gb-251
  text: 水权交易服务水权交易可行性分析：、水权交易参考价格核定、水权交易方案设计、水权交易法律咨询、水权交易技术咨询、水权交易平台建设等水权交易相关服务。
  section: 绿色债券目录 6.2.2.2
- id: cit-gb-252
  text: 排污许可及交：易服务排污许可证申请、审核，排污许可台账记录和执行报告，排污行为合规性审核或咨询、排污权交易法律咨询，排污权金融质押，以及排污权交易信息化平台建设等排污权许可及交易相关服务。
  section: 绿色债券目录 6.2.2.3
- id: cit-gb-253
  text: '碳排放权交易：服务碳排放和国家温室气体自愿减排交易有关数据统计核算、碳配额注册登记及变更、碳交易法律服务、碳减排方案咨询、碳金融、碳信息管理服务等碳排放权交易相关服务。碳排放核算应符合《温室气体排放核算与报告要求》（GB/T
    32151）等国家标准的要求开展企业边界温室气体排放核算与报告活动。基于减排项目的温室气体减排量评估工作参照《基于项目的温室气体减排量评估技术规范钢铁行业余能利用》（GB/T 33755）、《基于项目的温室气体减排量评估技术规范生产水泥熟料的原料替代项目》（GB/T
    33756）、《基于项目的温室气体减排量评估技术规范通用要求》（GB/T 33760）等国家标准的要求。 [技术标准: GB/T 32151, GB/T 33755, GB/T 33756, GB/T 33760]'
  section: 绿色债券目录 6.2.2.4
- id: cit-gb-254
  text: 可再生能源绿：证交易服务绿色电力证书认购交易、交易法律咨询服务、交易信息化平台建设等可再生能源绿证交易相关服务。
  section: 绿色债券目录 6.2.2.5
- id: cit-gb-256
  text: 项目评估：审计核查服务
  section: 绿色债券目录 6.3.1
- id: cit-gb-257
  text: '节能评估和能：源审计用能单位能源效率评估、节能改造方案设计技术咨询服务以及第三方能源审计、节能量评估、能源审计培训、固定资产投资项目节能报告编制服务等节能评估和能源审计相关服务，并符合《用能单位节能量计算方法》（GB/T 13234）、《节能量测量和验证技术通则》（GB/T
    28750）、《能源审计技术通则》（GB/T 17166）等国家标准的要求。 [技术标准: GB/T 13234, GB/T 28750, GB/T 17166]'
  section: 绿色债券目录 6.3.1.1
- id: cit-gb-258
  text: 环境影响评价：环境影响综合评估、环境影响解决方案设计、环境影响法律咨询、环境影响数据库建设等环境影响评价相关技术服务，环境影响技术评估，生态保护红线、环境质量底线、资源利用上限和环境准入负面清单编制，以及建设项目、行政区域、工业园区等环境风险评估、环境应急控制方案编制、环境应急预案制定等资讯技术服务。
  section: 绿色债券目录 6.3.1.2
- id: cit-gb-259
  text: 碳排放核查：碳排放第三方核查、碳排放核查人员培训、碳排放核查数据库建设、碳排放核查结果抽查校核服务等碳排放核查相关技术服务。
  section: 绿色债券目录 6.3.1.3
- id: cit-gb-260
  text: 地质危害危险：性评估塌塴、滑坡、泥石流、地面塌陷、地裂缝、地面沉降等地质灾害危险性评价、灾害区易损性评价、地质灾害破坏损失评价等地质危害危险性评估相关技术咨询服务。
  section: 绿色债券目录 6.3.1.4
- id: cit-gb-261
  text: 水土保持评估建设项目水土保持方：案编制、监测评估等技术服务，水土保持设施验收、第三方评估，水土保持信息化监管，水土保持法律咨询等水土保持评估相关技术服务。
  section: 绿色债券目录 6.3.1.5
- id: cit-gb-263
  text: 监测检测：服务
  section: 绿色债券目录 6.4.1
- id: cit-gb-264
  text: '能源在线监测：系统建设能源在线监测管理系统方案设计、硬件设备采购、计量和在线监测设备校准等技术服务以及系统软件开发、信息化平台建设，符合《用能单位能耗在线监测技术要求》（GB/T 38692）等国家标准的要求。 [技术标准:
    GB/T 38692]'
  section: 绿色债券目录 6.4.1.1
- id: cit-gb-265
  text: 污染源监测：污染源监测系统开发、污染源监测设备采购、污染源监测应用软件开发、数据库建设，污染物排放计量和监测设备校准等污染源监测相关服务。
  section: 绿色债券目录 6.4.1.2
- id: cit-gb-266
  text: 环境损害评估：监测环境损害评估监测方案设计、环境损害鉴定评估、环境损害应急处置方案设计、环境损害法律咨询服务、环境损害保险服务等技术或法律咨询服务。
  section: 绿色债券目录 6.4.1.3
- id: cit-gb-267
  text: 环境影响评价：监测水环境影响评价监测、大气环境影响评价监测、土壤环境影响评价监测、噪声与振动环境影响评价监测、环境损害应急处置方案设计、环境影响法律咨询等环境影响评价监测相关技术咨询服务。
  section: 绿色债券目录 6.4.1.4
- id: cit-gb-268
  text: '企业环境监测：企业环境监测设备采购、环境监测服务、污染物监控人员培训等技术咨询服务，以及环境监测软件、硬件开发，数据库建设等信息化平台建设，符合《产业园区循环经济信息化公共平台数据接口规范》（GB/T 36578）等国家标准的要求。
    [技术标准: GB/T 36578]'
  section: 绿色债券目录 6.4.1.5
- id: cit-gb-269
  text: 生态环境监测：水、空气、土壤、固体废物、地下水、海洋、农业面源、辐射等生态环境监测，突发生态环境事件涉及的监测设计方案等技术服务，农业废弃物资源、土地资源、水资源监测，林业和草原碳汇监测，生态遥感监测，生物群落监测，生物多样性监测，水土保持监测等监测服务以及毒性试验服务等生态环境监测相关技术服务。
  section: 绿色债券目录 6.4.1.6
- id: cit-gb-271
  text: 技术产品：认证和推广服务
  section: 绿色债券目录 6.5.1
- id: cit-gb-272
  text: 节能产品认证：推广计算机、复印机、显示器、碎纸机、服务器等办公商用电器产品，中小型三相异步电机等机电产品的节能认证和推广服务（含绿色标识产品）。
  section: 绿色债券目录 6.5.1.1
- id: cit-gb-273
  text: 低碳产品认证：推广产品生产和消费全生命周期内产品碳足迹评价、碳减排效益显著的工业产品、商用产品、民用产品的低碳产品认证和推广服务（含绿色标识产品），如水泥、玻璃等建材产品，电机、变压器、轮胎等机电产品的低碳产品认证和推广服务。
  section: 绿色债券目录 6.5.1.2
- id: cit-gb-274
  text: 节水产品认证：推广节水效益显著的工业、民用反渗透净水机、水嘴、淋浴器、水箱配件、洗衣机等节水产品的认证和推广服务（含绿色标识产品）。
  section: 绿色债券目录 6.5.1.3
- id: cit-gb-275
  text: 环境标志产品：认证推广低毒少害、节约资源、能源，符合特定环保要求的环境标志产品认证和推广服务（含绿色标识产品），如电子电器、建材、机械设备等产品的环境标志产品认证和推广服务。
  section: 绿色债券目录 6.5.1.4
- id: cit-gb-276
  text: 有机食品认证：推广产品及其生产环境符合有效期内《有机产品》（GB/T 19630.1- GB/T 19630.4）等国家标准要求的农产品有机食品认证和推广（含绿色标识产品）服务。如蔬菜、水果等种植业产品，食用菌、野生植物产品、水产品、畜禽养殖产品等，以及动物饲料等产品的有机产品认证和推广服务。
  section: 绿色债券目录 6.5.1.5
- id: cit-gb-277
  text: 绿色食品认证：推广产品或产品原料产地符合有效期内绿色食品相关生态环境标准，加工生产过程符合绿色食品相关生产操作规程，产品符合绿色食品相关质量和卫生标准等绿色食品认证和推广服务。如蔬菜、水果、肉及肉制品等食品的绿色食品认证和推广服务。
  section: 绿色债券目录 6.5.1.6
- id: cit-gb-278
  text: 资源综合利用：产品认定推广列入《国家工业固体废物资源综合利用产品目录》（2018 年公布）产品的资源综合利用产品认定和推广服务，以及纳入有效期内《再制造产品目录》的再制造产品的认定和推广服务。
  section: 绿色债券目录 6.5.1.7
- id: cit-gb-279
  text: 绿色建材认证：推广符合有效期内国家、行业、地方绿色建材评价相关政策、标准、规范要求的节能玻璃、薄型瓷砖、砌体材料等绿色建材的认证和推广服务。说明：1.纳入本目录的项目，均需符合《绿色产业指导目录（2019 年版）》解释说明中和本目录“说明/条件”中对应项目所列要求；2.纳入本目录的项目，均需符合相关安全、环保、质量法规政策要求；3.本目录所引用的政策文件和标准规范，均指有效期内的最新版本。
  section: 绿色债券目录 6.5.1.8
