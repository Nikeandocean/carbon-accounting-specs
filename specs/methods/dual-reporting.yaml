meta:
  id: "scope2/dual-reporting"
  version: "1.0.0"
  source: "GHG Protocol Scope 2 Guidance"
  source_ref: "https://ghgprotocol.org/scope-2-guidance"
  layer: "schema"
  description: "双重报告强制规则"

citations:
  - id: "cit-dr-001"
    text: "Companies operating in markets where product-specific instruments (e.g., EACs, PPAs) are available shall report both a location-based and a market-based Scope 2 figure."
    page: 34
    section: "Chapter 7: Dual Reporting"

rules:
  - id: "rule-dr-001"
    name: "双重报告触发"
    type: "constraint"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition: {"==": [{"var": "context.region.has_market_instruments"}, true]}
    assertion:
      "and": [
        {"!=": [{"var": "input.location_based_input"}, null]},
        {"!=": [{"var": "input.market_based_input"}, null]}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "该地区要求双重报告，但未提供两种方法的输入数据"
    citation: "cit-dr-001"

  - id: "rule-dr-002"
    name: "双重报告输出校验"
    type: "constraint"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "post_audit"
    condition:
      "and": [
        {"==": [{"var": "context.region.has_market_instruments"}, true]},
        {"==": [{"var": "computation.status"}, "completed"]}
      ]
    assertion:
      "and": [
        {"!=": [{"var": "output.location_based_result"}, null]},
        {"!=": [{"var": "output.market_based_result"}, null]},
        {"!=": [{"var": "output.methodology_explanation"}, null]}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "双重报告输出不完整"
    citation: "cit-dr-001"

  - id: "rule-dr-003"
    name: "无市场化工具时须按位置法计算"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "runtime_inference"
    condition:
      "and": [
        {"==": [{"var": "context.region.has_market_instruments"}, false]},
        {"!=": [{"var": "input.emission_sources"}, null]}
      ]
    assertion:
      {"==": [{"var": "input.method"}, "location_based"]}
    on_fail: "raise_fatal"
    on_fail_message: "该地区无市场化工具，须按位置法计算Scope 2排放。市场法不适用。"
    citation: "cit-dr-001"

  - id: "rule-dr-004"
    name: "混合运营时市场法回退至位置法"
    type: "requirement"
    priority: "MUST"
    severity: "warning"
    layer: "schema"
    lifecycle: "runtime_inference"
    condition:
      "and": [
        {"==": [{"var": "context.region.has_market_instruments"}, true]},
        {"==": [{"var": "input.has_operations_without_market"}, true]}
      ]
    assertion:
      {"==": [{"var": "input.non_market_operations_method"}, "location_based"]}
    on_fail: "raise_warning"
    on_fail_message: "公司有部分运营不在市场化工具覆盖范围内，该部分须按位置法计算（市场法结果与位置法相同）。"
    citation: "cit-dr-001"

dependencies:
  - ref: "methods/location-based"
    relation: "applies_within"
  - ref: "methods/market-based"
    relation: "applies_within"

conflicts_with: []
