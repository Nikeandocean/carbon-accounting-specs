meta:
  id: "scope3/category-definitions"
  version: "1.0.0"
  source: "GHG Protocol Corporate Value Chain (Scope 3) Accounting and Reporting Standard"
  source_ref: "https://ghgprotocol.org/standard/scope-3"
  layer: "schema"
  description: "Scope 3价值链间接排放分类定义与边界规则（15个类别）"

citations:
  - id: "cit-s3cat-001"
    text: "This standard categorizes scope 3 emissions into 15 distinct categories. The categories are intended to provide companies with a systematic framework to organize, understand, and report on the diversity of scope 3 activities within a corporate value chain."
    page: 31
    section: "Chapter 5: Identifying Scope 3 Emissions, Section 5.4"

  - id: "cit-s3cat-002"
    text: "The categories are designed to be mutually exclusive, such that, for any one reporting company, there is no double counting of emissions between categories."
    page: 31
    section: "Chapter 5: Identifying Scope 3 Emissions, Section 5.4"

  - id: "cit-s3cat-003"
    text: "Scope 3 includes emissions from activities in the value chain of the entities included in the company's organizational boundary."
    page: 31
    section: "Chapter 5: Identifying Scope 3 Emissions, Section 5.3"

  - id: "cit-s3cat-004"
    text: "Emissions from the transportation of purchased products from a tier one (direct) supplier to the reporting company (in vehicles not owned or controlled by the reporting company) are accounted for in category 4."
    page: 20
    section: "Technical Guidance, Category 1"

  - id: "cit-s3cat-005"
    text: "Each scope 3 category is comprised of multiple scope 3 activities that individually result in emissions."
    page: 31
    section: "Chapter 5: Identifying Scope 3 Emissions, Section 5.4"

# 15个Scope 3类别定义
category_definitions:
  upstream:
    - id: "cat1"
      name: "Purchased goods and services"
      name_zh: "外购商品和服务"
      description: "Extraction, production, and transportation of goods and services purchased or acquired by the reporting company in the reporting year, not otherwise included in Categories 2-8"
      minimum_boundary: "All upstream (cradle-to-gate) emissions of purchased goods and services"
      page: 34

    - id: "cat2"
      name: "Capital goods"
      name_zh: "资本品"
      description: "Extraction, production, and transportation of capital goods purchased or acquired by the reporting company in the reporting year"
      minimum_boundary: "All upstream (cradle-to-gate) emissions of purchased capital goods"
      page: 34

    - id: "cat3"
      name: "Fuel- and energy-related activities"
      name_zh: "燃料和能源相关活动"
      description: "Emissions related to the production of fuels and energy purchased and consumed by the reporting company in the reporting year that are not included in scope 1 or scope 2"
      minimum_boundary: "Extraction, production, and transportation of fuels and energy consumed by the reporting company"
      page: 35

    - id: "cat4"
      name: "Upstream transportation and distribution"
      name_zh: "上游运输和配送"
      description: "Transportation and distribution of products purchased by the reporting company in the reporting year between a company's tier 1 suppliers and its own operations"
      minimum_boundary: "The scope 1 and scope 2 emissions of transportation and distribution providers"
      page: 37

    - id: "cat5"
      name: "Waste generated in operations"
      name_zh: "运营中产生的废弃物"
      description: "Disposal and treatment of waste generated by the reporting company's operations in the reporting year"
      minimum_boundary: "The scope 1 and scope 2 emissions of waste management companies"
      page: 37

    - id: "cat6"
      name: "Business travel"
      name_zh: "商务旅行"
      description: "Transportation of employees for business-related activities in vehicles owned or operated by third parties"
      minimum_boundary: "The scope 1 and scope 2 emissions of transportation carriers"
      page: 38

    - id: "cat7"
      name: "Employee commuting"
      name_zh: "员工通勤"
      description: "Transportation of employees between their homes and their worksites"
      minimum_boundary: "The scope 1 and scope 2 emissions of employees and third-party transportation carriers"
      page: 38

    - id: "cat8"
      name: "Upstream leased assets"
      name_zh: "上游租赁资产"
      description: "Operation of assets that are leased by the reporting company in the reporting year and not already included in the reporting company's scope 1 or scope 2 inventories"
      minimum_boundary: "The scope 1 and scope 2 emissions of leased assets operated by the reporting company"
      page: 39

  downstream:
    - id: "cat9"
      name: "Downstream transportation and distribution"
      name_zh: "下游运输和配送"
      description: "Transportation and distribution of products sold by the reporting company in the reporting year between the reporting company's operations and the end consumer"
      minimum_boundary: "The scope 1 and scope 2 emissions of transportation providers, distributors, and retailers"
      page: 38

    - id: "cat10"
      name: "Processing of sold products"
      name_zh: "售出产品的加工"
      description: "Processing of intermediate products sold by the reporting company in the reporting year by downstream companies"
      minimum_boundary: "The scope 1 and scope 2 emissions of downstream value chain partners"
      page: 39

    - id: "cat11"
      name: "Use of sold products"
      name_zh: "售出产品的使用"
      description: "Emissions from the use of goods and services sold by the reporting company in the reporting year"
      minimum_boundary: "The scope 1 and scope 2 emissions of end users during use of sold products"
      page: 40

    - id: "cat12"
      name: "End-of-life treatment of sold products"
      name_zh: "售出产品的报废处理"
      description: "Waste disposal and treatment of products sold by the reporting company at the end of their life"
      minimum_boundary: "The scope 1 and scope 2 emissions of waste management companies"
      page: 41

    - id: "cat13"
      name: "Downstream leased assets"
      name_zh: "下游租赁资产"
      description: "Operation of assets that are owned by the reporting company and leased to other entities in the reporting year"
      minimum_boundary: "The scope 1 and scope 2 emissions of leased assets operated by lessees"
      page: 42

    - id: "cat14"
      name: "Franchises"
      name_zh: "特许经营"
      description: "Operation of franchises in the reporting year, not included in scope 1 and scope 2"
      minimum_boundary: "The scope 1 and scope 2 emissions of franchisees"
      page: 43

    - id: "cat15"
      name: "Investments"
      name_zh: "投资"
      description: "Operation of investments in the reporting year, not included in scope 1 or scope 2"
      minimum_boundary: "See category 15 description for specific requirements"
      page: 44

rules:
  - id: "s3-cat-001"
    name: "Scope 3类别互斥性"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    assertion:
      "all": [
        {"var": "input.scope3_emission_sources"},
        {
          "and": [
            {"!=": [{"var": "category"}, null]},
            {"in": [{"var": "category"}, ["cat1", "cat2", "cat3", "cat4", "cat5", "cat6", "cat7", "cat8", "cat9", "cat10", "cat11", "cat12", "cat13", "cat14", "cat15"]]}
          ]
        }
      ]
    on_fail: "raise_fatal"
    on_fail_message: "Scope 3排放源必须指定有效的类别编号（cat1-cat15），各类别互斥不重叠"
    citation: "cit-s3cat-002"

  - id: "s3-cat-002"
    name: "Scope 3排放源标识必填"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    assertion:
      "all": [
        {"var": "input.scope3_emission_sources"},
        {"!=": [{"var": "id"}, null]}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "每个Scope 3排放源必须有唯一标识"
    citation: "cit-s3cat-005"

  - id: "s3-cat-003"
    name: "上游类别排除规则"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition:
      "and": [
        {"==": [{"var": "input.category"}, "cat1"]},
        {"!=": [{"var": "input.scope3_emission_sources"}, null]}
      ]
    assertion:
      "all": [
        {"var": "input.scope3_emission_sources"},
        {
          "or": [
            {"!=": [{"var": "category"}, "cat2"]},
            {"!=": [{"var": "category"}, "cat3"]},
            {"!=": [{"var": "category"}, "cat4"]},
            {"!=": [{"var": "category"}, "cat5"]},
            {"!=": [{"var": "category"}, "cat6"]},
            {"!=": [{"var": "category"}, "cat7"]},
            {"!=": [{"var": "category"}, "cat8"]}
          ]
        }
      ]
    on_fail: "raise_fatal"
    on_fail_message: "Category 1不包括Categories 2-8已覆盖的排放源"
    citation: "cit-s3cat-004"

  - id: "s3-cat-004"
    name: "组织边界一致性"
    type: "requirement"
    priority: "MUST"
    severity: "warning"
    layer: "schema"
    lifecycle: "pre_calculation"
    assertion:
      "!=": [{"var": "input.entity.control_method"}, null]
    on_fail: "raise_warning"
    on_fail_message: "Scope 3核算应与Scope 1/2使用一致的组织边界方法"
    citation: "cit-s3cat-003"

  - id: "s3-cat-005"
    name: "建议识别物质性类别"
    type: "recommendation"
    priority: "SHOULD"
    severity: "warning"
    layer: "knowledge"
    lifecycle: "post_audit"
    statement: "公司应识别并报告所有物质性（material）的Scope 3类别。物质性评估应考虑排放占比、风险暴露、利益相关方关注等因素。"
    on_fail: "raise_warning"
    on_fail_message: "建议进行物质性评估以确定需要报告的Scope 3类别"
    citation: "cit-s3cat-001"

dependencies:
  - ref: "principles/organizational-boundary"
    relation: "applies_within"

conflicts_with: []
