id: "ghg-protocol/scope2"
name: "GHG Protocol Scope 2 企业外购电力、蒸汽核算规范"
version: "1.0.0"

source_standard:
  name: "GHG Protocol Corporate Accounting and Reporting Standard"
  scope: "Scope 2: Indirect Emissions from Purchased Electricity, Steam, Heat, and Cooling"
  publisher: "World Resources Institute (WRI) & WBCSD"
  original_version: "2015"
  url: "https://ghgprotocol.org/scope-2-guidance"

applicability:
  entity_types: ["企业", "组织", "政府机构"]
  geographic_scope: "全球"
  excluded: ["产品级LCA", "项目级减排"]

# 表达式引擎定义
expression_engines:
  jsonlogic:
    version: "2.0"
    scope: "基础规则：非空校验、类型检查、简单比较、集合操作"
  external_functions:
    scope: "复杂拓扑：组织边界、股权穿透、控制权计算"
    registry:
      - id: "calc.equity_share"
        description: "按股权比例法计算子公司排放分摊"
        input_schema: "schemas/equity-share-input.json"
        output_schema: "schemas/equity-share-output.json"
      - id: "calc.operational_control"
        description: "按运营控制权法判定排放归属"
        input_schema: "schemas/operational-control-input.json"
        output_schema: "schemas/operational-control-output.json"
      - id: "calc.financial_control"
        description: "按财务控制权法判定合并范围"
        input_schema: "schemas/financial-control-input.json"
        output_schema: "schemas/financial-control-output.json"
      - id: "calc.boundary_overlap_check"
        description: "检测Scope 1与Scope 2的能源边界重叠（含CHP自发电、热电联产等场景）"
        input_schema: "schemas/boundary-overlap-input.json"
        output_schema: "schemas/boundary-overlap-output.json"
      - id: "calc.chp_emission_split"
        description: "CHP热电联产排放分配：按能量法/㶲值法/常数法将总排放分配到电力和热力"
        input_schema: "schemas/chp-emission-split-input.json"
        output_schema: "schemas/chp-emission-split-output.json"

# 规则生命周期分层
rule_lifecycle:
  stages:
    - id: "pre_calculation"
      name: "前置约束"
      description: "计算前必须满足的条件（输入校验、边界确认）"
      timing: "before_computation"
    - id: "runtime_inference"
      name: "运行时推导"
      description: "计算过程中的动态决策（方法选择、因子选择）"
      timing: "during_computation"
    - id: "post_audit"
      name: "后置审计"
      description: "计算完成后的合规性断言（输出校验、双重报告校验）"
      timing: "after_computation"

# on_fail动作定义
on_fail_actions:
  raise_fatal:
    description: "终止计算，抛出合规异常"
    agent_behavior: "停止所有后续计算，输出错误详情"
  raise_warning:
    description: "继续计算，生成审计日志"
    agent_behavior: "记录warning，继续执行"
  log_info:
    description: "记录日志，不干预"
    agent_behavior: "仅记录，不影响流程"
  mark_unavailable:
    description: "标记数据不可用，不立即终止，由后续cross_method_validation统一裁决"
    agent_behavior: |
      1. 设置状态标记（如 market_based.data_available = false）
      2. 记录fatal级别日志
      3. 继续执行其他流程
      4. 由post_audit阶段的cross_method_validation决定最终处理
  require_justification:
    description: "要求合规性解释（Comply or Explain），支持实例级隔离"
    agent_behavior: |
      1. 检查justification是否存在，优先级：
         a. 实例级：input.justifications["{rule_id}@{instance_path}"]
         b. 全局级：input.justifications[rule_id]
      2. 若存在且非空：
         - 将severity降级为warning
         - 记录justification到审计日志（含instance_path）
         - 继续计算
      3. 若不存在或为空：
         - 将severity升级为fatal
         - 终止计算
    instance_isolation_example: |
      # justifications支持两种粒度：
      justifications:
        "proh-006": "全局理由：2026年官方因子尚未发布"
        "proh-006@emission_sources[1].id": "该网点位于偏远地区，仅能获取2024年因子"

# 冲突解决策略
conflict_resolution:
  strategy: "local_overrides_global"
  description: "本地法规优先于通用标准"
  hierarchy:
    - level: 1
      scope: "enterprise_specific"
      description: "企业特定规则（最高优先级）"
    - level: 2
      scope: "industry_specific"
      description: "行业特定规则"
    - level: 3
      scope: "regional_specific"
      description: "地区/国家特定规则"
    - level: 4
      scope: "global_standard"
      description: "GHG Protocol通用规则（最低优先级）"
  override_mechanics:
    - rule: "本地规则可覆盖global_rules中的SHOULD和MAY规则"
    - rule: "本地规则不可覆盖global_rules中的MUST规则，除非有明确的法规冲突声明"
    - rule: "覆盖时必须记录overridden_by和override_reason"

# 输入数据Schema
input_schema:
  context:
    region:
      type: "object"
      required: true
      properties:
        country_code:
          type: "string"
          format: "ISO_3166-1_alpha-2"
          description: "国家代码（如CN、US、DE）"
        subnational_code:
          type: "string"
          format: "ISO_3166-2"
          description: "行政区划代码（如CN-BJ、CN-GD）"
          nullable: true
        has_market_instruments:
          type: "boolean"
          description: |
            该地区是否存在市场化电力交易工具（绿证、PPA、I-REC等）
            注意：只要该国/地区存在任何能够改变电力环境属性的合同工具市场，
            不论企业自身是否购买，该字段都必须为true。
            维护规则：由context数据库统一维护，企业不可自行覆盖。
        grid_average_ef:
          type: "number"
          unit: "tCO2/MWh"
          description: "电网平均排放因子"
          nullable: true
        residual_mix_ef:
          type: "number"
          unit: "tCO2/MWh"
          description: "残余电力组合排放因子"
          nullable: true
    emission_factors:
      type: "object"
      properties:
        current_year:
          type: "number"
          nullable: true
        previous_year:
          type: "number"
          nullable: true
        latest_available:
          type: "number"
          nullable: true
        latest_year:
          type: "integer"
          nullable: true
  input:
    entity:
      type: "object"
      required: true
      properties:
        name:
          type: "string"
        reporting_year:
          type: "integer"
        control_method:
          type: "string"
          enum: ["financial_control", "operational_control", "equity_share"]
    emission_sources:
      type: "array"
      items:
        type: "object"
        properties:
          id:
            type: "string"
          type:
            type: "string"
            enum: ["electricity", "steam", "heat", "cooling"]
          activity_data:
            type: "number"
            unit: "MWh"
          emission_factor:
            type: "object"
            properties:
              value:
                type: "number"
              year:
                type: "integer"
              source:
                type: "string"
              type:
                type: "string"
                enum: ["contract", "certificate", "supplier", "residual_mix", "grid_average", "default"]
    justifications:
      type: "object"
      description: |
        合规性解释（Comply or Explain），支持两级粒度：
        - 全局级：key为rule_id，适用于所有实例
        - 实例级：key为"{rule_id}@{instance_path}"，适用于特定排放源
        优先级：实例级 > 全局级
      additionalProperties:
        type: "string"
      examples:
        - "proh-006": "全局理由：2026年官方因子尚未发布"
        - "proh-006@emission_sources[1].id": "该网点位于偏远地区，仅能获取2024年因子"
    scope1_emission_sources:
      type: "array"
      description: "Scope 1直接排放源"
      items:
        type: "object"
        properties:
          id:
            type: "string"
          type:
            type: "string"
            enum: ["stationary_combustion", "mobile_combustion", "process", "fugitive"]
          fuel_type:
            type: "string"
            nullable: true
            description: "燃料类型（燃烧源必填）"
          process_type:
            type: "string"
            nullable: true
            description: "工艺类型（工艺排放源必填）"
          activity_data:
            type: "number"
            description: "活动数据"
          activity_unit:
            type: "string"
            enum: ["tonnes", "litres", "cubic_metres", "GJ", "kWh", "km"]
            description: "活动数据单位"
          emission_factor:
            type: "object"
            properties:
              value:
                type: "number"
                description: "排放因子值（tCO2e/单位）"
              co2_component:
                type: "number"
                nullable: true
              ch4_component:
                type: "number"
                nullable: true
              n2o_component:
                type: "number"
                nullable: true
              year:
                type: "integer"
              source:
                type: "string"
              is_biomass:
                type: "boolean"
                default: false
          gwp_source:
            type: "string"
            enum: ["IPCC_AR4", "IPCC_AR5", "IPCC_AR6"]
            description: "GWP值来源的IPCC评估报告版本"
    scope3_emission_sources:
      type: "array"
      description: "Scope 3价值链间接排放源"
      items:
        type: "object"
        properties:
          id:
            type: "string"
            description: "排放源唯一标识"
          category:
            type: "string"
            enum: ["cat1", "cat2", "cat3", "cat4", "cat5", "cat6", "cat7", "cat8", "cat9", "cat10", "cat11", "cat12", "cat13", "cat14", "cat15"]
            description: "Scope 3类别编号"
          description:
            type: "string"
            description: "排放源描述"
          calculation_method:
            type: "string"
            enum: ["supplier_specific", "hybrid", "average_data", "spend_based"]
            description: "计算方法"
          quantity:
            type: "number"
            nullable: true
            description: "采购数量（kg、件等）"
          quantity_unit:
            type: "string"
            nullable: true
            description: "数量单位"
          spend_value:
            type: "number"
            nullable: true
            description: "采购金额"
          currency:
            type: "string"
            nullable: true
            description: "货币单位"
          emission_factor:
            type: "object"
            properties:
              value:
                type: "number"
                description: "排放因子值（kg CO2e/单位）"
              source_type:
                type: "string"
                enum: ["supplier_specific", "process_database", "eeio", "industry_average"]
                description: "排放因子来源类型"
              year:
                type: "integer"
              source:
                type: "string"
          gwp_source:
            type: "string"
            enum: ["IPCC_AR4", "IPCC_AR5", "IPCC_AR6"]
            description: "GWP值来源的IPCC评估报告版本"

load_order:
  - principles/organizational-boundary
  - principles/operational-boundary
  - principles/data-quality-hierarchy
  - principles/emission-attribution
  - methods/location-based
  - methods/market-based
  - methods/dual-reporting
  - reporting/disclosure-requirements
  - constraints/prohibitions
  - constraints/scope2-quality-criteria
  - constraints/certificate-management
  # Scope 1 (new)
  - scope1/principles/emission-categories
  - scope1/principles/operational-boundary
  - scope1/principles/data-quality-hierarchy
  - scope1/methods/stationary-combustion
  - scope1/methods/mobile-combustion
  - scope1/methods/process-emissions
  - scope1/methods/fugitive-emissions
  - scope1/reporting/disclosure-requirements
  - scope1/constraints/prohibitions
  - scope1/constraints/quality-criteria
  - scope1/constraints/cross-type-validation
  # Scope 3 (new)
  - scope3/principles/category-definitions
  - scope3/principles/data-quality-hierarchy
  - scope3/methods/cat1-purchased-goods
  - scope3/methods/cat2-capital-goods
  - scope3/methods/cat3-fuel-energy
  - scope3/methods/cat5-waste
  - scope3/methods/cat6-business-travel
  - scope3/methods/cat7-employee-commuting
  - scope3/methods/cat8-upstream-leased
  - scope3/methods/cat4-upstream-transport
  - scope3/methods/cat9-downstream-transport
  - scope3/methods/cat10-processing-sold
  - scope3/methods/cat11-use-sold
  - scope3/methods/cat12-end-of-life
  - scope3/methods/cat13-downstream-leased
  - scope3/methods/cat14-franchises
  - scope3/methods/cat15-investments
  - scope3/constraints/prohibitions

global_rules:
  - id: "global-001"
    name: "完整性原则"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    scope: "scope2_only"
    condition: {"!=": [{"var": "input.emission_sources"}, null]}
    assertion:
      "all": [
        {"var": "input.emission_sources"},
        {
          "and": [
            {"!=": [{"var": "activity_data"}, null]},
            {"!=": [{"var": "emission_factor"}, null]}
          ]
        }
      ]
    on_fail: "raise_fatal"
    on_fail_message: "存在已识别但未提供数据的排放源"
    citation: "GHG Protocol Corporate Standard, Chapter 4"

  - id: "global-002"
    name: "一致性原则"
    priority: "MUST"
    severity: "warning"
    layer: "schema"
    lifecycle: "post_audit"
    assertion:
      "or": [
        {"==": [{"var": "input.accounting_method"}, {"var": "context.previous_year.accounting_method"}]},
        {"!=": [{"var": "input.justifications.global-002"}, null]}
      ]
    on_fail: "require_justification"
    on_fail_message: "核算方法与上年度不一致，需在报告中说明变更原因"
    citation: "GHG Protocol Corporate Standard, Chapter 4"

  - id: "global-003"
    name: "透明度原则"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "post_audit"
    assertion:
      "and": [
        {"!=": [{"var": "input.assumptions"}, null]},
        {"!=": [{"var": "input.methodology_rationale"}, null]},
        {"!=": [{"var": "input.data_sources"}, null]}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "缺少假设、方法选择或数据来源的说明，无法通过审计"
    citation: "GHG Protocol Corporate Standard, Chapter 4"

  - id: "global-004"
    name: "相关性原则"
    priority: "MUST"
    severity: "warning"
    layer: "schema"
    lifecycle: "post_audit"
    assertion:
      {"!=": [{"var": "input.entity.reporting_year"}, null]}
    on_fail: "raise_warning"
    on_fail_message: "清单应适当反映公司GHG排放，服务于决策需求。请确认报告年度和边界设置是否与当前决策需求相关。"
    citation: "GHG Protocol Scope 2 Guidance, Chapter 3"

  - id: "global-005"
    name: "准确性原则"
    priority: "MUST"
    severity: "warning"
    layer: "schema"
    lifecycle: "post_audit"
    assertion:
      "and": [
        {"!=": [{"var": "output.total_scope2_emissions"}, null]},
        {">": [{"var": "output.total_scope2_emissions"}, 0]}
      ]
    on_fail: "raise_warning"
    on_fail_message: "GHG排放量化应系统性地既不高估也不低估实际排放。请确认排放因子和活动数据的不确定性已在合理范围内。"
    citation: "GHG Protocol Scope 2 Guidance, Chapter 3"

  - id: "global-s1-001"
    name: "Scope 1完整性原则"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    scope: "scope1_only"
    condition: {"!=": [{"var": "input.scope1_emission_sources"}, null]}
    assertion:
      "all": [
        {"var": "input.scope1_emission_sources"},
        {
          "and": [
            {"!=": [{"var": "activity_data"}, null]},
            {">": [{"var": "activity_data"}, 0]}
          ]
        }
      ]
    on_fail: "raise_fatal"
    on_fail_message: "Scope 1排放源缺少活动数据"
    citation: "GHG Protocol Corporate Standard, Chapter 4"

  - id: "global-s1-002"
    name: "Scope 1排放源类型校验"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    scope: "scope1_only"
    condition: {"!=": [{"var": "input.scope1_emission_sources"}, null]}
    assertion:
      "all": [
        {"var": "input.scope1_emission_sources"},
        {"in": [{"var": "type"}, ["stationary_combustion", "mobile_combustion", "process", "fugitive"]]}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "Scope 1排放源类型必须为stationary_combustion、mobile_combustion、process或fugitive"
    citation: "GHG Protocol Corporate Standard, Chapter 6"

  - id: "global-s1-003"
    name: "Scope 1气体来源一致性"
    priority: "MUST"
    severity: "warning"
    layer: "schema"
    lifecycle: "post_audit"
    scope: "scope1_only"
    condition: {"!=": [{"var": "input.scope1_emission_sources"}, null]}
    assertion:
      "all": [
        {"var": "input.scope1_emission_sources"},
        {"!=": [{"var": "gwp_source"}, null]}
      ]
    on_fail: "raise_warning"
    on_fail_message: "所有Scope 1排放源应使用同一IPCC评估报告的GWP值"
    citation: "GHG Protocol Corporate Standard, Chapter 6"

  - id: "global-s3-001"
    name: "Scope 3完整性原则"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    scope: "scope3_only"
    condition: {"!=": [{"var": "input.scope3_emission_sources"}, null]}
    assertion:
      "all": [
        {"var": "input.scope3_emission_sources"},
        {
          "and": [
            {"!=": [{"var": "category"}, null]},
            {"in": [{"var": "category"}, ["cat1", "cat2", "cat3", "cat4", "cat5", "cat6", "cat7", "cat8", "cat9", "cat10", "cat11", "cat12", "cat13", "cat14", "cat15"]]}
          ]
        }
      ]
    on_fail: "raise_fatal"
    on_fail_message: "Scope 3排放源必须指定有效的类别编号（cat1-cat15）"
    citation: "GHG Protocol Scope 3 Standard, Chapter 5"

  - id: "global-s3-002"
    name: "Scope 3计算方法必填"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    scope: "scope3_only"
    condition: {"!=": [{"var": "input.scope3_emission_sources"}, null]}
    assertion:
      "all": [
        {"var": "input.scope3_emission_sources"},
        {"in": [{"var": "calculation_method"}, ["supplier_specific", "hybrid", "average_data", "spend_based"]]}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "Scope 3排放源必须指定计算方法（supplier_specific、hybrid、average_data或spend_based）"
    citation: "GHG Protocol Scope 3 Calculation Guidance, Introduction"

  - id: "global-s3-003"
    name: "Scope 3类别互斥性"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "post_audit"
    scope: "scope3_only"
    condition: {"!=": [{"var": "input.scope3_emission_sources"}, null]}
    assertion:
      "unique": [
        {"var": "input.scope3_emission_sources"},
        {"var": "id"}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "同一排放源不得在多个Scope 3类别中重复计算"
    citation: "GHG Protocol Scope 3 Standard, Chapter 5, Section 5.4"

versioning:
  scheme: "semver"
  rules:
    major: "规则语义变更（MUST变SHOULD等）"
    minor: "新增规则或文件"
    patch: "修正措辞、补充引用"
