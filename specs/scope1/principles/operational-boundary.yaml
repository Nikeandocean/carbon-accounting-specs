meta:
  id: "scope1/operational-boundary"
  version: "1.0.0"
  source: "GHG Protocol Corporate Standard"
  source_ref: "https://ghgprotocol.org/corporate-standard"
  layer: "schema"
  description: "Scope 1运营边界确定规则：直接排放边界确认、CHP分配、租赁资产归属、生物燃料处理"

citations:
  - id: "cit-s1ob-001"
    text: "Companies shall select and consistently use one of two approaches: the equity share approach or the control approach."
    page: 18
    section: "Chapter 3: Setting Organizational Boundaries"

  - id: "cit-s1ob-002"
    text: "There are two options for allocating GHG emissions from a co-generation facility: the electrical efficiency method and the energy method (also called the fuel energy method)."
    page: 44
    section: "Chapter 6: Tracking and Reporting Emissions"

  - id: "cit-s1ob-003"
    text: "Emissions from the operation of leased assets should be classified as Scope 1 or Scope 2 according to the guidance in chapter 4 (page 27)."
    page: 34
    section: "Chapter 4: Setting Operational Boundaries"

  - id: "cit-s1ob-004"
    text: "CO2 emissions from the combustion of biomass shall be reported separately from the scopes. CH4 and N2O emissions from biomass combustion should be included in Scope 1."
    page: 29
    section: "Chapter 4: Scope 1 Emissions"

rules:
  - id: "s1-bound-001"
    name: "Scope 1排放边界确认"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition: {"!=": [{"var": "input.scope1_emission_sources"}, null]}
    assertion:
      {"!=": [{"var": "input.entity.control_method"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "须先确定组织控制方法（运营控制/财务控制/股权比例）才能界定Scope 1边界"
    citation: "cit-s1ob-001"

  - id: "s1-bound-002"
    name: "CHP排放分配"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "runtime_inference"
    condition: {"!=": [{"var": "input.chp_assets"}, null]}
    assertion:
      {"!=": [{"var": "computation.result.scope1_emissions"}, null]}
    computation:
      function: "calc.chp_emission_split"
      params:
        chp_assets: {"var": "input.chp_assets"}
        allocation_method: {"var": "input.chp_allocation_method"}
    post_computation_assertion:
      {"!=": [{"var": "computation.result.scope1_emissions"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "CHP热电联产排放须在热力(Scope 1)和电力(Scope 2)之间分配"
    citation: "cit-s1ob-002"

  - id: "s1-bound-003"
    name: "租赁资产Scope 1归属"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition: {"!=": [{"var": "input.leased_assets"}, null]}
    assertion:
      "all": [
        {"var": "input.leased_assets"},
        {"in": [{"var": "scope"}, ["scope1", "scope2"]]}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "租赁资产排放须正确分类为Scope 1或Scope 2"
    citation: "cit-s1ob-003"

  - id: "s1-bound-004"
    name: "生物燃料CO2与CH4/N2O区分"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "runtime_inference"
    condition: {"==": [{"var": "emission_factor.is_biomass"}, true]}
    assertion:
      "and": [
        {"==": [{"var": "co2_biogenic_reported_outside_scopes"}, true]},
        {"==": [{"var": "ch4_n2o_in_scope1"}, true]}
      ]
    on_fail: "raise_fatal"
    on_fail_message: "生物燃料CO2须报告在Scope外，CH4/N2O须报告在Scope 1"
    citation: "cit-s1ob-004"

dependencies:
  - ref: "principles/operational-boundary"
    relation: "scope1_specialization_of"
  - ref: "principles/organizational-boundary"
    relation: "applies_within"

conflicts_with: []
