meta:
  id: "scope2/organizational-boundary"
  version: "1.0.0"
  source: "GHG Protocol Corporate Standard"
  source_ref: "https://ghgprotocol.org/corporate-standard"
  layer: "schema"
  description: "组织边界确定规则：控制权法、股权比例法"

citations:
  - id: "cit-ob-001"
    text: "Companies shall select and consistently use one of two approaches for consolidating GHG emissions: the equity share approach or the financial control approach or the operational control approach."
    page: 18
    section: "Chapter 3: Setting Organizational Boundaries"

  - id: "cit-ob-002"
    text: "As noted in the Corporate Standard and its supplemental Appendix F, all leases confer operational control to the lessee or tenants, unless otherwise noted. If a tenant can demonstrate that they do not exercise operational control in their lease, they shall document and justify the exclusion of these emissions."
    page: 34
    section: "Chapter 5: Leased Assets"

rules:
  - id: "rule-ob-001"
    name: "组织边界核算"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition: {"!=": [{"var": "input.subsidiaries"}, null]}
    computation:
      function: "calc.equity_share"
      params:
        subsidiaries: {"var": "input.subsidiaries"}
        ownership_data: {"var": "input.ownership_structure"}
        control_type: {"var": "input.control_method"}
    assertion: {"!=": [{"var": "computation.result.boundary_emissions"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "组织边界计算失败，无法确定合并范围"
    citation: "cit-ob-001"

  - id: "rule-ob-002"
    name: "控制权法判定"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition: {"==": [{"var": "input.control_method"}, "operational_control"]}
    computation:
      function: "calc.operational_control"
      params:
        subsidiaries: {"var": "input.subsidiaries"}
        control_indicators: {"var": "input.control_indicators"}
    assertion: {"!=": [{"var": "computation.result.controlled_entities"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "运营控制权判定失败"
    citation: "cit-ob-001"

  - id: "rule-ob-003"
    name: "股权比例法判定"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition: {"==": [{"var": "input.control_method"}, "equity_share"]}
    computation:
      function: "calc.equity_share"
      params:
        subsidiaries: {"var": "input.subsidiaries"}
        ownership_data: {"var": "input.ownership_structure"}
    assertion: {"!=": [{"var": "computation.result.equity_share_emissions"}, null]}
    on_fail: "raise_fatal"
    on_fail_message: "股权比例法计算失败"
    citation: "cit-ob-001"

  # ========== 租赁资产规则 (Ch5.2.1) ==========

  - id: "rule-ob-004"
    name: "租赁资产运营控制权默认归属"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition:
      {"!=": [{"var": "input.leased_assets"}, null]}
    assertion:
      "all": [
        {"var": "input.leased_assets"},
        {
          "or": [
            {"==": [{"var": "has_operational_control"}, true]},
            {"!=": [{"var": "exclusion_justification"}, null]}
          ]
        }
      ]
    on_fail: "raise_fatal"
    on_fail_message: "租赁资产默认由租户拥有运营控制权。若租户不拥有运营控制权，须记录并说明排除原因。"
    citation: "cit-ob-002"

  - id: "rule-ob-005"
    name: "租赁资产排放分类"
    type: "requirement"
    priority: "MUST"
    severity: "fatal"
    layer: "schema"
    lifecycle: "pre_calculation"
    condition:
      "and": [
        {"!=": [{"var": "input.leased_assets"}, null]},
        {"==": [{"var": "input.control_method"}, "operational_control"]}
      ]
    assertion:
      "all": [
        {"var": "input.leased_assets"},
        {
          "or": [
            {"==": [{"var": "scope"}, "scope2"]},
            {"==": [{"var": "scope"}, "scope1"]}
          ]
        }
      ]
    on_fail: "raise_fatal"
    on_fail_message: "租赁资产排放须正确分类为Scope 1或Scope 2。租户购买的外部能源报Scope 2，自有设备排放报Scope 1。"
    citation: "cit-ob-002"
